<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vellum Relay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      width: 300px;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.paused { background: #f59e0b; }
    .status-dot.disconnected { background: #ef4444; }

    .status-text {
      font-size: 12px;
      color: #666;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #444;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }
    input:focus { border-color: #6366f1; }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: default; }

    #btn-connect {
      background: #6366f1;
      color: #fff;
    }
    #btn-connect:hover:not(:disabled) { background: #4f46e5; }

    #btn-pause {
      background: #f3f4f6;
      color: #374151;
    }
    #btn-pause:hover:not(:disabled) { background: #e5e7eb; }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 16px 0 14px 0;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    #btn-cloud-signin {
      width: 100%;
      background: #111827;
      color: #fff;
      margin-bottom: 8px;
    }
    #btn-cloud-signin:hover:not(:disabled) { background: #1f2937; }

    #btn-pair-local {
      width: 100%;
      background: #0f766e;
      color: #fff;
      margin-bottom: 8px;
    }
    #btn-pair-local:hover:not(:disabled) { background: #115e59; }

    .cloud-status {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .cloud-status.signed-in { color: #0f766e; }

    .local-status {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .local-status.paired { color: #0f766e; }
    .local-status.error { color: #ef4444; }

    .assistant-selector-group {
      margin-bottom: 14px;
    }

    select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
    }
    select:focus { border-color: #6366f1; }

    .hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 10px;
      line-height: 1.5;
    }

    .error-text {
      font-size: 12px;
      color: #ef4444;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div class="status-dot disconnected" id="status-dot"></div>
    <h1>Vellum Relay</h1>
  </header>

  <p class="status-text" id="status-text">Not connected</p>

  <p class="error-text" id="error-text" style="display:none"></p>

  <div class="assistant-selector-group" id="assistant-selector-group" style="display:none">
    <label for="assistant-select">Assistant</label>
    <select id="assistant-select"></select>
  </div>

  <label for="port-input">Relay port</label>
  <input
    type="text"
    id="port-input"
    placeholder="7830"
    autocomplete="off"
    spellcheck="false"
  />

  <div class="btn-row">
    <button id="btn-connect">Connect</button>
    <button id="btn-pause" disabled>Pause</button>
  </div>

  <p class="hint">Relay port defaults to 7830.</p>

  <div class="divider"></div>

  <p class="section-label" id="troubleshooting-label">Troubleshooting</p>

  <p class="local-status" id="local-status" style="display:none">Not paired</p>
  <button id="btn-pair-local" type="button" style="display:none">Re-pair with local assistant</button>

  <p class="cloud-status" id="cloud-status" style="display:none">Not signed in</p>
  <button id="btn-cloud-signin" type="button" style="display:none">Re-sign in with Vellum (cloud)</button>

  <script type="module" src="popup.js"></script>
</body>
</html>
