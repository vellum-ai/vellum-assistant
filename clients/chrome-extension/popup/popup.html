<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser Connection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      width: 300px;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    .status-card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.paused { background: #f59e0b; }
    .status-dot.disconnected { background: #ef4444; }

    .status-badge {
      font-size: 12px;
      font-weight: 600;
      color: #1f2937;
      background: #e5e7eb;
      border-radius: 999px;
      padding: 2px 8px;
      flex-shrink: 0;
    }
    .status-badge.connected { background: #dcfce7; color: #166534; }
    .status-badge.paused { background: #fef3c7; color: #92400e; }
    .status-badge.disconnected { background: #fee2e2; color: #991b1b; }

    .status-text {
      font-size: 12px;
      color: #4b5563;
      line-height: 1.45;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #444;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }
    input:focus { border-color: #6366f1; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .toggle-copy {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .toggle-title {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
    }

    .toggle-hint {
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .switch-slider {
      position: absolute;
      inset: 0;
      background: #d1d5db;
      border-radius: 999px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .switch-slider::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .switch input:checked + .switch-slider {
      background: #4f46e5;
    }

    .switch input:checked + .switch-slider::before {
      transform: translateX(18px);
    }

    .switch input:disabled + .switch-slider {
      cursor: default;
      opacity: 0.55;
    }

    button {
      width: 100%;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: default; }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 16px 0 14px 0;
    }

    #btn-cloud-signin {
      width: 100%;
      background: #111827;
      color: #fff;
      margin-bottom: 8px;
    }
    #btn-cloud-signin:hover:not(:disabled) { background: #1f2937; }

    #btn-pair-local {
      width: 100%;
      background: #0f766e;
      color: #fff;
      margin-bottom: 8px;
    }
    #btn-pair-local:hover:not(:disabled) { background: #115e59; }

    .cloud-status {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .cloud-status.signed-in { color: #0f766e; }

    .local-status {
      font-size: 12px;
      color: #4b5563;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .local-status.paired { color: #0f766e; }
    .local-status.error { color: #ef4444; }

    .assistant-selector-group {
      margin-bottom: 14px;
    }

    select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
    }
    select:focus { border-color: #6366f1; }

    .hint {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 6px;
      line-height: 1.5;
    }

    .error-text {
      font-size: 12px;
      color: #ef4444;
      margin-bottom: 8px;
    }

    .setup-message {
      font-size: 12px;
      color: #92400e;
      background: #fef3c7;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 10px;
      line-height: 1.45;
    }

    .advanced-setting {
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .advanced-setting label {
      margin-bottom: 6px;
    }

    .advanced-setting input {
      margin-bottom: 0;
    }

    /* ── Advanced collapsible area ────────────────────────────────── */

    #troubleshoot-section {
      margin-top: 16px;
    }

    #troubleshoot-section[hidden] {
      display: none;
    }

    .troubleshoot-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      padding: 0;
      margin-bottom: 10px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex: none;
      width: auto;
    }
    .troubleshoot-toggle:hover { color: #374151; }

    .troubleshoot-toggle .chevron {
      display: inline-block;
      font-size: 10px;
      transition: transform 0.15s;
    }
    .troubleshoot-toggle[aria-expanded="true"] .chevron {
      transform: rotate(90deg);
    }

    #troubleshoot-body {
      overflow: hidden;
    }
    #troubleshoot-body[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Vellum Relay</h1>
  </header>

  <div class="status-card" role="status" aria-live="polite">
    <div class="status-row">
      <div class="status-left">
        <div class="status-dot disconnected" id="status-dot"></div>
        <p class="status-text" id="status-text">Not connected</p>
      </div>
      <span class="status-badge disconnected" id="status-badge">Offline</span>
    </div>
  </div>

  <p class="error-text" id="error-text" style="display:none"></p>

  <p id="setup-message" class="setup-message" style="display:none"></p>

  <div class="assistant-selector-group" id="assistant-selector-group" style="display:none">
    <label for="assistant-select">Assistant</label>
    <select id="assistant-select"></select>
  </div>

  <div class="toggle-row">
    <div class="toggle-copy">
      <p class="toggle-title">Connection</p>
      <p class="toggle-hint" id="connection-toggle-hint">Turn on to connect.</p>
    </div>
    <label class="switch" for="connection-toggle">
      <input type="checkbox" id="connection-toggle" aria-label="Toggle connection" />
      <span class="switch-slider"></span>
    </label>
  </div>

  <!-- Advanced section: collapsed by default, auto-expanded for auth_required/error -->
  <div id="troubleshoot-section" hidden>
    <div class="divider"></div>

    <button
      type="button"
      class="troubleshoot-toggle"
      id="troubleshoot-toggle"
      aria-expanded="false"
      aria-controls="troubleshoot-body"
    >
      <span class="chevron">&#9654;</span>
      Advanced
    </button>

    <div id="troubleshoot-body" hidden>
      <div class="advanced-setting">
        <label for="port-input">Connection port</label>
        <input
          type="text"
          id="port-input"
          placeholder="7830"
          autocomplete="off"
          spellcheck="false"
        />
        <p class="hint">Only change this if support asks you to.</p>
      </div>

      <p class="local-status" id="local-status" style="display:none">Not paired</p>
      <button id="btn-pair-local" type="button" style="display:none">Re-pair with local assistant</button>

      <p class="cloud-status" id="cloud-status" style="display:none">Not signed in</p>
      <button id="btn-cloud-signin" type="button" style="display:none">Re-sign in with Vellum (cloud)</button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
