                    type: integer
                    minimum: 0
                    maximum: 100
                  title:
                    type: string
                  summary:
                    type: string
                  source:
                    type: string
                    enum:
                      - gmail
                      - slack
                      - calendar
                      - assistant
                      - telegram
                  timestamp:
                    type: string
                  status:
                    default: new
                    type: string
                    enum:
                      - new
                      - seen
                      - acted_on
                      - dismissed
                  expiresAt:
                    type: string
                  minTimeAway:
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                  actions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        label:
                          type: string
                        prompt:
                          type: string
                      required:
                        - id
                        - label
                        - prompt
                      additionalProperties: false
                  urgency:
                    type: string
                    enum:
                      - low
                      - medium
                      - high
                      - critical
                  conversationId:
                    type: string
                  detailPanel:
                    type: object
                    properties:
                      kind:
                        type: string
                        enum:
                          - emailDraft
                          - documentPreview
                          - permissionChat
                          - paymentAuth
                          - toolPermission
                          - updatesList
                    required:
                      - kind
                    additionalProperties: false
                  author:
                    type: string
                    enum:
                      - assistant
                      - platform
                  createdAt:
                    type: string
                required:
                  - id
