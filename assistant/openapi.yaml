                    enum:
                      - running
                      - not_running
                  pid:
                    type: number
                  workerEnabled:
                    type: boolean
                  syncRunner:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - running
                          - not_running
                      pid:
                        type: number
                    required:
                      - status
                    additionalProperties: false
                  embedding:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      degraded:
                        type: boolean
                      provider:
                        anyOf:
                          - type: string
                            enum:
                              - local
                              - openai
                              - gemini
                              - ollama
                          - type: "null"
                      model:
                        anyOf:
                          - type: string
                          - type: "null"
                      reason:
                        anyOf:
                          - type: string
                          - type: "null"
                    required:
                      - enabled
                      - degraded
                      - provider
                      - model
                      - reason
                    additionalProperties: false
                required:
                  - status
                  - workerEnabled
                  - syncRunner
                  - embedding
                additionalProperties: false
  /v1/memory/worker/stop:
    post:
      operationId: memory_worker_stop_post
