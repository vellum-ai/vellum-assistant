                          type: string
                          enum:
                            - low
                            - medium
                            - high
                            - critical
                        author:
                          type: string
                          enum:
                            - assistant
                            - platform
                        createdAt:
                          type: string
                      required:
                        - id
                        - type
                        - priority
                        - title
                        - summary
                        - timestamp
                        - status
                        - author
                        - createdAt
                      additionalProperties: false
