                                - type: "null"
                            confidence:
                              type: number
                            updatedAt:
                              type: number
                            source:
                              type: string
                              enum:
                                - lexical
                                - semantic
                          required:
                            - id
                            - kind
                            - text
                            - subject
                            - confidence
                            - updatedAt
                            - source
                          additionalProperties: false
