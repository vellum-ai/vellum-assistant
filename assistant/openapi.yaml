  /v1/conversations/{id}/compaction:
    get:
      operationId: conversations_by_id_compaction_get
      summary: Get the compaction(s) attributed to an LLM call
      description:
        Return the chronological list of compactions attributed to the call identified by `callId` — those that ran
        strictly between the previous real (non-`compactionAgent`) LLM call and the selected call. Served from the
        first-class compaction log when `compactionLogs.destination = "clickhouse"` is configured, falling back to the
        legacy projection over `llm_request_logs` rows where `call_site = "compactionAgent"`. Usually empty or a single
        compaction; the recovery cascade can fire several before one call lands. Drives the Inspector's Compaction tab.
      tags:
        - conversations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: callId
          in: query
          required: true
          schema:
            type: string
          description: ID of the selected LLM call from the rail. Defines the chronological cutoff for the attributed compactions.
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversationId:
                    type: string
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        createdAt:
                          type: number
                        trigger:
                          anyOf:
                            - type: string
                            - type: "null"
                        compacted:
                          anyOf:
                            - type: boolean
                            - type: "null"
                        summaryFailed:
                          anyOf:
                            - type: boolean
                            - type: "null"
                        skipReason:
                          anyOf:
                            - type: string
                            - type: "null"
                        contextTokensBefore:
                          anyOf:
                            - type: number
                            - type: "null"
                        contextTokensAfter:
                          anyOf:
                            - type: number
                            - type: "null"
                        messagesBefore:
                          anyOf:
                            - type: number
                            - type: "null"
                        messagesAfter:
                          anyOf:
                            - type: number
                            - type: "null"
                        compactedMessages:
                          anyOf:
                            - type: number
                            - type: "null"
                        preservedTailMessages:
                          anyOf:
                            - type: number
                            - type: "null"
                        durationMs:
                          anyOf:
                            - type: number
                            - type: "null"
                        summaryModel:
                          anyOf:
                            - type: string
                            - type: "null"
                        summaryInputTokens:
                          anyOf:
                            - type: number
                            - type: "null"
                        summaryOutputTokens:
                          anyOf:
                            - type: number
                            - type: "null"
                        summaryText:
                          anyOf:
                            - type: string
                            - type: "null"
                      required:
                        - id
                        - createdAt
                        - trigger
                        - compacted
                        - summaryFailed
                        - skipReason
                        - contextTokensBefore
                        - contextTokensAfter
                        - messagesBefore
                        - messagesAfter
                        - compactedMessages
                        - preservedTailMessages
                        - durationMs
                        - summaryModel
                        - summaryInputTokens
                        - summaryOutputTokens
                        - summaryText
                      additionalProperties: false
                required:
                  - conversationId
                  - events
                additionalProperties: false
        "400":
          description: Returned when the callId is missing or refers to a call in a different conversation.
        "404":
          description: Returned when the conversation or the referenced LLM call does not exist.
