  /v1/conversation-starters:
    get:
      operationId: conversationstarters_get
      summary: List conversation starters
      description: Return conversation starter chips, ordered for category diversity.
      tags:
        - conversation-starters
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Max starters to return (1–20, default 4)
        - name: offset
          in: query
          required: false
          schema:
            type: integer
          description: Pagination offset (default 0)
        - name: scope_id
          in: query
          required: false
          schema:
            type: string
          description: Scope ID (default "default")
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  starters:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        label:
                          type: string
                        prompt:
                          type: string
                        category:
                          anyOf:
                            - type: string
                            - type: "null"
                        batch:
                          type: integer
                          minimum: -9007199254740991
                          maximum: 9007199254740991
                      required:
                        - id
                        - label
                        - prompt
                        - category
                        - batch
                      additionalProperties: false
                    description: Ordered list of starter chips
                  total:
                    type: integer
                    minimum: -9007199254740991
                    maximum: 9007199254740991
                    description: Total number of available starters
                  status:
                    type: string
                    enum:
                      - ready
                      - refreshing
                      - empty
                      - generating
                    description: "One of: ready, refreshing, empty, generating"
                required:
                  - starters
                  - total
                  - status
                additionalProperties: false
