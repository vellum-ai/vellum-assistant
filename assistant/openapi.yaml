    get:
      operationId: schedules_worker_status_get
      summary: Schedule worker status
      description:
        Reports the schedule worker process state, schedules.worker.enabled, and whether the daemon's in-process
        scheduler is currently executing schedules.
      tags:
        - system
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - running
                      - not_running
                  pid:
                    type: number
                  workerEnabled:
                    type: boolean
                  inProcessScheduler:
                    type: object
                    properties:
                      status:
                        type: string
                        enum:
                          - running
                          - not_running
                      pid:
                        type: number
                    required:
                      - status
                    additionalProperties: false
                required:
                  - status
                  - workerEnabled
                  - inProcessScheduler
                additionalProperties: false
