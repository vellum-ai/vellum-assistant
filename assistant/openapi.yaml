      operationId: memory_v2_reembedskills_post
      summary: Re-seed v2 skill entries from the current skill catalog
      description: Synchronously re-runs seedV2SkillEntries against the current skill catalog. Gated on config.memory.v2.enabled.
      tags:
        - memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: {}
              additionalProperties: false
      responses:
        "200":
          description: Successful response
  /v1/memory/v2/router-prompt-template:
    get:
      operationId: memory_v2_routerprompttemplate_get
      summary: Return the bundled router system-prompt template
      description:
        Returns the bundled `ROUTER_PROMPT` body with placeholders intact (`{{ASSISTANT_NAME}}`, `{{USER_NAME}}`,
        `{{PAGE_INDEX}}`). Used by the memory router playground's 'Load default' affordance so users have a known-good
        starting point when authoring an inline prompt override.
      tags:
        - memory
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  template:
                    type: string
                required:
                  - template
                additionalProperties: false
  /v1/memory/v2/simulate-router:
    post:
      operationId: memory_v2_simulaterouter_post
      summary: Dry-run the v4 router with config overrides (read-only)
      description:
        Runs the memory router against the live page index + EMA scores with optional tier_size / batch_size
        overrides, without recording an injection event or writing an activation log. Returns the slugs that would have
        been selected, per-slug tier provenance, EMA scores, and the effective router config so operators can validate
        knob changes before flipping them in workspace config.
      tags:
        - memory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recentTurnPairs:
                  minItems: 1
                  type: array
                  items:
                    type: object
                    properties:
                      assistantMessage:
                        type: string
                      userMessage:
                        type: string
                    required:
                      - assistantMessage
                      - userMessage
                    additionalProperties: false
                nowText:
                  type: string
                configOverrides:
                  type: object
                  properties:
                    tier1_size:
                      anyOf:
                        - type: integer
                          minimum: 1
                          maximum: 9007199254740991
                        - type: "null"
                    tier2_size:
                      anyOf:
                        - type: integer
                          minimum: 1
                          maximum: 9007199254740991
                        - type: "null"
                    batch_size:
                      anyOf:
                        - type: integer
                          minimum: 1
                          maximum: 9007199254740991
                        - type: "null"
                  additionalProperties: false
                profileOverride:
                  type: string
                  minLength: 1
                routerPromptOverride:
                  type: string
                  maxLength: 1000000
              required:
                - recentTurnPairs
              additionalProperties: false
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  selectedSlugs:
                    type: array
                    items:
                      type: string
                  sourceBySlug:
                    type: object
                    propertyNames:
                      type: string
                    additionalProperties:
                      type: string
                  scores:
                    type: object
                    propertyNames:
                      type: string
                    additionalProperties:
                      type: number
                  failureReason:
                    anyOf:
                      - type: string
                      - type: "null"
                  effectiveConfig:
                    type: object
                    properties:
                      tier1_size:
                        anyOf:
                          - type: number
                          - type: "null"
                      tier2_size:
                        anyOf:
                          - type: number
                          - type: "null"
                      batch_size:
                        anyOf:
                          - type: number
                          - type: "null"
                      max_page_ids:
                        type: number
                    required:
                      - tier1_size
                      - tier2_size
                      - batch_size
                      - max_page_ids
                    additionalProperties: false
                  overrides:
                    type: object
                    properties:
                      tier1_size:
                        anyOf:
                          - type: number
                          - type: "null"
                      tier2_size:
                        anyOf:
                          - type: number
                          - type: "null"
                      batch_size:
                        anyOf:
                          - type: number
                          - type: "null"
                    additionalProperties: false
                  totalCandidatePages:
                    type: number
                  profileOverride:
                    anyOf:
                      - type: string
                      - type: "null"
                  routerPromptOverridden:
                    type: boolean
                required:
                  - selectedSlugs
                  - sourceBySlug
                  - scores
                  - failureReason
                  - effectiveConfig
                  - overrides
                  - totalCandidatePages
                  - profileOverride
                  - routerPromptOverridden
                additionalProperties: false
