        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  workerWasRunning:
                    type: boolean
                  pid:
                    type: number
                  workerEnabled:
                    type: boolean
                    const: false
                required:
                  - workerWasRunning
                  - workerEnabled
                additionalProperties: false
