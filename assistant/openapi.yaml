      description:
        Delete a provider connection. Fails with 400 for the Vellum-managed connection (vellum) which is re-seeded
        on boot. Fails with 409 if any profile or call-site references the connection.
      tags:
        - inference
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    const: true
                required:
                  - ok
                additionalProperties: false
        "400":
          description: Connection is a Vellum-managed connection and cannot be deleted
        "404":
          description: Connection not found
        "409":
          description: Connection is referenced by profile(s) or call site(s)
    get:
      operationId: inference_providerconnections_by_name_get
      summary: Get a provider connection
      description: Return a single provider connection by name.
      tags:
        - inference
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
        "404":
          description: Connection not found
    patch:
      operationId: inference_providerconnections_by_name_patch
      summary: Update a provider connection
      description:
        Update an existing connection. Cannot rename or change the provider. For the Vellum-managed connection
        (vellum) the auth is locked to platform; label remains editable.
      tags:
        - inference
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                auth:
                  $ref: "#/components/schemas/Auth"
                label:
                  anyOf:
                    - type: string
                      minLength: 1
                    - type: "null"
                base_url:
                  anyOf:
                    - type: string
                      format: uri
                    - type: "null"
                models:
                  anyOf:
                    - type: array
                      items:
                        $ref: "#/components/schemas/ConnectionModel"
                    - type: "null"
              required:
                - auth
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderConnection"
        "400":
          description: Invalid auth schema, or attempt to change auth on a managed connection
        "404":
          description: Connection not found
