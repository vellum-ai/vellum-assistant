        - name: memberOnly
          in: query
          required: false
          schema:
            type: string
            enum:
              - "true"
              - "false"
          description:
            "When 'true', only return rooms the connected identity is in: channels with is_member plus group DMs. 1:1
            DMs are excluded — they are person-scoped, and Slack materializes IM rows without any conversation
            happening."
