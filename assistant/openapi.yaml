        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (required)
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          description: Max results per category (1–100, default 20)
        - name: categories
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated categories to search
