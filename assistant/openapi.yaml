                    description: Assistant-minted internal conversation id. The authoritative identifier for the conversation.
                  conversationKey:
                    type: string
                    description: Echo of the optional external key supplied by the client.
                  conversationType:
                    type: string
                  created:
                    type: boolean
                required:
                  - id
                  - conversationKey
                  - conversationType
                  - created
                additionalProperties: false
