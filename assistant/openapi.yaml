                - path
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  manifest:
                    type: object
                    properties: {}
                    additionalProperties: {}
                  error:
                    type: string
                required:
                  - valid
                additionalProperties: false
