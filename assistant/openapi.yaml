  /v1/monitoring/stop:
    post:
      operationId: monitoring_stop_post
      summary: Stop the resource monitor
      description: SIGTERMs the resource monitor process if it is running. The monitor respawns on the next daemon boot.
      tags:
        - system
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  monitoringWasRunning:
                    type: boolean
                  pid:
                    type: number
                required:
                  - monitoringWasRunning
                additionalProperties: false
  /v1/notification-intent-result:
    post:
      operationId: notificationintentresult_post
      summary: Report notification delivery result
      description: Client acknowledgment for local notification delivery outcome.
      tags:
        - notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deliveryId:
                  type: string
                  minLength: 1
                  description: Notification delivery ID
                success:
                  type: boolean
                  description: Whether delivery succeeded
                errorMessage:
                  type: string
                  description: Error message if delivery failed
                errorCode:
                  type: string
                  description: Error code if delivery failed
              required:
                - deliveryId
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
                additionalProperties: false
  /v1/notifications/edit:
    post:
      operationId: notifications_edit_post
      summary: Edit an already-sent notification
      description:
        Patch the home-feed entry for a notification and, where supported (Slack today), update the delivered
        message in place.
      tags:
        - notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  minLength: 1
                  description: Feed item id (notif:<uuid>) or bare uuid
                title:
                  type: string
                body:
                  type: string
                urgency:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                    - critical
                status:
                  type: string
                  enum:
                    - new
                    - seen
                    - acted_on
                    - dismissed
              required:
                - id
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  feedItem:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        const: notification
                      priority:
                        type: integer
                        minimum: 0
                        maximum: 100
                      title:
                        type: string
                      summary:
                        type: string
                      timestamp:
                        type: string
                      status:
                        default: new
                        type: string
                        enum:
                          - new
                          - seen
                          - acted_on
                          - dismissed
                      expiresAt:
                        type: string
                      actions:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            label:
                              type: string
                            prompt:
                              type: string
                          required:
                            - id
                            - label
                            - prompt
                          additionalProperties: false
                      urgency:
                        type: string
                        enum:
                          - low
                          - medium
                          - high
                          - critical
                      conversationId:
                        type: string
                      detailPanel:
                        type: object
                        properties:
                          kind:
                            type: string
                            enum:
                              - emailDraft
                              - documentPreview
                              - permissionChat
                              - paymentAuth
                              - toolPermission
                              - updatesList
                        required:
                          - kind
                        additionalProperties: false
                      category:
                        type: string
                        enum:
                          - security
                          - scheduling
                          - background
                          - email
                          - system
                      noteworthy:
                        type: boolean
                      fromAssistant:
                        type: boolean
                      metadata:
                        type: object
                        propertyNames:
                          type: string
                        additionalProperties: {}
                      sourceType:
                        type: string
                        enum:
                          - heartbeat
                          - memory_consolidation
                          - schedule
                          - auto_analysis
                          - user
                          - other
                      sourceKey:
                        type: string
                      sourceLabel:
                        type: string
                      createdAt:
                        type: string
                    required:
                      - id
                      - type
                      - priority
                      - summary
                      - timestamp
                      - status
                      - createdAt
                    additionalProperties: false
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        channel:
                          type: string
                        deliveryId:
                          type: string
                        outcome:
                          type: string
                          enum:
                            - updated
                            - unsupported
                            - skipped
                            - failed
                        reason:
                          type: string
                      required:
                        - channel
                        - deliveryId
                        - outcome
                      additionalProperties: false
                required:
                  - ok
                  - feedItem
                  - channels
                additionalProperties: false
        "404":
          description: No notification found for the supplied id
  /v1/notifications/emit:
    post:
      operationId: notifications_emit_post
      summary: Emit a notification signal
      description: Emit a notification signal into the pipeline for routing and delivery.
      tags:
        - notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceEventName:
                  type: string
                  minLength: 1
                sourceChannel:
                  type: string
                  enum:
                    - assistant_tool
                    - vellum
                    - phone
                    - telegram
                    - whatsapp
                    - slack
                    - email
                    - platform
                    - a2a
                    - scheduler
                    - watcher
                sourceContextId:
                  type: string
                  minLength: 1
                attentionHints:
                  type: object
                  properties:
                    requiresAction:
                      type: boolean
                    urgency:
                      type: string
                      enum:
                        - low
                        - medium
                        - high
                        - critical
                    deadlineAt:
                      type: number
                    isAsyncBackground:
                      type: boolean
                    visibleInSourceNow:
                      type: boolean
                  required:
                    - requiresAction
                    - urgency
                    - isAsyncBackground
                    - visibleInSourceNow
                contextPayload:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                routingIntent:
                  type: string
                  enum:
                    - single_channel
                    - multi_channel
                    - all_channels
                conversationAffinityHint:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties:
                    type: string
                dedupeKey:
                  type: string
                throwOnError:
                  type: boolean
                originatingConversationId:
                  type: string
              required:
                - sourceEventName
                - sourceChannel
                - sourceContextId
                - attentionHints
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  signalId:
                    type: string
                  dispatched:
                    type: boolean
                  deduplicated:
                    type: boolean
                  reason:
                    type: string
                required:
                  - signalId
                  - dispatched
                  - deduplicated
                  - reason
                additionalProperties: false
