                additionalProperties: false
  /v1/backup/enable:
    post:
      operationId: backup_enable_post
      summary: Enable automated backups
      description: Sets backup.enabled = true. Optionally overrides intervalHours (1-168), retention (1-100), and offsiteEnabled.
      tags:
        - backups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                intervalHours:
                  type: integer
                  minimum: 1
                  maximum: 168
                retention:
                  type: integer
                  minimum: 1
                  maximum: 100
                offsiteEnabled:
                  type: boolean
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties: {}
                additionalProperties: {}
  /v1/backup/status:
    get:
      operationId: backup_status_get
      summary: Show backup status and next-run timing
      description:
        Reports enabled/disabled state, interval and retention, last-run and next-run timing from the
        backup:last_run_at checkpoint, local snapshot count, and per-destination reachability and snapshot counts. When
        `backup.offsite.enabled` is false the `offsite` array is empty and `offsiteEnabled` is false.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  intervalHours:
                    type: number
                  retention:
                    type: number
                  lastRunAt:
                    anyOf:
                      - type: string
                      - type: "null"
                  nextRunAt:
                    anyOf:
                      - type: string
                      - type: "null"
                  localDir:
                    type: string
                  localSnapshotCount:
                    type: number
                  offsiteEnabled:
                    type: boolean
                  offsite:
                    type: array
                    items:
                      type: object
                      properties:
                        path:
                          type: string
                        encrypt:
                          type: boolean
                        reachable:
                          type: boolean
                        snapshotCount:
                          type: number
                      required:
                        - path
                        - encrypt
                        - reachable
                        - snapshotCount
                      additionalProperties: false
                required:
                  - enabled
                  - intervalHours
                  - retention
                  - lastRunAt
                  - nextRunAt
                  - localDir
                  - localSnapshotCount
                  - offsiteEnabled
                  - offsite
                additionalProperties: false
  /v1/backups:
    get:
      operationId: backups_get
      summary: List backup snapshots
      description:
        Lists local and offsite backup snapshots. Each offsite destination includes a `reachable` flag reflecting
        whether the backing volume is currently available. When `backup.offsite.enabled` is false the `offsite` array is
        empty and `offsiteEnabled` is false — clients should gate offsite UI on `offsiteEnabled` rather than
        `offsite.length`.
      tags:
        - backups
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  local:
                    type: array
                    items: {}
                  offsite:
                    type: array
                    items:
                      type: object
                      properties:
                        destination:
                          type: object
                          properties: {}
                          additionalProperties: {}
                        snapshots:
                          type: array
                          items: {}
                        reachable:
                          type: boolean
                      required:
                        - destination
                        - snapshots
                        - reachable
                      additionalProperties: false
                  offsiteEnabled:
                    type: boolean
                  nextRunAt:
                    anyOf:
                      - type: string
                      - type: "null"
                required:
                  - local
                  - offsite
                  - offsiteEnabled
                  - nextRunAt
                additionalProperties: false
