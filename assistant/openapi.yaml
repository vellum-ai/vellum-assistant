                            displayName:
                              type: string
                            notes:
                              anyOf:
                                - type: string
                                - type: "null"
                            lastInteraction:
                              anyOf:
                                - type: number
                                - type: "null"
                          required:
                            - id
                            - displayName
                            - notes
                            - lastInteraction
                          additionalProperties: false
