                                properties:
                                  currentBytes:
                                    type: number
                                  limitBytes:
                                    anyOf:
                                      - type: number
                                      - type: "null"
                                  peakBytes:
                                    anyOf:
                                      - type: number
                                      - type: "null"
                                  ratio:
                                    anyOf:
                                      - type: number
                                      - type: "null"
                                required:
                                  - currentBytes
                                  - limitBytes
                                  - peakBytes
                                  - ratio
                                additionalProperties: false
                              - type: "null"
                          memoryStat:
                            anyOf:
                              - type: object
                                properties:
                                  anonBytes:
                                    anyOf:
                                      - type: number
                                      - type: "null"
                                  fileBytes:
                                    anyOf:
                                      - type: number
                                      - type: "null"
                                  kernelBytes:
