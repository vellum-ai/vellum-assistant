                            externalChatId:
                              type: string
                            externalChatName:
                              type: string
                            externalThreadId:
                              type: string
                            externalUserId:
                              anyOf:
                                - type: string
                                - type: "null"
                            displayName:
                              anyOf:
                                - type: string
                                - type: "null"
                            username:
                              anyOf:
                                - type: string
                                - type: "null"
                            slackThread:
