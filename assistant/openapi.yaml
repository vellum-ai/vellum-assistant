                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                    required:
                      - greeting
                      - timeAwayLabel
                      - newCount
                    additionalProperties: false
                required:
                  - items
                  - updatedAt
                  - contextBanner
                additionalProperties: false
