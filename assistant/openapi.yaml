              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        type:
                          type: string
                          enum:
                            - channel
                            - group
                            - dm
                        isPrivate:
                          type: boolean
                        isMember:
                          type: boolean
                        memberCount:
                          anyOf:
                            - type: number
                            - type: "null"
                        topic:
                          anyOf:
                            - type: string
                            - type: "null"
                        imageUrl:
                          anyOf:
                            - type: string
                            - type: "null"
                      required:
                        - id
                        - name
                        - type
