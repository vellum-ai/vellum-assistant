      summary: List profiler runs
      description: Enumerate all profiler run directories with manifest metadata, sorted newest-first.
      tags:
        - profiler
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      type: object
                      properties:
                        runId:
                          type: string
                        status:
                          type: string
                          enum:
                            - active
                            - completed
                        createdAt:
                          type: string
                        updatedAt:
                          type: string
                        totalBytes:
                          type: number
                        completedAt:
                          type: string
                      required:
                        - runId
                        - status
                        - createdAt
                        - updatedAt
                        - totalBytes
                      additionalProperties: false
                  totalRuns:
                    type: number
                  activeRunId:
                    anyOf:
                      - type: string
                      - type: "null"
                required:
                  - runs
                  - totalRuns
                  - activeRunId
                additionalProperties: false
  /v1/profiler/runs/{runId}:
    delete:
      operationId: profiler_runs_by_runId_delete
      summary: Delete profiler run
      description: Delete a completed profiler run and recalculate disk-budget state. Rejects deletion of the currently active run.
      tags:
        - profiler
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  runId:
                    type: string
                  remainingRuns:
                    type: number
                  activeRunOverBudget:
                    type: boolean
                required:
                  - deleted
                  - runId
                  - remainingRuns
                  - activeRunOverBudget
                additionalProperties: false
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
    get:
      operationId: profiler_runs_by_runId_get
      summary: Get profiler run detail
      description: Return manifest metadata, Bun-generated markdown summary, and current retention state for a single profiler run.
      tags:
        - profiler
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId:
                    type: string
                  status:
                    type: string
                    enum:
                      - active
                      - completed
                  createdAt:
                    type: string
                  updatedAt:
                    type: string
                  totalBytes:
                    type: number
                  completedAt:
                    type: string
                  summary:
                    anyOf:
                      - type: string
                      - type: "null"
                  isActive:
                    type: boolean
                  budget:
                    type: object
                    properties:
                      maxBytes:
                        type: number
                      totalBytesAllRuns:
                        type: number
                      remainingBytes:
                        type: number
                      overBudget:
                        type: boolean
                    required:
                      - maxBytes
                      - totalBytesAllRuns
                      - remainingBytes
                      - overBudget
                    additionalProperties: false
                required:
                  - runId
                  - status
                  - createdAt
                  - updatedAt
                  - totalBytes
                  - summary
                  - isActive
                  - budget
                additionalProperties: false
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
  /v1/profiler/runs/{runId}/export:
    post:
      operationId: profiler_runs_by_runId_export_post
