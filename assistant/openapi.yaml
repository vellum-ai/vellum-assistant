                            name:
                              type: string
                            expression:
                              anyOf:
                                - type: string
                                - type: "null"
                            message:
                              type: string
                            enabled:
                              type: boolean
                            nextRunAt:
                              anyOf:
                                - type: number
                                - type: "null"
                          required:
                            - id
                            - name
                            - expression
                            - message
                            - enabled
                            - nextRunAt
                          additionalProperties: false
