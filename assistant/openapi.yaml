        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  secrets:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - api_key
                            - credential
                        name:
                          type: string
                      required:
                        - type
                        - name
                      additionalProperties: false
                    description: List of secret metadata entries, each with type and name
                  accounts:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - api_key
                            - credential
                        name:
                          type: string
                      required:
                        - type
