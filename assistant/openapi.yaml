  /v1/monitoring/start:
    post:
      operationId: monitoring_start_post
      summary: Start the resource monitor
      description:
        Spawns (or reuses) the resource monitor process as a child of the daemon. The daemon also spawns it at
        every boot.
      tags:
        - system
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  pid:
                    type: number
                  alreadyRunning:
                    type: boolean
                  pidPath:
                    type: string
                required:
                  - pid
                  - alreadyRunning
                  - pidPath
                additionalProperties: false
  /v1/monitoring/status:
    get:
      operationId: monitoring_status_get
      summary: Resource monitor status
      description:
        Reports the resource monitor process state, the forensics data directory, and the most recent persisted
        memory/disk sample.
      tags:
        - system
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - running
                      - not_running
                  pid:
                    type: number
                  dataDir:
                    type: string
                  latestSample:
                    anyOf:
                      - type: object
                        properties:
