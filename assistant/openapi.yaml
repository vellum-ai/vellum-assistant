                            slackChannel:
                              type: object
                              properties:
                                channelId:
                                  type: string
                                name:
                                  type: string
                                link:
                                  type: object
                                  properties:
                                    webUrl:
                                      type: string
                                  required:
                                    - webUrl
                                  additionalProperties: false
                              required:
                                - channelId
                              additionalProperties: false
                            sourceLink:
