                    type: boolean
                  type:
                    type: string
                  name:
                    type: string
                required:
                  - success
                  - type
                  - name
                additionalProperties: false
  /v1/secrets/read:
    post:
      operationId: secrets_read_post
      summary: Read a secret value
      description: Retrieve the decrypted value of a stored secret by name.
      tags:
        - secrets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: "Secret type: 'api_key' or 'credential'"
                name:
                  type: string
                  description: Name of the secret to read
                reveal:
                  type: boolean
                  description: If true, return the decrypted value; otherwise return a masked version
              required:
                - type
                - name
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  found:
                    type: boolean
                  value:
                    type: string
                    description: Decrypted value (only when reveal=true and found)
                  masked:
                    type: string
                    description: Masked value (when reveal=false and found)
                  unreachable:
                    type: boolean
                required:
                  - found
                  - value
                  - masked
                  - unreachable
                additionalProperties: false
