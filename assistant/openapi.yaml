                          type: string
                          enum:
                            - nudge
                            - digest
                            - action
                            - thread
                        priority:
                          type: integer
                          minimum: 0
                          maximum: 100
                        title:
                          type: string
                        summary:
                          type: string
                        source:
                          type: string
                          enum:
                            - gmail
                            - slack
                            - calendar
                            - assistant
                        timestamp:
                          type: string
                        status:
                          default: new
                          type: string
                          enum:
                            - new
                            - seen
                            - acted_on
                            - dismissed
                        expiresAt:
                          type: string
                        minTimeAway:
                          type: integer
                          minimum: 0
                          maximum: 9007199254740991
                        actions:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              label:
                                type: string
                              prompt:
                                type: string
