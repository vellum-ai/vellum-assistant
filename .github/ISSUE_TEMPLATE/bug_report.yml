name: Bug report
description: Report a bug with your Vellum assistant
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below so we can investigate.

        ### Send us your logs

        Click **Share feedback** in the app (bottom of the window, or **Help → Share feedback**). This sends your recent logs to the team and is by far the most useful thing you can do to help us reproduce the issue.

  - type: checkboxes
    id: shared-feedback
    attributes:
      label: Did you share feedback from the app?
      description: Clicking **Share feedback** sends us the logs we need to diagnose what went wrong. Skip only if the app won't open at all.
      options:
        - label: Yes, I clicked **Share feedback** in the app before opening this issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this? Be as specific as possible.
      placeholder: |
        1. Run `vellum ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Vellum version
      description: Output of `vellum --version`, or the macOS app version.
      placeholder: e.g. 1.2.3
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS
      description: Your operating system and version.
      placeholder: e.g. macOS 15.4, Ubuntu 24.04
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - CLI (bun install -g vellum)
        - Built from source
        - macOS Desktop App
        - Other
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant log output or attach screenshots. Wrap logs in a code block.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might help us understand the issue.
    validations:
      required: false
