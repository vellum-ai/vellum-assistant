apiVersion: apps/v1
kind: Deployment
metadata:
  name: vellum-assistant
  namespace: ${NAMESPACE}
  labels:
    app: vellum-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vellum-assistant
  template:
    metadata:
      labels:
        app: vellum-assistant
    spec:
      containers:
        - name: web
          image: gcr.io/vellum-nonprod/vellum-assistant:${IMAGE_TAG}
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              value: ${DATABASE_URL}
            - name: ANTHROPIC_API_KEY
              value: ${ANTHROPIC_API_KEY}
            - name: BETTER_AUTH_SECRET
              value: ${BETTER_AUTH_SECRET}
            - name: BETTER_AUTH_URL
              value: http://${NAMESPACE}.assistant-previews.vellum.ai
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
