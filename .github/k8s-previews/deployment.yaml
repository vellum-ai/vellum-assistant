apiVersion: apps/v1
kind: Deployment
metadata:
  name: vellum-assistant
  namespace: ${NAMESPACE}
  labels:
    app: vellum-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vellum-assistant
  template:
    metadata:
      labels:
        app: vellum-assistant
    spec:
      serviceAccountName: vellum-assistant
      containers:
        - name: web
          image: gcr.io/vellum-nonprod/vellum-assistant:${IMAGE_TAG}
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: BETTER_AUTH_URL
              value: http://app.${NAMESPACE}.previews.vellum.ai
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vellum-assistant-secrets
                  key: DATABASE_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: vellum-assistant-secrets
                  key: ANTHROPIC_API_KEY
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: vellum-assistant-secrets
                  key: BETTER_AUTH_SECRET
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--structured-logs"
            - "--auto-iam-authn"
            - "vellum-nonprod:us-central1:vellum-previews-postgres"
            - "--port=5432"
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
