name: Install shared packages
description: >
  Run `bun install --frozen-lockfile` in each listed directory so the
  packages a CI job consumes have their own node_modules populated. Used by
  jobs for NON-workspace-member consumers (macOS/Electron), which still take
  `file:` deps on workspace members: bun resolves a file: dep to its real
  path, so the consumer's typecheck only resolves a shared package's own
  deps if that package's node_modules exists. Listed member directories
  resolve to the workspace root install, which populates them.

  As a guard against the easy-to-miss transitive case, this action fails if a
  listed `packages/*` entry declares a `file:` dependency on another
  `packages/*` directory that is not also listed — that omission is what
  silently breaks a consumer's install. Cross-tree dirs outside `packages/`
  are installed as given and not walked, so they never trigger false
  positives.

inputs:
  packages:
    description: >
      Whitespace-separated list of directories, relative to the repo root,
      to install (e.g. "packages/local-mode" or
      "packages/ces-client gateway"). Bun must already be set
      up by the calling job.
    required: true

runs:
  using: composite
  steps:
    - name: Install shared packages
      shell: bash
      env:
        PACKAGES_INPUT: ${{ inputs.packages }}
      run: |
        set -euo pipefail
        ws="${GITHUB_WORKSPACE}"

        # Normalize the input into a deduped list of repo-root-relative dirs,
        # validating each exists and is a package.
        _listed=""
        normalized=()
        for raw in ${PACKAGES_INPUT}; do
          [ -n "${raw}" ] || continue
          abs="$(cd "${ws}/${raw}" 2>/dev/null && pwd)" || {
            echo "::error::install-shared-packages: directory '${raw}' not found"
            exit 1
          }
          rel="${abs#"${ws}/"}"
          if [ ! -f "${abs}/package.json" ]; then
            echo "::error::install-shared-packages: no package.json in '${rel}'"
            exit 1
          fi
          if ! echo "${_listed}" | grep -qxF "${rel}"; then
            _listed="${_listed}${rel}"$'\n'
            normalized+=("${rel}")
          fi
        done

        # Resolve a package's own file: deps to repo-root-relative dirs.
        file_deps() {
          jq -r '
            ((.dependencies // {}) + (.devDependencies // {}))
            | to_entries[]
            | select((.value | type) == "string" and (.value | startswith("file:")))
            | .value[5:]
          ' "${ws}/$1/package.json"
        }

        # Guard: the transitive file: dep closure of every listed packages/*
        # entry must itself be listed. Walking is scoped to packages/* so
        # cross-tree service/skill dirs are not treated as missing.
        missing=0
        for rel in "${normalized[@]}"; do
          case "${rel}" in packages/*) ;; *) continue ;; esac
          queue=("${rel}")
          _walked=""
          while [ "${#queue[@]}" -gt 0 ]; do
            cur="${queue[0]}"
            queue=("${queue[@]:1}")
            echo "${_walked}" | grep -qxF "${cur}" && continue
            _walked="${_walked}${cur}"$'\n'
            while IFS= read -r dep; do
              [ -n "${dep}" ] || continue
              depabs="$(cd "${ws}/${cur}/${dep}" 2>/dev/null && pwd)" || continue
              deprel="${depabs#"${ws}/"}"
              case "${deprel}" in packages/*) ;; *) continue ;; esac
              if ! echo "${_listed}" | grep -qxF "${deprel}"; then
                echo "::error::install-shared-packages: '${cur}' depends on '${deprel}' via a file: dependency, but it is not in the packages list. Add it so its dependencies resolve in CI."
                missing=1
              fi
              queue+=("${deprel}")
            done < <(file_deps "${cur}")
          done
        done
        [ "${missing}" -eq 0 ] || exit 1

        for rel in "${normalized[@]}"; do
          echo "::group::bun install --frozen-lockfile (${rel})"
          (cd "${ws}/${rel}" && bun install --frozen-lockfile)
          echo "::endgroup::"
        done
