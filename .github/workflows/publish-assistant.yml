name: Publish Assistant to npm

on:
  push:
    branches: [main]
    paths: [assistant/package.json]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: assistant

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          PREVIOUS=$(git show HEAD~1:assistant/package.json | jq -r '.version')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.version.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: |
          if ! bun install --frozen-lockfile; then
            echo "bun install --frozen-lockfile failed; regenerating lockfile and retrying..."
            rm -f bun.lock
            rm -rf node_modules
            bun install
          fi

      - name: Setup Node
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        # --no-provenance: sigstore provenance signing fails for private repos (see PR #1660)
        run: npm publish --access public --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.current }}

  update-meta:
    needs: [publish]
    if: needs.publish.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Update meta-package dependency
        env:
          NEW_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          cd meta

          CURRENT=$(jq -r '.dependencies["@vellumai/assistant"]' package.json)
          if [ "$CURRENT" = "$NEW_VERSION" ]; then
            echo "meta already depends on @vellumai/assistant@$NEW_VERSION"
            exit 0
          fi

          jq --arg v "$NEW_VERSION" '.dependencies["@vellumai/assistant"] = $v' package.json > package.json.tmp && mv package.json.tmp package.json

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          if git diff --quiet; then
            echo "No meta-package changes to commit"
            exit 0
          fi

          BRANCH="auto/bump-assistant-${NEW_VERSION}-in-meta"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add meta/package.json
          git commit -m "Bump @vellumai/assistant to ${NEW_VERSION} in meta"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "Bump @vellumai/assistant to ${NEW_VERSION} in meta" \
            --body "Auto-generated PR to update @vellumai/assistant to ${NEW_VERSION} in the meta-package." \
            --base main \
            --head "$BRANCH")
          sleep 10
          gh pr merge "$PR_URL" --auto --squash || echo "PR created but could not be auto-merged"

  notify-failure:
    if: failure()
    needs: [publish, update-meta]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack of publish failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\u274c Publish Assistant to npm Failed"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Publish Assistant to npm\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Triggered by:* ${{ github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    style: danger

