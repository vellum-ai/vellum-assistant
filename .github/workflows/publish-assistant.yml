name: Publish Assistant to npm

on:
  push:
    branches: [main]
    paths: [assistant/package.json]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: assistant

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          PREVIOUS=$(git show HEAD~1:assistant/package.json | jq -r '.version')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.version.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Wait for internal dependencies
        if: steps.version.outputs.changed == 'true'
        run: |
          CLI_VERSION=$(jq -r '.dependencies["@vellumai/cli"] // empty' package.json)
          if [ -z "$CLI_VERSION" ]; then
            echo "No pinned @vellumai/cli dependency, skipping wait"
            exit 0
          fi
          echo "Waiting for @vellumai/cli@$CLI_VERSION on npm..."
          for i in $(seq 1 20); do
            if npm view "@vellumai/cli@$CLI_VERSION" version 2>/dev/null; then
              echo "Found @vellumai/cli@$CLI_VERSION on npm"
              exit 0
            fi
            echo "Attempt $i/20: not yet available, retrying in 30s..."
            sleep 30
          done
          echo "Timed out waiting for @vellumai/cli@$CLI_VERSION"
          exit 1

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Setup Node
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify-failure:
    if: failure()
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack of publish failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\u274c Publish Assistant to npm Failed"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Publish Assistant to npm\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Triggered by:* ${{ github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    style: danger
