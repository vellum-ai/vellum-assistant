  push-gateway-manifest:
    needs: [extract-version, push-gateway-image]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment: ${{ needs.extract-version.outputs.docker_environment }}
