name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.3.1)'
        required: true

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump versions and tag
        run: |
          VERSION="${{ inputs.version }}"

          # Bump all package.json files
          for pkg in assistant cli gateway meta; do
            jq --arg v "$VERSION" '.version = $v' $pkg/package.json > tmp && mv tmp $pkg/package.json
          done

          # Bump meta-package dependency versions
          jq --arg v "$VERSION" '
            .dependencies["@vellumai/assistant"] = $v |
            .dependencies["@vellumai/cli"] = $v |
            .dependencies["@vellumai/vellum-gateway"] = $v
          ' meta/package.json > tmp && mv tmp meta/package.json

          # Bump macOS app version
          sed -i "s/^let appVersion = .*/let appVersion = \"$VERSION\"/" clients/Package.swift

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release v$VERSION"
          git tag "v$VERSION"
          git push origin main --tags

    outputs:
      version: ${{ inputs.version }}

  publish-npm:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        package: [assistant, cli, gateway]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install and publish
        run: |
          cd ${{ matrix.package }}
          if ! bun install --frozen-lockfile; then
            echo "bun install --frozen-lockfile failed; regenerating lockfile and retrying..."
            rm -f bun.lock
            rm -rf node_modules
            bun install
          fi
          npm publish --access public --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-meta:
    needs: [bump-and-tag, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Publish meta-package
        run: |
          cd meta
          npm publish --access public --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-macos:
    needs: bump-and-tag
    runs-on: macos-14
    defaults:
      run:
        working-directory: clients/macos
    env:
      DMG_PATH: build/vellum-assistant.dmg
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Import code-signing certificate
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "${{ secrets.CERTIFICATE_P12 }}" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Set version
        id: version
        run: |
          DISPLAY_VERSION="${{ needs.bump-and-tag.outputs.version }}"
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Display version: $DISPLAY_VERSION / Build version: $BUILD_VERSION"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build daemon binary
        working-directory: assistant
        run: |
          bun install
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          bun build --compile --target=bun-darwin-arm64 src/daemon/main.ts \
            --external electron --external "chromium-bidi/*" \
            --define "process.env.APP_VERSION='$DISPLAY_VERSION'" \
            --outfile ../clients/macos/daemon-bin/vellum-daemon-arm64
          bun build --compile --target=bun-darwin-x64 src/daemon/main.ts \
            --external electron --external "chromium-bidi/*" \
            --define "process.env.APP_VERSION='$DISPLAY_VERSION'" \
            --outfile ../clients/macos/daemon-bin/vellum-daemon-x64
          lipo -create \
            ../clients/macos/daemon-bin/vellum-daemon-arm64 \
            ../clients/macos/daemon-bin/vellum-daemon-x64 \
            -output ../clients/macos/daemon-bin/vellum-daemon
          rm ../clients/macos/daemon-bin/vellum-daemon-arm64 ../clients/macos/daemon-bin/vellum-daemon-x64
          chmod +x ../clients/macos/daemon-bin/vellum-daemon
          cp node_modules/web-tree-sitter/web-tree-sitter.wasm ../clients/macos/daemon-bin/
          cp node_modules/tree-sitter-bash/tree-sitter-bash.wasm ../clients/macos/daemon-bin/
          echo "Daemon universal binary built:"
          ls -lh ../clients/macos/daemon-bin/vellum-daemon
          file ../clients/macos/daemon-bin/vellum-daemon

      - name: Build CLI binary
        working-directory: cli
        run: |
          bun install
          bun build --compile --target=bun-darwin-arm64 src/index.ts \
            --external react-devtools-core \
            --outfile ../clients/macos/cli-bin/vellum-cli-arm64
          bun build --compile --target=bun-darwin-x64 src/index.ts \
            --external react-devtools-core \
            --outfile ../clients/macos/cli-bin/vellum-cli-x64
          lipo -create \
            ../clients/macos/cli-bin/vellum-cli-arm64 \
            ../clients/macos/cli-bin/vellum-cli-x64 \
            -output ../clients/macos/cli-bin/vellum-cli
          rm ../clients/macos/cli-bin/vellum-cli-arm64 ../clients/macos/cli-bin/vellum-cli-x64
          chmod +x ../clients/macos/cli-bin/vellum-cli
          echo "CLI universal binary built:"
          ls -lh ../clients/macos/cli-bin/vellum-cli
          file ../clients/macos/cli-bin/vellum-cli

      - name: Build gateway binary
        working-directory: gateway
        run: |
          bun install
          bun build --compile --target=bun-darwin-arm64 src/index.ts \
            --outfile ../clients/macos/gateway-bin/vellum-gateway-arm64
          bun build --compile --target=bun-darwin-x64 src/index.ts \
            --outfile ../clients/macos/gateway-bin/vellum-gateway-x64
          lipo -create \
            ../clients/macos/gateway-bin/vellum-gateway-arm64 \
            ../clients/macos/gateway-bin/vellum-gateway-x64 \
            -output ../clients/macos/gateway-bin/vellum-gateway
          rm ../clients/macos/gateway-bin/vellum-gateway-arm64 ../clients/macos/gateway-bin/vellum-gateway-x64
          chmod +x ../clients/macos/gateway-bin/vellum-gateway
          echo "Gateway universal binary built:"
          ls -lh ../clients/macos/gateway-bin/vellum-gateway
          file ../clients/macos/gateway-bin/vellum-gateway

      - name: Build release .app
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          SU_PUBLIC_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
          SIGN_IDENTITY="Developer ID Application" \
          ./build.sh release

          APP_PATH="dist/Vellum.app"
          ls -la "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signature verified"

      - name: Free disk space
        run: |
          rm -rf .build daemon-bin cli-bin gateway-bin
          rm -rf ../../assistant/node_modules ../../cli/node_modules ../../gateway/node_modules
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          rm -rf ~/Library/Caches/org.swift.swiftpm 2>/dev/null || true
          df -h .
          echo "Disk space freed"

      - name: Generate DMG background
        run: |
          mkdir -p build
          swift dmg/generate-background.swift build/dmg-background@2x.png

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_PATH="dist/Vellum.app"

          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          echo "Staging directory size:"
          du -sh "$DMG_STAGING"

          create-dmg \
            --volname "Vellum" \
            --background "build/dmg-background@2x.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 10 \
            --icon "Vellum.app" 175 190 \
            --icon "Applications" 530 190 \
            --hide-extension "Vellum.app" \
            --no-internet-enable \
            "$DMG_PATH" \
            "$DMG_STAGING/" \
          || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ] && [ -f "$DMG_PATH" ]; then
              echo "create-dmg exited with warning (code 2), but DMG was created successfully"
            else
              echo "create-dmg failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }

          echo "DMG created at $DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "$DMG_PATH"

          codesign --verify --verbose "$DMG_PATH"
          echo "DMG signature verified"

      - name: Notarize DMG
        run: |
          echo "Submitting DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed (status: Invalid or command error)"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_APP_PASSWORD }}" \
                --team-id "${{ secrets.APPLE_TEAM_ID }}" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "Notarization succeeded (status: Accepted)"

      - name: Staple notarization ticket
        run: |
          MAX_ATTEMPTS=15
          WAIT_SECS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "$DMG_PATH" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              echo "$STAPLE_OUTPUT"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed (exit code $STAPLE_EXIT):"
            echo "$STAPLE_OUTPUT"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          xcrun stapler validate "$DMG_PATH"
          echo "Notarization ticket stapled and validated"

      - name: Build ZIP for Sparkle auto-update
        run: |
          cd dist
          ditto -c -k --keepParent Vellum.app vellum-assistant.zip
          echo "Sparkle ZIP created:"
          ls -lh vellum-assistant.zip

      - name: Install Sparkle sign_update tool
        run: |
          brew install sparkle
          SPARKLE_BIN=$(find /opt/homebrew/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find /usr/local/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          fi
          echo "Found sign_update at: $SPARKLE_BIN"
          echo "$(dirname "$SPARKLE_BIN")" >> "$GITHUB_PATH"

      - name: Generate appcast.xml
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          BUILD_VERSION="${{ steps.version.outputs.build_version }}"

          ED_KEY_FILE=$(mktemp)
          echo "$SPARKLE_ED_PRIVATE_KEY" > "$ED_KEY_FILE"
          SIGNATURE=$(sign_update dist/vellum-assistant.zip --ed-key-file "$ED_KEY_FILE") || {
            echo "sign_update failed with exit code $?"
            rm -f "$ED_KEY_FILE"
            exit 1
          }
          rm -f "$ED_KEY_FILE"
          echo "Signature obtained: ${SIGNATURE:0:20}..."
          SIZE=$(stat -f%z dist/vellum-assistant.zip)

          REPO="vellum-ai/velly"
          FILENAME="appcast.xml"
          cat > "dist/$FILENAME" << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Vellum</title>
              <item>
                <title>${DISPLAY_VERSION}</title>
                <sparkle:version>${BUILD_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${DISPLAY_VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="https://github.com/${REPO}/releases/latest/download/vellum-assistant.zip"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          echo "Appcast generated for $REPO"

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            clients/macos/build/vellum-assistant.dmg
            clients/macos/dist/vellum-assistant.zip
            clients/macos/dist/appcast.xml
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  release:
    needs: [bump-and-tag, publish-npm, publish-meta, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant,velly

      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Download macOS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: macos-artifacts

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          VERSION_TAG="v${VERSION}"

          NOTES_FILE=$(mktemp)
          {
            echo "**Build:** \`$VERSION\`"
            echo "**Commit:** [\`$SHORT_SHA\`](https://github.com/${{ github.repository }}/commit/$FULL_SHA)"
            echo "**Built at:** $TIMESTAMP"
            echo ""
            echo "---"
            echo ""
            echo "Download the DMG, open it, and drag Vellum to your Applications folder."
            echo "Existing installations will auto-update via Sparkle."
          } > "$NOTES_FILE"

          ASSETS=()
          if [ -d "macos-artifacts" ]; then
            DMG=$(find macos-artifacts -name "vellum-assistant.dmg" -type f | head -1)
            ZIP=$(find macos-artifacts -name "vellum-assistant.zip" -type f | head -1)
            APPCAST=$(find macos-artifacts -name "appcast.xml" -type f | head -1)
            [ -n "$DMG" ] && ASSETS+=("$DMG#vellum-assistant.dmg")
            [ -n "$ZIP" ] && ASSETS+=("$ZIP#vellum-assistant.zip")
            [ -n "$APPCAST" ] && ASSETS+=("$APPCAST#appcast.xml")
          fi

          INSTALL_SH="cli/src/adapters/install.sh"
          [ -f "$INSTALL_SH" ] && ASSETS+=("$INSTALL_SH#install.sh")

          echo "Release assets: ${ASSETS[*]}"

          # Create release on vellum-assistant (this repo)
          if ! gh release view "$VERSION_TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "$VERSION_TAG" \
              "${ASSETS[@]}" \
              --repo "${{ github.repository }}" \
              --title "Vellum $VERSION" \
              --notes-file "$NOTES_FILE" \
              --latest
            echo "Release created at https://github.com/${{ github.repository }}/releases/tag/$VERSION_TAG"
          else
            echo "Release $VERSION_TAG already exists on ${{ github.repository }}, skipping"
          fi

          # Create release on velly
          VELLY_REPO="vellum-ai/velly"
          if ! gh release view "$VERSION_TAG" --repo "$VELLY_REPO" &>/dev/null; then
            gh release create "$VERSION_TAG" \
              "${ASSETS[@]}" \
              --repo "$VELLY_REPO" \
              --title "Vellum $VERSION" \
              --notes-file "$NOTES_FILE" \
              --latest
            echo "Release created at https://github.com/$VELLY_REPO/releases/tag/$VERSION_TAG"
          else
            echo "Release $VERSION_TAG already exists on $VELLY_REPO, skipping"
          fi

          rm -f "$NOTES_FILE"

  update-platform:
    needs: [bump-and-tag, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: vellum-ai/vellum-assistant-platform
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Update vel dependency
        env:
          NEW_VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          cd vel
          jq --arg v "$NEW_VERSION" '.dependencies["@vellumai/cli"] = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          bun install

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          BRANCH="auto/bump-cli-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add vel/package.json vel/bun.lock
          git commit -m "Bump @vellumai/cli to ${NEW_VERSION} in vel"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo vellum-ai/vellum-assistant-platform \
            --title "Bump @vellumai/cli to ${NEW_VERSION} in vel" \
            --body "Auto-generated PR to update @vellumai/cli to ${NEW_VERSION}." \
            --base main \
            --head "$BRANCH")
          sleep 10
          gh pr merge "$PR_URL" --auto --squash

  notify-failure:
    if: >-
      !cancelled() &&
      (needs.bump-and-tag.result == 'failure' ||
       needs.publish-npm.result == 'failure' ||
       needs.publish-meta.result == 'failure' ||
       needs.build-macos.result == 'failure' ||
       needs.release.result == 'failure' ||
       needs.update-platform.result == 'failure')
    needs: [bump-and-tag, publish-npm, publish-meta, build-macos, release, update-platform]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack of release failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\u274c Release v${{ inputs.version }} Failed"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Unified Release\n*Version:* `${{ inputs.version }}`\n*Triggered by:* ${{ github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    style: danger
