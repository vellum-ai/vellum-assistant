        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}


      - name: Get release SHA
        id: release-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download assistant manifest digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: assistant-manifest-digest-${{ needs.extract-version.outputs.docker_environment }}
          path: /tmp/assistant-digest

      - name: Download gateway manifest digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: gateway-manifest-digest-${{ needs.extract-version.outputs.docker_environment }}
          path: /tmp/gateway-digest

      - name: Download credential-executor manifest digest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: credential-executor-manifest-digest-${{ needs.extract-version.outputs.docker_environment }}
          path: /tmp/credential-executor-digest

      - name: Extract manifest digests
        id: digests
        run: |
          ASSISTANT_DIGEST=$(cat /tmp/assistant-digest/digest)
          GATEWAY_DIGEST=$(cat /tmp/gateway-digest/digest)
          CREDENTIAL_EXECUTOR_DIGEST=$(cat /tmp/credential-executor-digest/digest)
          echo "assistant_digest=${ASSISTANT_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "credential_executor_digest=${CREDENTIAL_EXECUTOR_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "gateway_digest=${GATEWAY_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Resolve platform credentials
        id: platform-creds
        run: |
          echo "api_url=${{ secrets.PLATFORM_API_URL }}" >> "$GITHUB_OUTPUT"
          echo "api_key=${{ secrets.PLATFORM_INTERNAL_SERVICE_API_KEY }}" >> "$GITHUB_OUTPUT"

      - name: Register release with platform
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          SHA="${{ steps.release-sha.outputs.sha }}"
          ASSISTANT_REPO="${{ vars.GCP_REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.ASSISTANT_IMAGE_NAME }}"
          GATEWAY_REPO="${{ vars.GCP_REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.GATEWAY_IMAGE_NAME }}"
          CREDENTIAL_EXECUTOR_REPO="${{ vars.GCP_REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ env.CREDENTIAL_EXECUTOR_IMAGE_NAME }}"
          IS_STABLE="true"

          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg released_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson is_stable "$IS_STABLE" \
            --arg assistant_repo "$ASSISTANT_REPO" \
            --arg assistant_tag "v${VERSION}" \
            --arg assistant_sha "$SHA" \
            --arg assistant_digest "${{ steps.digests.outputs.assistant_digest }}" \
            --arg gateway_repo "$GATEWAY_REPO" \
            --arg gateway_tag "v${VERSION}" \
            --arg gateway_sha "$SHA" \
            --arg gateway_digest "${{ steps.digests.outputs.gateway_digest }}" \
            --arg credential_executor_repo "$CREDENTIAL_EXECUTOR_REPO" \
            --arg credential_executor_tag "v${VERSION}" \
            --arg credential_executor_sha "$SHA" \
            --arg credential_executor_digest "${{ steps.digests.outputs.credential_executor_digest }}" \
            '{
              version: $version,
              released_at: $released_at,
              is_stable: $is_stable,
              assistant_image: {
                repository: $assistant_repo,
                tag: $assistant_tag,
                sha: $assistant_sha,
                digest: $assistant_digest
              },
              gateway_image: {
                repository: $gateway_repo,
                tag: $gateway_tag,
                sha: $gateway_sha,
                digest: $gateway_digest
              },
              credential_executor_image: {
                repository: $credential_executor_repo,
                tag: $credential_executor_tag,
                sha: $credential_executor_sha,
                digest: $credential_executor_digest
              }
            }')

          DELAYS=(5 15 30)
          MAX_ATTEMPTS=3

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            CURL_EXIT=0
            echo "Registering release v${VERSION} with platform (${{ needs.extract-version.outputs.docker_environment }}) [attempt ${attempt}/${MAX_ATTEMPTS}]..."
            HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "${{ steps.platform-creds.outputs.api_url }}/v1/internal/assistant-image-releases/" \
              -H "Content-Type: application/json" \
              -H "X-Internal-Service-Api-Key: ${{ steps.platform-creds.outputs.api_key }}" \
              -d "$PAYLOAD") || CURL_EXIT=$?

            if [ "${CURL_EXIT:-0}" -ne 0 ]; then
              echo "::warning::curl transport error (exit code $CURL_EXIT) on attempt ${attempt}"
              HTTP_STATUS="000"
            else
              echo "HTTP Status: $HTTP_STATUS"
              cat /tmp/response.json
            fi

            if [ "$HTTP_STATUS" -ge 200 ] 2>/dev/null && [ "$HTTP_STATUS" -lt 300 ] 2>/dev/null; then
              echo "Registration succeeded on attempt ${attempt}"
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              DELAY=${DELAYS[$((attempt - 1))]}
              echo "::warning::Attempt ${attempt} failed (HTTP $HTTP_STATUS). Retrying in ${DELAY}s..."
              sleep "$DELAY"
            else
              echo "::error::Release registration failed after ${MAX_ATTEMPTS} attempts (last HTTP $HTTP_STATUS)"
              exit 1
            fi
          done

      - name: Summary
        run: |
          echo "## Release Registered (${{ needs.extract-version.outputs.docker_environment }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.extract-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Tag staging release
        if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "Tagged staging release: v${VERSION}"

  # Build (untrusted: runs `bun install` postinstall scripts) is isolated from
  # publish (holds NPM_TOKEN) in a separate job. `npm pack` produces the tarball
  # here with no token; `npm publish <tarball>` below does not re-run prepack, so
  # no build/dependency code executes alongside the credential.
  build-npm-prod:
    # Build has no side effects; release-ordering gates live on publish-npm-prod.
    needs: [extract-version, ci-cli, ci-gateway]
    if: ${{ always() && !cancelled() && needs.extract-version.outputs.is_staging != 'true' && needs.ci-cli.result == 'success' && needs.ci-gateway.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      matrix:
        package: [assistant, cli, credential-executor, gateway]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Sync feature flag registry for publish
        run: bun run meta/feature-flags/sync-bundled-copies.ts

      - name: Install package dependencies
        run: |
          if ! bun install --frozen-lockfile --filter="./${{ matrix.package }}"; then
            echo "bun install --frozen-lockfile failed; regenerating lockfile and retrying..."
            rm -f bun.lock
            rm -rf node_modules
            bun install --filter="./${{ matrix.package }}"
          fi
      # bun pm pack bundles the workspace deps listed in bundledDependencies
      # and rewrites workspace:* to concrete versions; npm pack does neither
      # for symlinked workspace deps.
      - name: Pack tarball
        run: |
          cd "${{ matrix.package }}"
          mkdir -p /tmp/npm-dist
          bun pm pack --destination /tmp/npm-dist
          mv /tmp/npm-dist/*.tgz /tmp/npm-dist/package.tgz
          node -p "require('./package.json').name" > /tmp/npm-dist/name
          node -p "require('./package.json').version" > /tmp/npm-dist/version
      - name: Upload tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-tarball-prod-${{ matrix.package }}
          path: /tmp/npm-dist/
          retention-days: 1

  publish-npm-prod:
    # Don't publish until backend images are live.
    needs: [extract-version, build-npm-prod, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image]
    if: ${{ always() && !cancelled() && needs.build-npm-prod.result == 'success' && needs.push-assistant-manifest.result == 'success' && needs.push-gateway-manifest.result == 'success' && needs.push-credential-executor-manifest.result == 'success' && needs.push-dockerhub-image.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      matrix:
        package: [assistant, cli, credential-executor, gateway]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .nvmrc
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Download tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-tarball-prod-${{ matrix.package }}
          path: /tmp/npm-dist

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(cat /tmp/npm-dist/name)
          PKG_VERSION=$(cat /tmp/npm-dist/version)
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping (treating as retry)."
            exit 0
          fi
          npm publish /tmp/npm-dist/package.tgz --access public --no-provenance

  # `@vellumai/plugin-api` is the public TypeScript authoring contract external
  # plugins compile against. Unlike the other npm packages it is not a package
  # directory `npm pack` can consume directly: scripts/build-plugin-api.ts rolls
  # the plugin-api surface into a single self-contained `index.d.ts` (API
  # Extractor, zod-only external) and stamps the release version, so it gets its
  # own build/publish pair rather than a slot in the npm matrix. Published in
  # lockstep with the assistant version the loader's peerDependency gate expects.
  build-plugin-api-prod:
    # Build has no side effects; release-ordering gates live on publish-plugin-api-prod.
    needs: [extract-version, ci-cli, ci-gateway]
    if: ${{ always() && !cancelled() && needs.extract-version.outputs.is_staging != 'true' && needs.ci-cli.result == 'success' && needs.ci-gateway.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
      - name: Install assistant dependencies
        run: |
          cd assistant
          if ! bun install --frozen-lockfile; then
            echo "bun install --frozen-lockfile failed; regenerating lockfile and retrying..."
            rm -f bun.lock
            rm -rf node_modules
            bun install
          fi
      # The rollup compiles the `packages/*` contract sources the authoring
      # surface reaches, so each must have its own node_modules (the repo uses
      # per-package file: deps with no Bun workspaces — see the root AGENTS.md).
      - name: Install shared package dependencies
        run: |
          for dir in packages/*/; do
            [ -f "${dir}/package.json" ] || continue
            (cd "${dir}" && bun install --frozen-lockfile 2>/dev/null || bun install)
          done
      - name: Build plugin-api package
        run: cd assistant && bun run scripts/build-plugin-api.ts --version "${{ needs.extract-version.outputs.version }}"
      - name: Pack tarball
        run: |
          cd assistant/.plugin-api-build/package
          mkdir -p /tmp/npm-dist
          npm pack --pack-destination /tmp/npm-dist
          mv /tmp/npm-dist/*.tgz /tmp/npm-dist/package.tgz
          node -p "require('./package.json').name" > /tmp/npm-dist/name
          node -p "require('./package.json').version" > /tmp/npm-dist/version
      - name: Upload tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-tarball-prod-plugin-api
          path: /tmp/npm-dist/
          retention-days: 1

  publish-plugin-api-prod:
    # Don't publish until backend images are live.
    needs: [extract-version, build-plugin-api-prod, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image]
    if: ${{ always() && !cancelled() && needs.build-plugin-api-prod.result == 'success' && needs.push-assistant-manifest.result == 'success' && needs.push-gateway-manifest.result == 'success' && needs.push-credential-executor-manifest.result == 'success' && needs.push-dockerhub-image.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .nvmrc
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - name: Download tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-tarball-prod-plugin-api
          path: /tmp/npm-dist
      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(cat /tmp/npm-dist/name)
          PKG_VERSION=$(cat /tmp/npm-dist/version)
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping (treating as retry)."
            exit 0
          fi
          npm publish /tmp/npm-dist/package.tgz --access public --no-provenance

  # ── Staging: pack CLI tarball and dispatch QA to platform repo ──────
  pack-cli:
    needs: [extract-version, ci-cli, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest]
    if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: |
          if ! bun install --frozen-lockfile --filter=./cli; then
            rm -f bun.lock && rm -rf node_modules && bun install --filter=./cli
          fi

      - name: Pack CLI tarball
        run: |
          cd cli
          bun pm pack
          TARBALL=$(ls vellumai-cli-*.tgz)
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"
          echo "Packed: $TARBALL"
        id: pack

      - name: Upload CLI tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-tarball
          path: cli/${{ steps.pack.outputs.tarball }}
          retention-days: 7

  trigger-platform-qa:
    needs: [extract-version, pack-cli]
    if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Trigger platform QA
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run qa-cli-staging.yaml \
            --repo vellum-ai/vellum-assistant-platform \
            --field version="${{ needs.extract-version.outputs.version }}" \
            --field run_id="${{ github.run_id }}"

  build-npm-staging:
    needs: [extract-version, ci-assistant, ci-cli, ci-gateway, ci-credential-executor]
    if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      matrix:
        package: [assistant, cli, credential-executor, gateway]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
      - name: Sync feature flag registry
        run: bun run meta/feature-flags/sync-bundled-copies.ts
      - name: Stamp staging version
        run: jq --arg v "${{ needs.extract-version.outputs.version }}" '.version = $v' ${{ matrix.package }}/package.json > ${{ matrix.package }}/package.json.tmp && mv ${{ matrix.package }}/package.json.tmp ${{ matrix.package }}/package.json
      - name: Install package dependencies
        run: |
          if ! bun install --frozen-lockfile --filter="./${{ matrix.package }}"; then
            rm -f bun.lock && rm -rf node_modules && bun install --filter="./${{ matrix.package }}"
          fi
      - name: Pack tarball
        run: |
          cd "${{ matrix.package }}"
          mkdir -p /tmp/npm-dist
          bun pm pack --destination /tmp/npm-dist
          mv /tmp/npm-dist/*.tgz /tmp/npm-dist/package.tgz
          node -p "require('./package.json').name" > /tmp/npm-dist/name
          node -p "require('./package.json').version" > /tmp/npm-dist/version
      - name: Upload tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-tarball-staging-${{ matrix.package }}
          path: /tmp/npm-dist/
          retention-days: 1

  publish-npm-staging:
    needs: [extract-version, build-npm-staging]
    if: ${{ always() && !cancelled() && needs.build-npm-staging.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      matrix:
        package: [assistant, cli, credential-executor, gateway]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .nvmrc
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - name: Download tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-tarball-staging-${{ matrix.package }}
          path: /tmp/npm-dist
      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(cat /tmp/npm-dist/name)
          PKG_VERSION=$(cat /tmp/npm-dist/version)
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping."
            exit 0
          fi
          npm publish /tmp/npm-dist/package.tgz --tag staging --access public --no-provenance

  build-plugin-api-staging:
    needs: [extract-version, ci-assistant, ci-cli, ci-gateway, ci-credential-executor]
    if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
      - name: Install assistant dependencies
        run: |
          cd assistant
          if ! bun install --frozen-lockfile; then
            rm -f bun.lock && rm -rf node_modules && bun install
          fi
      # The rollup compiles the `packages/*` contract sources the authoring
      # surface reaches, so each must have its own node_modules (the repo uses
      # per-package file: deps with no Bun workspaces — see the root AGENTS.md).
      - name: Install shared package dependencies
        run: |
          for dir in packages/*/; do
            [ -f "${dir}/package.json" ] || continue
            (cd "${dir}" && bun install --frozen-lockfile 2>/dev/null || bun install)
          done
      - name: Build plugin-api package
        run: cd assistant && bun run scripts/build-plugin-api.ts --version "${{ needs.extract-version.outputs.version }}"
      - name: Pack tarball
        run: |
          cd assistant/.plugin-api-build/package
          mkdir -p /tmp/npm-dist
          npm pack --pack-destination /tmp/npm-dist
          mv /tmp/npm-dist/*.tgz /tmp/npm-dist/package.tgz
          node -p "require('./package.json').name" > /tmp/npm-dist/name
          node -p "require('./package.json').version" > /tmp/npm-dist/version
      - name: Upload tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-tarball-staging-plugin-api
          path: /tmp/npm-dist/
          retention-days: 1

  publish-plugin-api-staging:
    needs: [extract-version, build-plugin-api-staging]
    if: ${{ always() && !cancelled() && needs.build-plugin-api-staging.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .nvmrc
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - name: Download tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-tarball-staging-plugin-api
          path: /tmp/npm-dist
      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(cat /tmp/npm-dist/name)
          PKG_VERSION=$(cat /tmp/npm-dist/version)
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping."
            exit 0
          fi
          npm publish /tmp/npm-dist/package.tgz --tag staging --access public --no-provenance

  build-web-staging:
    name: build-npm-staging (web)
    needs: [extract-version, ci-assistant, ci-cli, ci-gateway, ci-credential-executor]
    if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
      - name: Install dependencies
        run: |
          if ! bun install --frozen-lockfile --filter=@vellumai/web; then
            rm -f bun.lock && rm -rf node_modules && bun install --filter=@vellumai/web
          fi
      - name: Generate API clients
        working-directory: clients/web
        run: bun run openapi-ts
      - name: Build
        working-directory: clients/web
        env:
          VITE_PLATFORM_MODE: "false"
        run: bun run build
      - name: Rewrite package.json for publish
        working-directory: clients/web
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          jq --arg v "$VERSION" '{name, version: $v, license, type, description, files}' package.json > tmp && mv tmp package.json
      - name: Pack tarball
        working-directory: clients/web
        run: |
          mkdir -p /tmp/npm-dist
          npm pack --pack-destination /tmp/npm-dist
          mv /tmp/npm-dist/*.tgz /tmp/npm-dist/package.tgz
          node -p "require('./package.json').name" > /tmp/npm-dist/name
          node -p "require('./package.json').version" > /tmp/npm-dist/version
      - name: Upload tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-tarball-staging-web
          path: /tmp/npm-dist/
          retention-days: 1

  publish-web-staging:
    name: publish-npm-staging (web)
    needs: [extract-version, build-web-staging]
    if: ${{ always() && !cancelled() && needs.build-web-staging.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .nvmrc
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - name: Download tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-tarball-staging-web
          path: /tmp/npm-dist
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(cat /tmp/npm-dist/name)
          PKG_VERSION=$(cat /tmp/npm-dist/version)
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping."
            exit 0
          fi
          npm publish /tmp/npm-dist/package.tgz --tag staging --access public --no-provenance

  publish-meta-staging:
    name: publish-npm-staging (meta)
    needs: [extract-version, publish-npm-staging, publish-web-staging]
    if: ${{ needs.extract-version.outputs.is_staging == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - name: Stamp staging version into meta package.json
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          cd meta
          jq --arg v "$VERSION" '
            .version = $v |
            .dependencies["@vellumai/assistant"] = $v |
            .dependencies["@vellumai/cli"] = $v |
            .dependencies["@vellumai/credential-executor"] = $v |
            .dependencies["@vellumai/vellum-gateway"] = $v |
            .dependencies["@vellumai/web"] = $v
          ' package.json > tmp && mv tmp package.json
      # The meta package was just stamped to depend on freshly published
      # @vellumai/* versions. npm's read path (CDN/replicas) lags the publish
      # by seconds-to-minutes, so a shrinkwrap install kicked off right after
      # the last dependency publish can hit ETARGET. Wait until every dep is
      # resolvable before installing.
      - name: Wait for dependencies to propagate
        working-directory: meta
        run: |
          node -e '
            const deps = require("./package.json").dependencies || {};
            for (const [name, version] of Object.entries(deps)) {
              if (name.startsWith("@vellumai/")) console.log(`${name}@${version}`);
            }
          ' > /tmp/vellum-meta-deps.txt
          deadline=$((SECONDS + 300))
          while read -r spec; do
            [ -z "$spec" ] && continue
            until npm view "$spec" version >/dev/null 2>&1; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::$spec still not resolvable on the registry after waiting ~5m"
                exit 1
              fi
              echo "  $spec not yet available; retrying in 10s..."
              sleep 10
            done
            echo "  ✓ $spec available"
          done < /tmp/vellum-meta-deps.txt
      # npm only honors "overrides" in the root package.json, so they are
      # ignored when end users run `npm install -g vellum`. Shipping an
      # npm-shrinkwrap.json generated with the overrides applied makes npm
      # follow the same resolution for installed copies of the package.
      - name: Generate npm-shrinkwrap.json
        working-directory: meta
        run: |
          for attempt in 1 2 3; do
            npm install --package-lock-only && break
            if [ "$attempt" -eq 3 ]; then
              echo "::error::npm install --package-lock-only failed after 3 attempts"
              exit 1
            fi
            echo "npm install failed (attempt $attempt); retrying in 15s..."
            sleep 15
          done
          npm shrinkwrap
      - name: Publish
        working-directory: meta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping."
            exit 0
          fi
          npm publish --tag staging --access public --no-provenance

  build-web-prod:
    name: build-npm-prod (web)
    # Build has no side effects; release-ordering gates live on publish-web-prod.
    needs: [extract-version, ci-cli, ci-gateway]
    if: ${{ always() && !cancelled() && needs.extract-version.outputs.is_staging != 'true' && needs.ci-cli.result == 'success' && needs.ci-gateway.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          if ! bun install --frozen-lockfile --filter=@vellumai/web; then
            echo "bun install --frozen-lockfile failed; regenerating lockfile and retrying..."
            rm -f bun.lock
            rm -rf node_modules
            bun install --filter=@vellumai/web
          fi

      - name: Generate API clients
        working-directory: clients/web
        run: bun run openapi-ts

      - name: Build
        working-directory: clients/web
        env:
          VITE_PLATFORM_MODE: "false"
        run: bun run build

      - name: Rewrite package.json for publish
        working-directory: clients/web
        run: |
          jq '{name, version, license, type, description, files}' package.json > tmp && mv tmp package.json

      - name: Pack tarball
        working-directory: clients/web
        run: |
          mkdir -p /tmp/npm-dist
          npm pack --pack-destination /tmp/npm-dist
          mv /tmp/npm-dist/*.tgz /tmp/npm-dist/package.tgz
          node -p "require('./package.json').name" > /tmp/npm-dist/name
          node -p "require('./package.json').version" > /tmp/npm-dist/version

      - name: Upload tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-tarball-prod-web
          path: /tmp/npm-dist/
          retention-days: 1

  publish-web-prod:
    name: publish-npm-prod (web)
    # Don't publish until backend images are live.
    needs: [extract-version, build-web-prod, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image]
    if: ${{ always() && !cancelled() && needs.build-web-prod.result == 'success' && needs.push-assistant-manifest.result == 'success' && needs.push-gateway-manifest.result == 'success' && needs.push-credential-executor-manifest.result == 'success' && needs.push-dockerhub-image.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .nvmrc
          sparse-checkout-cone-mode: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Download tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: npm-tarball-prod-web
          path: /tmp/npm-dist

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_NAME=$(cat /tmp/npm-dist/name)
          PKG_VERSION=$(cat /tmp/npm-dist/version)
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping (treating as retry)."
            exit 0
          fi
          npm publish /tmp/npm-dist/package.tgz --access public --no-provenance

  publish-meta-prod:
    name: publish-npm-prod (meta)
    needs: [extract-version, publish-npm-prod, publish-web-prod]
    if: ${{ needs.extract-version.outputs.is_staging != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      # The meta package depends on freshly published @vellumai/* versions.
      # npm's read path (CDN/replicas) lags the publish by seconds-to-minutes,
      # so a shrinkwrap install kicked off right after the last dependency
      # publish can hit ETARGET. Wait until every dep is resolvable first.
      - name: Wait for dependencies to propagate
        working-directory: meta
        run: |
          node -e '
            const deps = require("./package.json").dependencies || {};
            for (const [name, version] of Object.entries(deps)) {
              if (name.startsWith("@vellumai/")) console.log(`${name}@${version}`);
            }
          ' > /tmp/vellum-meta-deps.txt
          deadline=$((SECONDS + 300))
          while read -r spec; do
            [ -z "$spec" ] && continue
            until npm view "$spec" version >/dev/null 2>&1; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "::error::$spec still not resolvable on the registry after waiting ~5m"
                exit 1
              fi
              echo "  $spec not yet available; retrying in 10s..."
              sleep 10
            done
            echo "  ✓ $spec available"
          done < /tmp/vellum-meta-deps.txt

      # npm only honors "overrides" in the root package.json, so they are
      # ignored when end users run `npm install -g vellum`. Shipping an
      # npm-shrinkwrap.json generated with the overrides applied makes npm
      # follow the same resolution for installed copies of the package.
      - name: Generate npm-shrinkwrap.json
        working-directory: meta
        run: |
          for attempt in 1 2 3; do
            npm install --package-lock-only && break
            if [ "$attempt" -eq 3 ]; then
              echo "::error::npm install --package-lock-only failed after 3 attempts"
              exit 1
            fi
            echo "npm install failed (attempt $attempt); retrying in 15s..."
            sleep 15
          done
          npm shrinkwrap

      - name: Publish meta-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd meta
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "::notice::$PKG_NAME@$PKG_VERSION already published; skipping (treating as retry)."
            exit 0
          fi
          npm publish --access public --no-provenance

  # ── Electron macOS build (arm64 + x64) ────────────────────────────────
  # Builds the Electron-wrapped macOS app for each architecture, code-signs,
  # notarizes, and uploads as release assets. A failure on either arch fails
  # this job and blocks the release.
  build-electron:
    # No publish dep: the bundled CLI floats to the `staging`/`latest` dist-tag at runtime.
    needs: [extract-version]
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      # Let both arches finish so a failure reports which arch(es) broke; any
      # failed leg fails the job (and therefore the release).
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            dmg_name: vellum-assistant-electron.dmg
            artifact_name: macos-build-electron
            update_artifact_name: macos-electron-update-arm64
          - arch: x64
            dmg_name: vellum-assistant-electron-x64.dmg
            artifact_name: macos-build-electron-x64
            update_artifact_name: macos-electron-update-x64
    defaults:
      run:
        working-directory: clients/macos
    env:
      KEYCHAIN_NAME: build-electron.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
      ELECTRON_TARGET_ARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Import code-signing certificate
        env:
          CERT_P12: ${{ secrets.DEVID_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERT_P12" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify signing identity
        run: |
          security find-identity -v -p codesigning | grep -q "Developer ID Application" \
            || { echo "::error::Developer ID Application identity not found"; exit 1; }

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: |
          if ! bun install --frozen-lockfile --filter=@vellumai/macos --filter=@vellumai/web; then
            rm -f bun.lock && rm -rf node_modules && bun install --filter=@vellumai/macos --filter=@vellumai/web
          fi

      # Installing does not download the Electron binary or build the mac
      # helper, so packaging provisions them explicitly.
      - name: Set up Electron binary and mac helper
        run: bun run setup

      - name: Stamp release version into package.json
        run: jq --arg v "${{ needs.extract-version.outputs.version }}" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

      - name: Build and package Electron app
        env:
          CSC_NAME: Developer ID Application
          SENTRY_DSN_MACOS: ${{ secrets.SENTRY_DSN_MACOS }}
          VITE_PLATFORM_MODE: "false"
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_DSN_MACOS: ${{ secrets.SENTRY_DSN_MACOS }}
          VITE_SENTRY_ENVIRONMENT: ${{ needs.extract-version.outputs.is_staging == 'true' && 'staging' || 'production' }}
          VITE_SESSION_REPLAY_APP_ID: ${{ vars.VITE_SESSION_REPLAY_APP_ID }}
          # Sentry release tracking for the Electron renderer. VITE_APP_VERSION
          # tags renderer events with the release (read in
          # clients/web/src/lib/sentry/sentry-init.ts) and names the registered
          # release; the Vite Sentry plugin uploads source maps to SENTRY_PROJECT
          # (vellum-assistant-macos, overriding the web default) so stacks
          # symbolicate and issues resolve per release. The semver release
          # version gives Sentry a correctly ordered release timeline.
          VITE_APP_VERSION: ${{ needs.extract-version.outputs.version }}
          SENTRY_UPLOAD_SOURCE_MAPS: "true"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_PROJECT: vellum-assistant-macos
          # A source-map upload failure degrades to a warning instead of failing
          # the release build (see clients/web/vite.config.ts).
          SENTRY_ALLOW_UPLOAD_FAILURE: "true"
        run: bun run pack --environment "${{ needs.extract-version.outputs.is_staging == 'true' && 'staging' || 'production' }}"

      - name: Rename DMG for release
        id: dmg
        run: |
          ELECTRON_DMG=$(find dist -name "*.dmg" -type f | grep -m1 .)
          if [ -z "$ELECTRON_DMG" ]; then
            echo "::error::No DMG found in dist/"
            ls -la dist/
            exit 1
          fi
          echo "Found DMG: $ELECTRON_DMG"
          FINAL_DMG="dist/${{ matrix.dmg_name }}"
          mv "$ELECTRON_DMG" "$FINAL_DMG"
          echo "dmg_path=$FINAL_DMG" >> "$GITHUB_OUTPUT"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "${{ steps.dmg.outputs.dmg_path }}"
          codesign --verify --verbose "${{ steps.dmg.outputs.dmg_path }}"
          echo "Electron DMG signature verified"

      - name: Notarize DMG
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          echo "Submitting Electron DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "${{ steps.dmg.outputs.dmg_path }}" \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | grep -m1 .)

          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Electron notarization failed"
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
                --key-id "$ASC_KEY_ID" \
                --issuer "$ASC_ISSUER_ID" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "Electron notarization succeeded"

      - name: Staple notarization ticket
        run: |
          MAX_ATTEMPTS=15
          WAIT_SECS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              echo "$STAPLE_OUTPUT"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed (exit code $STAPLE_EXIT):"
            echo "$STAPLE_OUTPUT"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          xcrun stapler validate "${{ steps.dmg.outputs.dmg_path }}"
          echo "Electron notarization ticket stapled and validated"

      # Update artifacts upload before the DMG so a DMG artifact never exists
      # without its update feed (a DMG shipped without one strands auto-update).
      - name: Upload Electron update artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.update_artifact_name }}
          path: |
            clients/macos/dist/*-mac.yml
            clients/macos/dist/*.zip
            clients/macos/dist/*.zip.blockmap
          if-no-files-found: error
          retention-days: 7

      - name: Upload Electron DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: clients/macos/dist/${{ matrix.dmg_name }}
          if-no-files-found: error
          retention-days: 7

      - name: Cleanup keychain and keys
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true

  # ── Upload Electron update artifacts to GCS ────────────────────────────
  # Push per-arch update feeds (manifest + ZIP + blockmap) to the public
  # GCS bucket so electron-updater can pull delta updates. Each arch gets
  # its own path: mac-electron/{channel}/{arch}/.

  upload-electron-updates:
    # Gate the GCS update-feed publish (an external side effect) on the channel's
    # meta publish: never offer an auto-update for a release that didn't publish.
    needs: [extract-version, build-electron, publish-meta-prod, publish-meta-staging]
    # always() disables the implicit success(): publish-meta-prod/-staging is
    # skipped on the other channel.
    if: ${{ always() && !cancelled() && needs.build-electron.result == 'success' && (needs.publish-meta-prod.result == 'success' || needs.publish-meta-staging.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ needs.extract-version.outputs.is_staging == 'true' && 'staging' || 'production' }}
    permissions:
      contents: read
      id-token: write
    steps:
      # build-electron is a hard dependency, so both arches' update artifacts
      # must be present and complete. A missing download or artifact fails the
      # job, which blocks the release gate.
      - name: Download arm64 update artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-electron-update-arm64
          path: electron-artifacts/arm64

      - name: Download x64 update artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-electron-update-x64
          path: electron-artifacts/x64

      - name: Validate update artifacts
        run: |
          for ARCH in arm64 x64; do
            DIR="electron-artifacts/${ARCH}"
            if [ ! -d "$DIR" ]; then
              echo "::error::No update artifacts for ${ARCH}"
              exit 1
            fi
            if [ -z "$(find "$DIR" -name '*-mac.yml' -type f 2>/dev/null | grep -m1 .)" ]; then
              echo "::error::Missing update manifest (*-mac.yml) for ${ARCH}"
              exit 1
            fi
            if [ -z "$(find "$DIR" -name '*.zip' -type f ! -name '*.blockmap' 2>/dev/null | grep -m1 .)" ]; then
              echo "::error::Missing ZIP for ${ARCH}"
              exit 1
            fi
            if [ -z "$(find "$DIR" -name '*.zip.blockmap' -type f 2>/dev/null | grep -m1 .)" ]; then
              echo "::error::Missing blockmap (*.zip.blockmap) for ${ARCH}"
              exit 1
            fi
          done

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Upload Electron update artifacts to GCS
        run: |
          ENVIRONMENT=${{ needs.extract-version.outputs.is_staging == 'true' && 'staging' || 'production' }}
          BUCKET=${{ needs.extract-version.outputs.is_staging == 'true' && 'vellum-ai-staging-releases' || 'vellum-ai-prod-releases' }}
          MANIFEST_NAME="${ENVIRONMENT}-mac.yml"

          for ARCH in arm64 x64; do
            ARCH_DIR="electron-artifacts/${ARCH}"
            [ -d "$ARCH_DIR" ] || continue
            PREFIX="mac-electron/${ARCH}"

            find "$ARCH_DIR" -name "*.zip" -type f ! -name "*.blockmap" | while read -r ZIP; do
              gcloud storage cp "$ZIP" "gs://${BUCKET}/${PREFIX}/$(basename "$ZIP")"
            done

            find "$ARCH_DIR" -name "*.zip.blockmap" -type f | while read -r BM; do
              gcloud storage cp "$BM" "gs://${BUCKET}/${PREFIX}/$(basename "$BM")"
            done

            YML=$(find "$ARCH_DIR" -name "*-mac.yml" -type f | grep -m1 .)
            [ -n "$YML" ] && gcloud storage cp "$YML" "gs://${BUCKET}/${PREFIX}/${MANIFEST_NAME}"
          done

  release:
    needs: [extract-version, publish-npm-prod, publish-web-prod, publish-meta-prod, publish-plugin-api-prod, build-electron, upload-electron-updates, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image, build-chrome-extension]
    if: ${{ always() && !cancelled() && needs.extract-version.outputs.is_staging != 'true' && needs.extract-version.result == 'success' && needs.publish-npm-prod.result == 'success' && needs.publish-web-prod.result == 'success' && needs.publish-meta-prod.result == 'success' && needs.publish-plugin-api-prod.result == 'success' && needs.push-assistant-manifest.result == 'success' && needs.push-gateway-manifest.result == 'success' && needs.push-credential-executor-manifest.result == 'success' && needs.push-dockerhub-image.result == 'success' && needs.build-electron.result == 'success' && needs.upload-electron-updates.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Tag release
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          git tag "v$VERSION" 2>/dev/null || true
          git push origin "v$VERSION" 2>/dev/null || echo "Tag v$VERSION already exists on remote"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Generate release notes from commits
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scripts && bun install && cd ..
          bun scripts/generate-release-notes.ts \
            --version "${{ needs.extract-version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --output /tmp/release-notes.md

      - name: Download Chrome extension zip
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: chrome-extension-zip
          path: chrome-extension-artifacts

      - name: Download Chrome extension CRX (zipped)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        continue-on-error: true
        with:
          name: chrome-extension-crx-zip
          path: chrome-extension-artifacts

      # Electron is a hard release dependency: the `release` job only runs when
      # both build-electron and upload-electron-updates succeeded, so these
      # artifacts are guaranteed present. A download failure here fails the
      # release rather than silently shipping without Electron assets.
      - name: Download Electron DMG artifact (arm64)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-build-electron
          path: electron-artifacts

      - name: Download Electron DMG artifact (x64)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: macos-build-electron-x64
          path: electron-artifacts-x64

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          VERSION_TAG="v${VERSION}"
          NOTES_FILE="/tmp/release-notes.md"

          ASSETS=()

          # The Electron DMGs are required. A missing DMG here fails the
          # release rather than publishing without it.
          # The arm64 build is published under the canonical vellum-assistant.dmg
          # name — the production desktop download URL and scripts/production-release.sh
          # both resolve the release asset by that exact name.
          ELECTRON_DMG=$(find electron-artifacts -name "vellum-assistant-electron.dmg" -type f | grep -m1 .)
          if [ -z "$ELECTRON_DMG" ]; then
            echo "::error::Electron arm64 DMG missing"
            exit 1
          fi
          ASSETS+=("$ELECTRON_DMG#vellum-assistant.dmg")
          ELECTRON_X64_DMG=$(find electron-artifacts-x64 -name "vellum-assistant-electron-x64.dmg" -type f | grep -m1 .)
          if [ -z "$ELECTRON_X64_DMG" ]; then
            echo "::error::Electron x64 DMG missing"
            exit 1
          fi
          ASSETS+=("$ELECTRON_X64_DMG#vellum-assistant-electron-x64.dmg")

          INSTALL_SH="cli/src/adapters/install.sh"
          [ -f "$INSTALL_SH" ] && ASSETS+=("$INSTALL_SH#install.sh")

          # Add Chrome extension artifacts if available
          if [ -d "chrome-extension-artifacts" ]; then
            CRX_ZIP=$(find chrome-extension-artifacts -name "vellum-browser-relay.zip" -type f | head -1)
            [ -n "$CRX_ZIP" ] && ASSETS+=("$CRX_ZIP#vellum-browser-relay-${VERSION}.zip")
            CRX_FILE_ZIP=$(find chrome-extension-artifacts -name "vellum-browser-relay.crx.zip" -type f | head -1)
            [ -n "$CRX_FILE_ZIP" ] && ASSETS+=("$CRX_FILE_ZIP#vellum-browser-relay-${VERSION}.crx.zip")
          fi

          echo "Release assets: ${ASSETS[*]}"

          # Create release on vellum-assistant (this repo)
          if ! gh release view "$VERSION_TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "$VERSION_TAG" \
              "${ASSETS[@]}" \
              --repo "${{ github.repository }}" \
              --title "Vellum $VERSION" \
              --notes-file "$NOTES_FILE" \
              --latest
            echo "Release created at https://github.com/${{ github.repository }}/releases/tag/$VERSION_TAG"
          else
            echo "Release $VERSION_TAG already exists on ${{ github.repository }}, skipping"
          fi

          rm -f "$NOTES_FILE"

  merge-release-branch:
    needs: [extract-version, release, register-release]
    if: ${{ !cancelled() && needs.extract-version.outputs.is_staging != 'true' && needs.release.result == 'success' && needs.register-release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      outcome: ${{ steps.merge.outcome }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Merge release branch and delete
        id: merge
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          BRANCH="release/v$VERSION"

          PR_URL=$(gh pr create \
            --title "Release v$VERSION" \
            --body "Automated version bump to $VERSION." \
            --base main \
            --head "$BRANCH")

          # Try the normal merge first. If it fails (e.g. due to cherry-picked
          # commits causing conflicts), rebase onto main with `-X theirs` to
          # auto-resolve textual conflicts in favor of the release branch and
          # retry. The release branch is the source of truth for the version
          # being shipped, so taking its side is the safe default.
          if ! gh pr merge "$PR_URL" --squash --admin --delete-branch; then
            echo "Merge failed — rebasing with -X theirs to resolve cherry-pick conflicts"

            git config user.name "vellum-automation[bot]"
            git config user.email "192048195+vellum-automation[bot]@users.noreply.github.com"

            git fetch origin main
            git rebase -X theirs origin/main

            # Append [skip ci] so the force-push doesn't re-trigger this workflow
            git commit --allow-empty --amend -m "$(git log -1 --format=%B) [skip ci]"
            git push --no-verify origin "$BRANCH" --force-with-lease

            # Give GitHub time to process the force-push before retrying
            sleep 10
            gh pr merge "$PR_URL" --squash --admin --delete-branch
          fi

  update-platform:
    needs: [extract-version, publish-npm-prod]
    if: ${{ needs.extract-version.outputs.is_staging != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Checkout platform repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: vellum-ai/vellum-assistant-platform
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Update vel dependency
        env:
          NEW_VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          cd vel
          jq --arg v "$NEW_VERSION" '.dependencies["@vellumai/cli"] = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          bun install

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          BRANCH="auto/bump-cli-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add vel/package.json vel/bun.lock
          git commit -m "Bump @vellumai/cli to ${NEW_VERSION} in vel"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo vellum-ai/vellum-assistant-platform \
            --title "Bump @vellumai/cli to ${NEW_VERSION} in vel" \
            --body "Auto-generated PR to update @vellumai/cli to ${NEW_VERSION}." \
            --base main \
            --head "$BRANCH")
          sleep 10
          gh pr merge "$PR_URL" --auto --squash

  # ── iOS release (same-repo reusable workflow) ────────────────────────

  release-ios:
    needs: [extract-version, publish-npm-prod, publish-web-prod, publish-meta-prod, publish-plugin-api-prod, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image, build-chrome-extension]
    if: >-
      ${{
        always() && !cancelled()
        && needs.extract-version.result == 'success'
        && needs.push-assistant-manifest.result == 'success'
        && needs.push-gateway-manifest.result == 'success'
        && needs.push-credential-executor-manifest.result == 'success'
        && (needs.build-chrome-extension.result == 'success' || needs.build-chrome-extension.result == 'skipped')
        && (needs.publish-npm-prod.result == 'success' || needs.publish-npm-prod.result == 'skipped')
        && (needs.publish-web-prod.result == 'success' || needs.publish-web-prod.result == 'skipped')
        && (needs.publish-meta-prod.result == 'success' || needs.publish-meta-prod.result == 'skipped')
        && (needs.publish-plugin-api-prod.result == 'success' || needs.publish-plugin-api-prod.result == 'skipped')
        && (needs.push-dockerhub-image.result == 'success' || needs.push-dockerhub-image.result == 'skipped')
      }}
    uses: ./.github/workflows/release-ios.yaml
    with:
      environment: ${{ needs.extract-version.outputs.is_staging == 'true' && 'staging' || 'production' }}
      version: ${{ needs.extract-version.outputs.version }}
      notify_slack: false
    secrets: inherit

  # ci-assistant runs lint/typecheck/test for the assistant service. It also
  # transitively gates the release pipeline because push-assistant-image and
  # push-dockerhub-image depend on it — a failure here blocks Docker image
  # builds, which in turn blocks npm publish, the macOS DMG, and GitHub Release.
  ci-assistant:
    needs: extract-version
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=./assistant --filter=./gateway
        working-directory: assistant

      - name: Lint
        run: bun run lint
        working-directory: assistant

      - name: Typecheck
        run: bunx tsc --noEmit
        working-directory: assistant

      - name: Restore test durations cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: assistant/.test-durations
          key: test-durations-unused
          restore-keys: test-durations-

      - name: Test
        run: bun run test:stable
        working-directory: assistant
        env:
          TEST_WORKERS: '16'
          TEST_DURATIONS_FILE: .test-durations
          TEST_DURATIONS_OUTPUT: .test-durations

      - name: Save test durations cache
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: assistant/.test-durations
          key: test-durations-${{ github.run_id }}

  ci-cli:
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=./cli
        working-directory: cli

      - name: Lint
        run: bun run lint
        working-directory: cli

      - name: Typecheck
        run: bun run typecheck
        working-directory: cli

  ci-gateway:
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=./gateway
        working-directory: gateway

      - name: Lint
        run: bun run lint
        working-directory: gateway

      - name: Typecheck
        run: bun run typecheck
        working-directory: gateway

      - name: Test
        run: bun run test
        working-directory: gateway

  ci-credential-executor:
    needs: extract-version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=./credential-executor
        working-directory: credential-executor

      - name: Typecheck
        run: bun run typecheck
        working-directory: credential-executor

      - name: Test
        run: bun run test
        working-directory: credential-executor

  notify-release:
    name: Slack Notification (Release)
    if: ${{ always() && !cancelled() }}
    needs: [extract-version, publish-npm-prod, publish-web-prod, publish-meta-prod, publish-plugin-api-prod, build-electron, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, push-dockerhub-image, register-release, release, merge-release-branch, update-platform, pack-cli, trigger-platform-qa, release-ios, ci-assistant, ci-cli, ci-credential-executor, ci-gateway, build-chrome-extension, publish-chrome-extension]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Build Slack payload
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_TRIGGER_SECRET: ${{ secrets.RELEASE_TRIGGER_SECRET }}
          SLACK_USER_ID: ${{ inputs.slack_user_id }}
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          VERSION_TAG="v${VERSION}"
          IS_STAGING="${{ needs.extract-version.outputs.is_staging }}"

          # Determine release status
          RELEASE_FAILED="false"
          if [ "$IS_STAGING" != "true" ] && [ "${{ needs.release.result }}" != "success" ]; then
            RELEASE_FAILED="true"
          fi

          # For staging releases, check that desktop app and Docker images were successfully pushed
          STAGING_READY="true"
          if [ "$IS_STAGING" = "true" ]; then
            if [ "${{ needs.build-electron.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
            if [ "${{ needs.push-assistant-manifest.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
            if [ "${{ needs.push-gateway-manifest.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
            if [ "${{ needs.push-credential-executor-manifest.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
            if [ "${{ needs.register-release.result }}" != "success" ]; then
              STAGING_READY="false"
            fi
          fi

          if [ "$IS_STAGING" = "true" ]; then
            if [ "$STAGING_READY" != "true" ]; then
              HEADER="❌ Staging Release ${VERSION_TAG} Failed"
              STYLE="danger"
            else
              HEADER="🟡 Staging Release ${VERSION_TAG} Ready"
              STYLE=""
            fi
          elif [ "$RELEASE_FAILED" = "true" ]; then
            HEADER="❌ Release ${VERSION_TAG} Failed"
            STYLE="danger"
          else
            HEADER="✅ Release ${VERSION_TAG} Succeeded"
            STYLE=""
          fi

          # Build CI status icons
          ci_icon() { if [ "$1" = "success" ]; then printf '✅'; elif [ "$1" = "skipped" ]; then printf '⏭️'; else printf '❌'; fi; }

          A=$(ci_icon "${{ needs.ci-assistant.result }}")
          C=$(ci_icon "${{ needs.ci-cli.result }}")
          CE=$(ci_icon "${{ needs.ci-credential-executor.result }}")
          G=$(ci_icon "${{ needs.ci-gateway.result }}")
          DE=$(ci_icon "${{ needs.build-electron.result }}")
          AI=$(ci_icon "${{ needs.push-assistant-manifest.result }}")
          GI=$(ci_icon "${{ needs.push-gateway-manifest.result }}")
          CEI=$(ci_icon "${{ needs.push-credential-executor-manifest.result }}")
          DH=$(ci_icon "${{ needs.push-dockerhub-image.result }}")
          RR=$(ci_icon "${{ needs.register-release.result }}")
          PC=$(ci_icon "${{ needs.pack-cli.result }}")
          TQ=$(ci_icon "${{ needs.trigger-platform-qa.result }}")
          DI=$(ci_icon "${{ needs.release-ios.result }}")
          CX=$(ci_icon "${{ needs.build-chrome-extension.result }}")
          CXP=$(ci_icon "${{ needs.publish-chrome-extension.result }}")
          MERGE_OUTCOME="${{ needs.merge-release-branch.outputs.outcome || needs.merge-release-branch.result }}"
          MB=$(ci_icon "$MERGE_OUTCOME")

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          CI_LINE=$(printf '*CI Checks:*\n• %s assistant\n• %s cli\n• %s credential-executor\n• %s gateway\n• %s desktop-electron\n• %s release-ios\n• %s chrome-extension\n• %s cws-publish\n• %s assistant-docker\n• %s gateway-docker\n• %s credential-executor-docker\n• %s dockerhub\n• %s register-release\n• %s pack-cli\n• %s trigger-platform-qa\n• %s merge-release-branch' "$A" "$C" "$CE" "$G" "$DE" "$DI" "$CX" "$CXP" "$AI" "$GI" "$CEI" "$DH" "$RR" "$PC" "$TQ" "$MB")

          if [ -n "$SLACK_USER_ID" ]; then
            TRIGGERED_BY="<@${SLACK_USER_ID}>"
          else
            TRIGGERED_BY="${{ github.actor }}"
          fi

          if [ "$IS_STAGING" = "true" ]; then
            META_LINE=$(printf '*Version:* `%s`\n*Triggered by:* %s\n\n_This is a staging release. npm, GitHub Release, and DockerHub publishes were skipped. Docker images pushed to staging GCR, and the staging release was registered._' "$VERSION" "$TRIGGERED_BY")
          else
            META_LINE=$(printf '*Version:* `%s`\n*Triggered by:* %s' "$VERSION" "$TRIGGERED_BY")
          fi

          # Fetch release notes from GitHub release (only for production releases)
          RELEASE_BODY=""
          if [ "$IS_STAGING" != "true" ]; then
            RELEASE_BODY=$(gh release view "$VERSION_TAG" --repo "${{ github.repository }}" --json body -q .body 2>/dev/null || echo "")
          fi

          RELEASE_SUMMARY=""
          if [ -n "$RELEASE_BODY" ]; then
            # Extract highlights bullets for the Slack summary
            HIGHLIGHTS=$(echo "$RELEASE_BODY" | awk '/^## Highlights/{f=1; next} /^(## |---$)/{f=0} f' | grep '^- ' || true)

            if [ -n "$HIGHLIGHTS" ]; then
              # Use highlights as the release summary, converted to Slack mrkdwn
              RELEASE_SUMMARY=$(echo "$HIGHLIGHTS" | \
                sed 's/\*\*\([^*]*\)\*\*/*\1*/g' | \
                sed 's/\[\([^]]*\)\](\([^)]*\))/<\2|\1>/g')
            fi
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION_TAG}"

          # Build JSON payload with jq
          BLOCKS="[]"

          # Header
          BLOCKS=$(echo "$BLOCKS" | jq --arg header "$HEADER" '. + [{ type: "header", text: { type: "plain_text", text: $header } }]')

          # Release summary (if available)
          if [ -n "$RELEASE_SUMMARY" ]; then
            BLOCKS=$(echo "$BLOCKS" | jq --arg summary "$RELEASE_SUMMARY" '. + [{ type: "section", text: { type: "mrkdwn", text: $summary } }]')
          fi

          # CI checks + metadata
          BODY=$(printf '%s\n\n%s' "$CI_LINE" "$META_LINE")
          BLOCKS=$(echo "$BLOCKS" | jq --arg body "$BODY" '. + [{ type: "section", text: { type: "mrkdwn", text: $body } }]')

          # Warning if merge-release-branch failed
          if [ "$MERGE_OUTCOME" != "success" ] && [ "$MERGE_OUTCOME" != "skipped" ] && [ "$IS_STAGING" != "true" ] && [ "$RELEASE_FAILED" != "true" ]; then
            MERGE_WARNING="⚠️ *The release branch failed to merge to main and must be merged manually.* Run \`gh pr create --base main --head release/v${VERSION}\` and merge."
            BLOCKS=$(echo "$BLOCKS" | jq --arg warning "$MERGE_WARNING" '. + [{ type: "section", text: { type: "mrkdwn", text: $warning } }]')
          fi

          # Buttons
          VIEW_RUN=$(jq -n --arg url "$RUN_URL" --arg style "$STYLE" '{
            type: "button",
            text: { type: "plain_text", text: "View Run" },
            url: $url
          } + (if $style != "" then { style: $style } else {} end)')

          VIEW_RELEASE=$(jq -n --arg url "$RELEASE_URL" '{
            type: "button",
            text: { type: "plain_text", text: "View Release" },
            url: $url,
            style: "primary"
          }')

          # Build "Go live!" button only for release branch staging deploys (not main dispatches)
          IS_RELEASE_BRANCH="false"
          if [[ "${GITHUB_REF_NAME}" == release/v* ]]; then
            IS_RELEASE_BRANCH="true"
          fi

          if [ "$IS_STAGING" = "true" ] && [ "$STAGING_READY" = "true" ] && [ "$IS_RELEASE_BRANCH" = "true" ] && [ -n "$RELEASE_TRIGGER_SECRET" ]; then
            RELEASE_BRANCH="release/v${{ needs.extract-version.outputs.base_version }}"
            GO_LIVE_TS=$(date +%s)
            GO_LIVE_SIG=$(echo -n "${RELEASE_BRANCH}:${GO_LIVE_TS}" | openssl dgst -sha256 -hmac "$RELEASE_TRIGGER_SECRET" -hex | awk '{print $NF}')
            GO_LIVE_URL="https://qa.vellum.ai/api/slack/go-live?branch=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${RELEASE_BRANCH}', safe=''))")&ts=${GO_LIVE_TS}&sig=${GO_LIVE_SIG}"
            GO_LIVE=$(jq -n --arg url "$GO_LIVE_URL" '{
              type: "button",
              text: { type: "plain_text", text: "Go live!" },
              url: $url,
              style: "primary"
            }')
          fi

          if [ "$RELEASE_FAILED" = "true" ] || [ "$IS_STAGING" = "true" ]; then
            if [ -n "${GO_LIVE:-}" ]; then
              BUTTONS=$(jq -n --argjson run "$VIEW_RUN" --argjson golive "$GO_LIVE" '[$run, $golive]')
            else
              BUTTONS=$(jq -n --argjson run "$VIEW_RUN" '[$run]')
            fi
          else
            BUTTONS=$(jq -n --argjson run "$VIEW_RUN" --argjson release "$VIEW_RELEASE" '[$run, $release]')
          fi

          BLOCKS=$(echo "$BLOCKS" | jq --argjson buttons "$BUTTONS" '. + [{ type: "actions", elements: $buttons }]')

          jq -n --argjson blocks "$BLOCKS" '{
            unfurl_links: false,
            unfurl_media: false,
            blocks: $blocks
          }' > /tmp/slack-payload.json

      - name: Notify Slack
        id: slack
        continue-on-error: true
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
          errors: true

      - name: Log Slack notification result
        if: always()
        run: |
          echo "Slack step outcome: ${{ steps.slack.outcome }}"
          echo "Slack response ok: ${{ steps.slack.outputs.ok }}"
          echo "Slack response time: ${{ steps.slack.outputs.time }}"
          if [ "${{ steps.slack.outcome }}" != "success" ]; then
            echo "::warning::Slack notification failed to send. Check webhook URL and channel configuration."
          fi
