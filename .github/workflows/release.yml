name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  compute-version:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version from bump type
        id: compute
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  notify-start:
    needs: compute-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Notify Slack of release start
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\U0001F680 Release v${{ needs.compute-version.outputs.version }} Started"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Unified Release\n*Version:* `${{ needs.compute-version.outputs.version }}`\n*Bump:* `${{ inputs.bump }}`\n*Triggered by:* ${{ github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  bump-and-tag:
    needs: compute-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set version output
        id: version
        run: echo "version=${{ needs.compute-version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Bump versions via PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          BRANCH="release/v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Bump all package.json files
          for pkg in assistant cli gateway meta; do
            jq --arg v "$VERSION" '.version = $v' $pkg/package.json > tmp && mv tmp $pkg/package.json
          done

          # Bump meta-package dependency versions
          jq --arg v "$VERSION" '
            .dependencies["@vellumai/assistant"] = $v |
            .dependencies["@vellumai/cli"] = $v |
            .dependencies["@vellumai/vellum-gateway"] = $v
          ' meta/package.json > tmp && mv tmp meta/package.json

          # Bump macOS app version
          sed -i "s/^let appVersion = .*/let appVersion = \"$VERSION\"/" clients/Package.swift

          git add -A
          if git diff --cached --quiet; then
            echo "Version files already at $VERSION — skipping bump PR"
          else
            git commit -m "Release v$VERSION"
            git push origin "$BRANCH"

            PR_URL=$(gh pr create \
              --title "Release v$VERSION" \
              --body "Automated version bump to $VERSION." \
              --base main \
              --head "$BRANCH")
            gh pr merge "$PR_URL" --squash --admin
          fi

      - name: Tag release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          git fetch origin main
          git tag "v$VERSION" origin/main
          git push origin "v$VERSION"

    outputs:
      version: ${{ steps.version.outputs.version }}

  push-assistant-image:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, production]
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Get release SHA
        id: release-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}"
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          TAGS="${IMAGE}:${{ steps.release-sha.outputs.sha }}"
          TAGS=$(printf "%s\n%s" "$TAGS" "${IMAGE}:v${VERSION}")
          TAGS=$(printf "%s\n%s" "$TAGS" "${IMAGE}:latest")
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: assistant
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Assistant Image Published (${{ matrix.environment }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ matrix.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.bump-and-tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**SHA tag:** \`${{ steps.release-sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  push-gateway-image:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, production]
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Get release SHA
        id: release-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GATEWAY_IMAGE_NAME }}"
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          TAGS="${IMAGE}:${{ steps.release-sha.outputs.sha }}"
          TAGS=$(printf "%s\n%s" "$TAGS" "${IMAGE}:v${VERSION}")
          TAGS=$(printf "%s\n%s" "$TAGS" "${IMAGE}:latest")
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: gateway
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Gateway Image Published (${{ matrix.environment }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ matrix.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.bump-and-tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**SHA tag:** \`${{ steps.release-sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  publish-npm:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      matrix:
        package: [assistant, cli, gateway]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install and publish
        run: |
          cd ${{ matrix.package }}
          if ! bun install --frozen-lockfile; then
            echo "bun install --frozen-lockfile failed; regenerating lockfile and retrying..."
            rm -f bun.lock
            rm -rf node_modules
            bun install
          fi
          npm publish --access public --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-meta:
    needs: [bump-and-tag, publish-npm]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Publish meta-package
        run: |
          cd meta
          npm publish --access public --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-macos:
    needs: bump-and-tag
    runs-on: macos-14
    timeout-minutes: 30
    defaults:
      run:
        working-directory: clients/macos
    env:
      DMG_PATH: build/vellum-assistant.dmg
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Import code-signing certificate
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "${{ secrets.CERTIFICATE_P12 }}" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Set version
        id: version
        run: |
          DISPLAY_VERSION="${{ needs.bump-and-tag.outputs.version }}"
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Display version: $DISPLAY_VERSION / Build version: $BUILD_VERSION"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binaries
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          ./build.sh binaries --universal

      - name: Build release .app
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          SU_PUBLIC_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
          SIGN_IDENTITY="Developer ID Application" \
          ./build.sh release

          APP_PATH="dist/Vellum.app"
          ls -la "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signature verified"

      - name: Free disk space
        run: |
          rm -rf .build daemon-bin cli-bin gateway-bin
          rm -rf ../../assistant/node_modules ../../cli/node_modules ../../gateway/node_modules
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          rm -rf ~/Library/Caches/org.swift.swiftpm 2>/dev/null || true
          df -h .
          echo "Disk space freed"

      - name: Generate DMG background
        run: |
          mkdir -p build
          swift dmg/generate-background.swift build/dmg-background@2x.png

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_PATH="dist/Vellum.app"

          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          echo "Staging directory size:"
          du -sh "$DMG_STAGING"

          create-dmg \
            --volname "Vellum" \
            --background "build/dmg-background@2x.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 10 \
            --icon "Vellum.app" 175 190 \
            --icon "Applications" 530 190 \
            --hide-extension "Vellum.app" \
            --no-internet-enable \
            "$DMG_PATH" \
            "$DMG_STAGING/" \
          || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ] && [ -f "$DMG_PATH" ]; then
              echo "create-dmg exited with warning (code 2), but DMG was created successfully"
            else
              echo "create-dmg failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }

          echo "DMG created at $DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "$DMG_PATH"

          codesign --verify --verbose "$DMG_PATH"
          echo "DMG signature verified"

      - name: Notarize DMG
        run: |
          echo "Submitting DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed (status: Invalid or command error)"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_APP_PASSWORD }}" \
                --team-id "${{ secrets.APPLE_TEAM_ID }}" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "Notarization succeeded (status: Accepted)"

      - name: Staple notarization ticket
        run: |
          MAX_ATTEMPTS=15
          WAIT_SECS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "$DMG_PATH" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              echo "$STAPLE_OUTPUT"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed (exit code $STAPLE_EXIT):"
            echo "$STAPLE_OUTPUT"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          xcrun stapler validate "$DMG_PATH"
          echo "Notarization ticket stapled and validated"

      - name: Build ZIP for Sparkle auto-update
        run: |
          cd dist
          ditto -c -k --keepParent Vellum.app vellum-assistant.zip
          echo "Sparkle ZIP created:"
          ls -lh vellum-assistant.zip

      - name: Install Sparkle sign_update tool
        run: |
          brew install sparkle
          SPARKLE_BIN=$(find /opt/homebrew/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find /usr/local/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          fi
          echo "Found sign_update at: $SPARKLE_BIN"
          echo "$(dirname "$SPARKLE_BIN")" >> "$GITHUB_PATH"

      - name: Generate appcast.xml
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          BUILD_VERSION="${{ steps.version.outputs.build_version }}"

          ED_KEY_FILE=$(mktemp)
          echo "$SPARKLE_ED_PRIVATE_KEY" > "$ED_KEY_FILE"
          SIGNATURE=$(sign_update dist/vellum-assistant.zip --ed-key-file "$ED_KEY_FILE") || {
            echo "sign_update failed with exit code $?"
            rm -f "$ED_KEY_FILE"
            exit 1
          }
          rm -f "$ED_KEY_FILE"
          echo "Signature obtained: ${SIGNATURE:0:20}..."
          SIZE=$(stat -f%z dist/vellum-assistant.zip)

          REPO="vellum-ai/velly"
          FILENAME="appcast.xml"
          cat > "dist/$FILENAME" << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Vellum</title>
              <item>
                <title>${DISPLAY_VERSION}</title>
                <sparkle:version>${BUILD_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${DISPLAY_VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="https://github.com/${REPO}/releases/latest/download/vellum-assistant.zip"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          echo "Appcast generated for $REPO"

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            clients/macos/build/vellum-assistant.dmg
            clients/macos/dist/vellum-assistant.zip
            clients/macos/dist/appcast.xml
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  release:
    needs: [bump-and-tag, publish-npm, publish-meta, build-macos, push-assistant-image, push-gateway-image, ci-cli, ci-gateway, ci-assistant, ci-playwright]
    if: ${{ !cancelled() && needs.bump-and-tag.result == 'success' && needs.publish-npm.result == 'success' && needs.publish-meta.result == 'success' && needs.build-macos.result == 'success' && needs.ci-cli.result == 'success' && needs.ci-gateway.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant,velly

      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Download macOS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: macos-artifacts

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          VERSION_TAG="v${VERSION}"

          NOTES_FILE=$(mktemp)
          {
            echo "**Build:** \`$VERSION\`"
            echo "**Commit:** [\`$SHORT_SHA\`](https://github.com/${{ github.repository }}/commit/$FULL_SHA)"
            echo "**Built at:** $TIMESTAMP"
          } > "$NOTES_FILE"

          ASSETS=()
          if [ -d "macos-artifacts" ]; then
            DMG=$(find macos-artifacts -name "vellum-assistant.dmg" -type f | head -1)
            ZIP=$(find macos-artifacts -name "vellum-assistant.zip" -type f | head -1)
            APPCAST=$(find macos-artifacts -name "appcast.xml" -type f | head -1)
            [ -n "$DMG" ] && ASSETS+=("$DMG#vellum-assistant.dmg")
            [ -n "$ZIP" ] && ASSETS+=("$ZIP#vellum-assistant.zip")
            [ -n "$APPCAST" ] && ASSETS+=("$APPCAST#appcast.xml")
          fi

          INSTALL_SH="cli/src/adapters/install.sh"
          [ -f "$INSTALL_SH" ] && ASSETS+=("$INSTALL_SH#install.sh")

          echo "Release assets: ${ASSETS[*]}"

          # Create release on vellum-assistant (this repo)
          if ! gh release view "$VERSION_TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "$VERSION_TAG" \
              "${ASSETS[@]}" \
              --repo "${{ github.repository }}" \
              --title "Vellum $VERSION" \
              --notes-file "$NOTES_FILE" \
              --latest
            echo "Release created at https://github.com/${{ github.repository }}/releases/tag/$VERSION_TAG"
          else
            echo "Release $VERSION_TAG already exists on ${{ github.repository }}, skipping"
          fi

          # Create release on velly
          VELLY_REPO="vellum-ai/velly"
          if ! gh release view "$VERSION_TAG" --repo "$VELLY_REPO" &>/dev/null; then
            gh release create "$VERSION_TAG" \
              "${ASSETS[@]}" \
              --repo "$VELLY_REPO" \
              --title "Vellum $VERSION" \
              --notes-file "$NOTES_FILE" \
              --latest
            echo "Release created at https://github.com/$VELLY_REPO/releases/tag/$VERSION_TAG"
          else
            echo "Release $VERSION_TAG already exists on $VELLY_REPO, skipping"
          fi

          rm -f "$NOTES_FILE"

  update-platform:
    needs: [bump-and-tag, publish-npm]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: vellum-ai/vellum-assistant-platform
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Update vel dependency
        env:
          NEW_VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          cd vel
          jq --arg v "$NEW_VERSION" '.dependencies["@vellumai/cli"] = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          bun install

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          BRANCH="auto/bump-cli-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add vel/package.json vel/bun.lock
          git commit -m "Bump @vellumai/cli to ${NEW_VERSION} in vel"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo vellum-ai/vellum-assistant-platform \
            --title "Bump @vellumai/cli to ${NEW_VERSION} in vel" \
            --body "Auto-generated PR to update @vellumai/cli to ${NEW_VERSION}." \
            --base main \
            --head "$BRANCH")
          sleep 10
          gh pr merge "$PR_URL" --auto --squash

  ci-assistant:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    outputs:
      actual_result: ${{ steps.report.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: assistant

      - name: Lint
        run: bun run lint
        working-directory: assistant

      - name: Typecheck
        run: bunx tsc --noEmit
        working-directory: assistant

      - name: Test
        run: bun run test
        working-directory: assistant
        env:
          EXCLUDE_EXPERIMENTAL: 'true'

      - name: Report actual result
        id: report
        if: always()
        run: echo "status=${{ job.status }}" >> "$GITHUB_OUTPUT"

  ci-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Lint
        run: bun run lint
        working-directory: cli

      - name: Typecheck
        run: bun run typecheck
        working-directory: cli

  ci-gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: gateway

      - name: Lint
        run: bun run lint
        working-directory: gateway

      - name: Typecheck
        run: bun run typecheck
        working-directory: gateway

      - name: Test
        run: bun run test
        working-directory: gateway

  build-ios:
    needs: bump-and-tag
    runs-on: macos-14
    timeout-minutes: 30
    continue-on-error: true
    env:
      KEYCHAIN_NAME: ios-build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    outputs:
      actual_result: ${{ steps.report.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Clear stale SPM artifact cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

      - name: Import code-signing certificate
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_P12 }}" | base64 -D > /tmp/ios-certificate.p12
          security import /tmp/ios-certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/ios-certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -D \
            > ~/Library/MobileDevice/Provisioning\ Profiles/ios-dist.mobileprovision

      - name: Set version
        id: version
        run: |
          DISPLAY_VERSION="${{ needs.bump-and-tag.outputs.version }}"
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Display version: $DISPLAY_VERSION / Build version: $BUILD_VERSION"

      - name: Build release .ipa
        working-directory: clients/ios
        run: |
          DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          ./build.sh release

          IPA_FILE=$(find dist/export -name "*.ipa" -maxdepth 1 | head -1)
          echo "IPA: $IPA_FILE"
          ls -lh "$IPA_FILE"

      - name: Upload to TestFlight
        working-directory: clients/ios
        run: |
          # Write App Store Connect API key to expected location
          mkdir -p ~/.private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 -D \
            > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

          IPA_FILE=$(find dist/export -name "*.ipa" -maxdepth 1 | head -1)
          if [ -z "$IPA_FILE" ]; then
            echo "ERROR: No .ipa found in dist/export/"
            exit 1
          fi

          echo "Uploading $IPA_FILE to TestFlight..."
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            -t ios \
            --apiKey "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}"

          echo "Upload complete! The build will appear in TestFlight after Apple's processing."

      - name: Report actual result
        id: report
        if: always()
        run: echo "status=${{ job.status }}" >> "$GITHUB_OUTPUT"

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/.private_keys

  ci-playwright:
    needs: [bump-and-tag, build-macos]
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      actions: read
    env:
      APP_DISPLAY_NAME: Vellum
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Download DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: /tmp/macos-artifacts

      - name: Remove all source files except playwright
        run: |
          # Move playwright directory to a safe location
          mv playwright /tmp/playwright-tests

          # Remove everything in the repo except .git
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Restore only the playwright directory
          mv /tmp/playwright-tests playwright

      - name: Install app from DMG
        run: |
          DMG_PATH=$(find /tmp/macos-artifacts -name "*.dmg" -type f | head -1)
          echo "Found DMG at: $DMG_PATH"

          MOUNT_DIR=$(hdiutil attach "$DMG_PATH" -nobrowse | tail -1 | awk '{print $NF}')
          echo "Mounted at: $MOUNT_DIR"

          # Copy the .app to the expected location for tests
          mkdir -p clients/macos/dist
          cp -R "$MOUNT_DIR/${APP_DISPLAY_NAME}.app" "clients/macos/dist/${APP_DISPLAY_NAME}.app"
          echo "App installed at: clients/macos/dist/${APP_DISPLAY_NAME}.app"

          hdiutil detach "$MOUNT_DIR"
          rm -rf /tmp/macos-artifacts

      - name: Verify no source files present
        run: |
          echo "=== Repository contents ==="
          ls -la
          echo ""
          echo "Only playwright/ and clients/macos/dist/ (from DMG) should exist:"
          find . -mindepth 1 -maxdepth 2 ! -path './.git*' ! -path './playwright*' ! -path './clients*' | head -20 || true

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Fetch Anthropic API key from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            ANTHROPIC_API_KEY:vellum-nonprod/ANTHROPIC_API_KEY

      - name: Set Anthropic API key in env
        run: echo "ANTHROPIC_API_KEY=${{ steps.secrets.outputs.ANTHROPIC_API_KEY }}" >> "$GITHUB_ENV"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Playwright dependencies
        working-directory: playwright
        run: bun install

      - name: Install Chromium
        working-directory: playwright
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: playwright
        run: bun run test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright/playwright-report/
            playwright/test-results/
          retention-days: 30

  notify:
    if: always() && !cancelled()
    needs: [bump-and-tag, publish-npm, publish-meta, build-macos, build-ios, push-assistant-image, push-gateway-image, release, update-platform, ci-assistant, ci-cli, ci-gateway, ci-playwright]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Build Slack payload
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          VERSION_TAG="v${VERSION}"

          # Determine release status from core jobs
          RELEASE_FAILED="false"
          for result in \
            "${{ needs.bump-and-tag.result }}" \
            "${{ needs.publish-npm.result }}" \
            "${{ needs.publish-meta.result }}" \
            "${{ needs.build-macos.result }}" \
            "${{ needs.push-assistant-image.result }}" \
            "${{ needs.push-gateway-image.result }}" \
            "${{ needs.release.result }}" \
            "${{ needs.update-platform.result }}" \
            "${{ needs.ci-cli.result }}" \
            "${{ needs.ci-gateway.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "skipped" ]; then
              RELEASE_FAILED="true"
              break
            fi
          done

          if [ "$RELEASE_FAILED" = "true" ]; then
            HEADER="❌ Release ${VERSION_TAG} Failed"
            STYLE="danger"
          else
            HEADER="✅ Release ${VERSION_TAG} Succeeded"
            STYLE=""
          fi

          # Build CI status icons
          ci_icon() { if [ "$1" = "success" ]; then printf '✅'; else printf '❌'; fi; }

          A=$(ci_icon "${{ needs.ci-assistant.outputs.actual_result }}")
          C=$(ci_icon "${{ needs.ci-cli.result }}")
          G=$(ci_icon "${{ needs.ci-gateway.result }}")
          P=$(ci_icon "${{ needs.ci-playwright.result }}")
          D=$(ci_icon "${{ needs.build-macos.result }}")
          I=$(ci_icon "${{ needs.build-ios.outputs.actual_result }}")
          AI=$(ci_icon "${{ needs.push-assistant-image.result }}")
          GI=$(ci_icon "${{ needs.push-gateway-image.result }}")

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PLAYWRIGHT_LINE=""
          if [ "${{ needs.ci-playwright.result }}" != "success" ]; then
            PLAYWRIGHT_LINE=" (<${RUN_URL}#artifacts|view report>)"
          fi

          CI_LINE=$(printf '*CI Checks:*\n• %s assistant\n• %s cli\n• %s gateway\n• %s playwright%s\n• %s desktop\n• %s ios\n• %s assistant-docker\n• %s gateway-docker' "$A" "$C" "$G" "$P" "$PLAYWRIGHT_LINE" "$D" "$I" "$AI" "$GI")
          META_LINE=$(printf '*Version:* `%s`\n*Triggered by:* %s' "$VERSION" "${{ github.actor }}")

          # Fetch release notes from GitHub release
          RELEASE_BODY=$(gh release view "$VERSION_TAG" --repo "${{ github.repository }}" --json body -q .body 2>/dev/null || echo "")

          RELEASE_NOTES_SECTION=""
          RELEASE_SUMMARY=""
          if [ -n "$RELEASE_BODY" ]; then
            # Count items per section
            features=$(echo "$RELEASE_BODY" | awk '/^## Features/{f=1; next} /^## /{f=0} f' | grep -c '^- ' || true)
            fixes=$(echo "$RELEASE_BODY" | awk '/^## Fixes/{f=1; next} /^## /{f=0} f' | grep -c '^- ' || true)
            infra=$(echo "$RELEASE_BODY" | awk '/^## Infrastructure/{f=1; next} /^## /{f=0} f' | grep -c '^- ' || true)

            summary=""
            [ "$features" -gt 0 ] 2>/dev/null && summary="${features} features"
            [ "$fixes" -gt 0 ] 2>/dev/null && summary="${summary:+$summary, }${fixes} fixes"
            [ "$infra" -gt 0 ] 2>/dev/null && summary="${summary:+$summary, }${infra} infra changes"

            if [ -n "$summary" ]; then
              RELEASE_SUMMARY="$summary"
            fi

            # Convert GitHub markdown to Slack mrkdwn:
            RELEASE_NOTES_SECTION=$(echo "$RELEASE_BODY" | \
              sed 's/^## \(.*\)/*\1*/g' | \
              sed 's/\*\*\([^*]*\)\*\*/*\1*/g' | \
              sed 's/\[\([^]]*\)\](\([^)]*\))/<\2|\1>/g' | \
              sed '/^---$/d' | \
              sed '/^Download the DMG.*Applications folder\.$/d' | \
              sed '/^Existing installations will auto-update via Sparkle\.$/d')
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION_TAG}"

          # Build JSON payload with jq
          BLOCKS="[]"

          # Header
          BLOCKS=$(echo "$BLOCKS" | jq --arg header "$HEADER" '. + [{ type: "header", text: { type: "plain_text", text: $header } }]')

          # Release summary (if available)
          if [ -n "$RELEASE_SUMMARY" ]; then
            BLOCKS=$(echo "$BLOCKS" | jq --arg summary "$RELEASE_SUMMARY" '. + [{ type: "section", text: { type: "mrkdwn", text: $summary } }]')
          fi

          # CI checks + metadata
          BODY=$(printf '%s\n\n%s' "$CI_LINE" "$META_LINE")
          BLOCKS=$(echo "$BLOCKS" | jq --arg body "$BODY" '. + [{ type: "section", text: { type: "mrkdwn", text: $body } }]')

          # Release notes body (if available)
          if [ -n "$RELEASE_NOTES_SECTION" ]; then
            BLOCKS=$(echo "$BLOCKS" | jq --arg notes "$RELEASE_NOTES_SECTION" '. + [{ type: "divider" }, { type: "section", text: { type: "mrkdwn", text: $notes } }]')
          fi

          # Buttons
          VIEW_RUN=$(jq -n --arg url "$RUN_URL" --arg style "$STYLE" '{
            type: "button",
            text: { type: "plain_text", text: "View Run" },
            url: $url
          } + (if $style != "" then { style: $style } else {} end)')

          VIEW_RELEASE=$(jq -n --arg url "$RELEASE_URL" '{
            type: "button",
            text: { type: "plain_text", text: "View Release" },
            url: $url,
            style: "primary"
          }')

          if [ "$RELEASE_FAILED" = "true" ]; then
            BUTTONS=$(jq -n --argjson run "$VIEW_RUN" '[$run]')
          else
            BUTTONS=$(jq -n --argjson run "$VIEW_RUN" --argjson release "$VIEW_RELEASE" '[$run, $release]')
          fi

          BLOCKS=$(echo "$BLOCKS" | jq --argjson buttons "$BUTTONS" '. + [{ type: "actions", elements: $buttons }]')

          jq -n --argjson blocks "$BLOCKS" '{
            unfurl_links: false,
            unfurl_media: false,
            blocks: $blocks
          }' > /tmp/slack-payload.json

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
