          - linux/arm64
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image names
        id: image
        run: |
          echo "gcp=${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GATEWAY_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=vellumai/${{ secrets.GATEWAY_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Sync feature flag registry for Docker context
        run: cp meta/feature-flags/feature-flag-registry.json gateway/src/feature-flag-registry.json

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: gateway
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ steps.image.outputs.gcp }},${{ steps.image.outputs.dockerhub }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=gateway-${{ matrix.environment }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=gateway-${{ matrix.environment }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Prepare platform suffix
