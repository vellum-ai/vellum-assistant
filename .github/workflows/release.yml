      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: credential-executor-digests-${{ matrix.environment }}-*
          merge-multiple: true

      - name: Compute image tags
        id: tags
        run: |
          GCP_IMAGE="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CREDENTIAL_EXECUTOR_IMAGE_NAME }}"
          DOCKERHUB_IMAGE="vellumai/${{ secrets.CREDENTIAL_EXECUTOR_IMAGE_NAME }}"
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          SHA="${{ steps.release-sha.outputs.sha }}"

          GCP_TAGS="${GCP_IMAGE}:${SHA}"
          GCP_TAGS=$(printf "%s\n%s" "$GCP_TAGS" "${GCP_IMAGE}:v${VERSION}")
          GCP_TAGS=$(printf "%s\n%s" "$GCP_TAGS" "${GCP_IMAGE}:latest")
          echo "gcp_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$GCP_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:v${VERSION}"
          DOCKERHUB_TAGS=$(printf "%s\n%s" "$DOCKERHUB_TAGS" "${DOCKERHUB_IMAGE}:latest")
          echo "dockerhub_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DOCKERHUB_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "gcp_image=${GCP_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${DOCKERHUB_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create GCP manifest list and push
        working-directory: /tmp/digests
        run: |
          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.tags.outputs.gcp_tags }}"
          SOURCES=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create $TAG_ARGS $SOURCES

      - name: Create Docker Hub manifest list and push
        working-directory: /tmp/digests
        run: |
          IMAGE="${{ steps.tags.outputs.dockerhub_image }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.tags.outputs.dockerhub_tags }}"
          SOURCES=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create $TAG_ARGS $SOURCES

      - name: Export manifest digest
        id: manifest-digest
        run: |
          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:v${VERSION}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Manifest digest: ${DIGEST}"
          mkdir -p /tmp/manifest-digest
          echo "${DIGEST}" > /tmp/manifest-digest/digest

      - name: Upload manifest digest
        uses: actions/upload-artifact@v4
        with:
          name: credential-executor-manifest-digest-${{ matrix.environment }}
          path: /tmp/manifest-digest/digest
          retention-days: 1

      - name: Export image metadata
        id: meta
        run: |
          echo "repository=${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CREDENTIAL_EXECUTOR_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "tag=v${{ needs.bump-and-tag.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "sha=${{ steps.release-sha.outputs.sha }}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Credential Executor Image Published (${{ matrix.environment }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ matrix.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.bump-and-tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**SHA tag:** \`${{ steps.release-sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub:** \`${{ steps.tags.outputs.dockerhub_image }}:v${{ needs.bump-and-tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  register-release:
    needs: [bump-and-tag, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, production]
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Get release SHA
        id: release-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download assistant manifest digest
        uses: actions/download-artifact@v4
        with:
          name: assistant-manifest-digest-${{ matrix.environment }}
          path: /tmp/assistant-digest

      - name: Download gateway manifest digest
        uses: actions/download-artifact@v4
        with:
          name: gateway-manifest-digest-${{ matrix.environment }}
          path: /tmp/gateway-digest

      - name: Download credential-executor manifest digest
        uses: actions/download-artifact@v4
        with:
          name: credential-executor-manifest-digest-${{ matrix.environment }}
          path: /tmp/credential-executor-digest

      - name: Extract manifest digests
        id: digests
        run: |
          ASSISTANT_DIGEST=$(cat /tmp/assistant-digest/digest)
          GATEWAY_DIGEST=$(cat /tmp/gateway-digest/digest)
          CREDENTIAL_EXECUTOR_DIGEST=$(cat /tmp/credential-executor-digest/digest)
          echo "assistant_digest=${ASSISTANT_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "gateway_digest=${GATEWAY_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "credential_executor_digest=${CREDENTIAL_EXECUTOR_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Resolve platform credentials
        id: platform-creds
        run: |
          if [ "${{ matrix.environment }}" = "dev" ]; then
            echo "api_url=${{ secrets.NONPROD_PLATFORM_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "api_key=${{ secrets.NONPROD_PLATFORM_INTERNAL_SERVICE_API_KEY }}" >> "$GITHUB_OUTPUT"
          else
            echo "api_url=${{ secrets.PLATFORM_API_URL }}" >> "$GITHUB_OUTPUT"
            echo "api_key=${{ secrets.PLATFORM_INTERNAL_SERVICE_API_KEY }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Register release with platform
        run: |
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          SHA="${{ steps.release-sha.outputs.sha }}"
          ASSISTANT_REPO="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}"
          GATEWAY_REPO="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GATEWAY_IMAGE_NAME }}"
          CREDENTIAL_EXECUTOR_REPO="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CREDENTIAL_EXECUTOR_IMAGE_NAME }}"

          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg released_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg assistant_repo "$ASSISTANT_REPO" \
            --arg assistant_tag "v${VERSION}" \
            --arg assistant_sha "$SHA" \
            --arg assistant_digest "${{ steps.digests.outputs.assistant_digest }}" \
            --arg gateway_repo "$GATEWAY_REPO" \
            --arg gateway_tag "v${VERSION}" \
            --arg gateway_sha "$SHA" \
            --arg gateway_digest "${{ steps.digests.outputs.gateway_digest }}" \
            --arg credential_executor_repo "$CREDENTIAL_EXECUTOR_REPO" \
            --arg credential_executor_tag "v${VERSION}" \
            --arg credential_executor_sha "$SHA" \
            --arg credential_executor_digest "${{ steps.digests.outputs.credential_executor_digest }}" \
            '{
              version: $version,
              released_at: $released_at,
              is_stable: true,
              assistant_image: {
                repository: $assistant_repo,
                tag: $assistant_tag,
                sha: $assistant_sha,
                digest: $assistant_digest
              },
              gateway_image: {
                repository: $gateway_repo,
                tag: $gateway_tag,
                sha: $gateway_sha,
                digest: $gateway_digest
              },
              credential_executor_image: {
                repository: $credential_executor_repo,
                tag: $credential_executor_tag,
                sha: $credential_executor_sha,
                digest: $credential_executor_digest
              }
            }')

          DELAYS=(5 15 30)
          MAX_ATTEMPTS=3

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            CURL_EXIT=0
            echo "Registering release v${VERSION} with platform (${{ matrix.environment }}) [attempt ${attempt}/${MAX_ATTEMPTS}]..."
            HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "${{ steps.platform-creds.outputs.api_url }}/v1/internal/assistant-image-releases/" \
              -H "Content-Type: application/json" \
              -H "X-Internal-Service-Api-Key: ${{ steps.platform-creds.outputs.api_key }}" \
              -d "$PAYLOAD") || CURL_EXIT=$?

            if [ "${CURL_EXIT:-0}" -ne 0 ]; then
              echo "::warning::curl transport error (exit code $CURL_EXIT) on attempt ${attempt}"
              HTTP_STATUS="000"
            else
              echo "HTTP Status: $HTTP_STATUS"
              cat /tmp/response.json
            fi

            if [ "$HTTP_STATUS" -ge 200 ] 2>/dev/null && [ "$HTTP_STATUS" -lt 300 ] 2>/dev/null; then
              echo "Registration succeeded on attempt ${attempt}"
              exit 0
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              DELAY=${DELAYS[$((attempt - 1))]}
              echo "::warning::Attempt ${attempt} failed (HTTP $HTTP_STATUS). Retrying in ${DELAY}s..."
              sleep "$DELAY"
            else
              echo "::error::Release registration failed after ${MAX_ATTEMPTS} attempts (last HTTP $HTTP_STATUS)"
              exit 1
            fi
          done

      - name: Summary
        run: |
          echo "## Release Registered (${{ matrix.environment }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.bump-and-tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  publish-npm:
    needs: [bump-and-tag, ci-assistant, ci-cli, ci-credential-executor, ci-gateway, ci-playwright]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      matrix:
        package: [assistant, cli, credential-executor, gateway]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Install and publish
        run: |
          cd ${{ matrix.package }}
          if ! bun install --frozen-lockfile; then
            echo "bun install --frozen-lockfile failed; regenerating lockfile and retrying..."
            rm -f bun.lock
            rm -rf node_modules
            bun install
          fi
          npm publish --access public --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-meta:
    needs: [bump-and-tag, publish-npm]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Publish meta-package
        run: |
          cd meta
          npm publish --access public --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # arm64 macOS build — builds Swift + Bun binaries in a single job,
  # creates DMG, notarizes, staples, and generates the Sparkle appcast.
  # This is the primary/default build.
  build-macos-arm64:
    needs: bump-and-tag
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: clients/macos
    env:
      DMG_PATH: build/vellum-assistant.dmg
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Import code-signing certificate
        env:
          CERT_P12: ${{ secrets.DEVID_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERT_P12" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify signing identity
        run: |
          security find-identity -v -p codesigning | grep -q "Developer ID Application" \
            || { echo "::error::Developer ID Application identity not found in keychain. Check the DEVID_CERTIFICATE_P12 secret."; exit 1; }

      - name: Set version
        id: version
        run: |
          DISPLAY_VERSION="${{ needs.bump-and-tag.outputs.version }}"
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Display version: $DISPLAY_VERSION / Build version: $BUILD_VERSION"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install nested package dependencies
        working-directory: .
        run: |
          for dir in packages/*/; do
            [ -f "${dir}/package.json" ] || continue
            echo "Installing dependencies in ${dir}"
            (cd "${dir}" && bun install --frozen-lockfile 2>/dev/null || bun install)
          done

      - name: Build binaries
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          COMMIT_SHA="${{ github.sha }}" \
          ./build.sh binaries

      - name: Build release .app
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          SU_PUBLIC_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
          SIGN_IDENTITY="Developer ID Application" \
          RELEASE_ARCH_FLAGS="--arch arm64" \
          ./build.sh release

          APP_PATH="dist/Vellum.app"
          ls -la "$APP_PATH"
          codesign --verify --strict "$APP_PATH"
          echo "Code signature verified"

          echo "Main executable architecture:"
          file "$APP_PATH/Contents/MacOS/Vellum"

      - name: Upload dSYMs to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npm install -g @sentry/cli@2.42.2
          sentry-cli debug-files upload --org vellum --project vellum-assistant-macos dist/*.dSYM
          sentry-cli debug-files upload --org vellum --project vellum-assistant-brain dist/*.dSYM

      - name: Free disk space
        run: |
          rm -rf .build daemon-bin assistant-bin cli-bin gateway-bin
          rm -rf ../../assistant/node_modules ../../cli/node_modules ../../gateway/node_modules
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          rm -rf ~/Library/Caches/org.swift.swiftpm 2>/dev/null || true
          df -h .
          echo "Disk space freed"

      - name: Generate DMG background
        run: |
          mkdir -p build
          swift dmg/generate-background.swift build/dmg-background@2x.png

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_PATH="dist/Vellum.app"

          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          echo "Staging directory size:"
          du -sh "$DMG_STAGING"

          create-dmg \
            --volname "Vellum" \
            --background "build/dmg-background@2x.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 10 \
            --icon "Vellum.app" 175 190 \
            --icon "Applications" 530 190 \
            --hide-extension "Vellum.app" \
            --no-internet-enable \
            "$DMG_PATH" \
            "$DMG_STAGING/" \
          || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ] && [ -f "$DMG_PATH" ]; then
              echo "create-dmg exited with warning (code 2), but DMG was created successfully"
            else
              echo "create-dmg failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }

          echo "DMG created at $DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "$DMG_PATH"

          codesign --verify --verbose "$DMG_PATH"
          echo "DMG signature verified"

      - name: Notarize DMG
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          echo "Submitting DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed (status: Invalid or command error)"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
                --key-id "$ASC_KEY_ID" \
                --issuer "$ASC_ISSUER_ID" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "Notarization succeeded (status: Accepted)"

      - name: Staple notarization ticket
        run: |
          MAX_ATTEMPTS=15
          WAIT_SECS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "$DMG_PATH" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              echo "$STAPLE_OUTPUT"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed (exit code $STAPLE_EXIT):"
            echo "$STAPLE_OUTPUT"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          xcrun stapler validate "$DMG_PATH"
          echo "Notarization ticket stapled and validated"

      - name: Build ZIP for Sparkle auto-update
        run: |
          cd dist
          ditto -c -k --keepParent Vellum.app vellum-assistant.zip
          echo "Sparkle ZIP created:"
          ls -lh vellum-assistant.zip

      - name: Install Sparkle sign_update tool
        run: |
          brew install sparkle
          SPARKLE_BIN=$(find /opt/homebrew/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find /usr/local/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          fi
          echo "Found sign_update at: $SPARKLE_BIN"
          echo "$(dirname "$SPARKLE_BIN")" >> "$GITHUB_PATH"

      - name: Generate appcast.xml
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          BUILD_VERSION="${{ steps.version.outputs.build_version }}"

          ED_KEY_FILE=$(mktemp)
          echo "$SPARKLE_ED_PRIVATE_KEY" > "$ED_KEY_FILE"
          SIGNATURE=$(sign_update dist/vellum-assistant.zip --ed-key-file "$ED_KEY_FILE") || {
            echo "sign_update failed with exit code $?"
            rm -f "$ED_KEY_FILE"
            exit 1
          }
          rm -f "$ED_KEY_FILE"
          echo "Signature obtained: ${SIGNATURE:0:20}..."
          SIZE=$(stat -f%z dist/vellum-assistant.zip)

          REPO="vellum-ai/velly"
          FILENAME="appcast.xml"
          cat > "dist/$FILENAME" << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Vellum</title>
              <item>
                <title>${DISPLAY_VERSION}</title>
                <sparkle:version>${BUILD_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${DISPLAY_VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="https://github.com/${REPO}/releases/latest/download/vellum-assistant.zip"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          echo "Appcast generated for $REPO"

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            clients/macos/build/vellum-assistant.dmg
            clients/macos/dist/vellum-assistant.zip
            clients/macos/dist/appcast.xml
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup keychain and keys
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true

  # x86_64 macOS build — builds Swift + Bun binaries in a single job,
  # produces a separate DMG for Intel Macs.
  # Runs in parallel with build-macos-arm64 and does NOT block the release job.
  build-macos-x64:
    needs: bump-and-tag
    runs-on: macos-15
    timeout-minutes: 45
    continue-on-error: true
    defaults:
      run:
        working-directory: clients/macos
    env:
      DMG_PATH: build/vellum-assistant-x64.dmg
      KEYCHAIN_NAME: build-x64.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Import code-signing certificate
        env:
          CERT_P12: ${{ secrets.DEVID_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERT_P12" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify signing identity
        run: |
          security find-identity -v -p codesigning | grep -q "Developer ID Application" \
            || { echo "::error::Developer ID Application identity not found in keychain. Check the DEVID_CERTIFICATE_P12 secret."; exit 1; }

      - name: Set version
        id: version
        run: |
          DISPLAY_VERSION="${{ needs.bump-and-tag.outputs.version }}"
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install nested package dependencies
        working-directory: .
        run: |
          for dir in packages/*/; do
            [ -f "${dir}/package.json" ] || continue
            echo "Installing dependencies in ${dir}"
            (cd "${dir}" && bun install --frozen-lockfile 2>/dev/null || bun install)
          done

      - name: Build Bun binaries (x64)
        run: |
          # Build x64 Bun binaries by targeting x64 explicitly
          command -v bun &>/dev/null || { echo "ERROR: bun is required but not found"; exit 1; }

          ASSISTANT_SRC_DIR="../../assistant"
          CLI_SRC_DIR="../../cli"
          GATEWAY_SRC_DIR="../../gateway"

          DAEMON_EXTERNAL_FLAGS=(--external electron --external "chromium-bidi/*")
          DAEMON_FLAGS=("${DAEMON_EXTERNAL_FLAGS[@]}")
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          if [ -n "$DISPLAY_VERSION" ] && [ "$DISPLAY_VERSION" != "0.1.0" ]; then
            DAEMON_FLAGS+=(--define "process.env.APP_VERSION='$DISPLAY_VERSION'")
          fi
          DAEMON_FLAGS+=(--define "process.env.COMMIT_SHA='${{ github.sha }}'")

          # Daemon
          (cd "$ASSISTANT_SRC_DIR" && bun install --frozen-lockfile 2>/dev/null || bun install)
          (cd packages/ces-contracts && bun install --frozen-lockfile 2>/dev/null || bun install)
          mkdir -p daemon-bin
          bun build --compile "${DAEMON_FLAGS[@]}" --target=bun-darwin-x64 \
            "$ASSISTANT_SRC_DIR/src/daemon/main.ts" --outfile daemon-bin/vellum-daemon
          chmod +x daemon-bin/vellum-daemon
          cp "$ASSISTANT_SRC_DIR/node_modules/web-tree-sitter/web-tree-sitter.wasm" daemon-bin/
          cp "$ASSISTANT_SRC_DIR/node_modules/tree-sitter-bash/tree-sitter-bash.wasm" daemon-bin/
          rm -rf daemon-bin/node_modules
          rm -rf daemon-bin/bundled-skills
          cp -R "$ASSISTANT_SRC_DIR/src/config/bundled-skills" daemon-bin/bundled-skills
          rm -rf daemon-bin/templates
          cp -R "$ASSISTANT_SRC_DIR/src/prompts/templates" daemon-bin/templates
          rm -rf daemon-bin/hook-templates
          cp -R "$ASSISTANT_SRC_DIR/hook-templates" daemon-bin/hook-templates
          rm -rf daemon-bin/brain-graph
          mkdir -p daemon-bin/brain-graph
          cp "$ASSISTANT_SRC_DIR/src/runtime/routes/brain-graph/brain-graph.html" daemon-bin/brain-graph/

          # Assistant CLI
          mkdir -p assistant-bin
          bun build --compile "${DAEMON_EXTERNAL_FLAGS[@]}" --target=bun-darwin-x64 \
            "$ASSISTANT_SRC_DIR/src/index.ts" --outfile assistant-bin/vellum-assistant
          chmod +x assistant-bin/vellum-assistant

          # CLI
          (cd "$CLI_SRC_DIR" && bun install --frozen-lockfile 2>/dev/null || bun install)
          mkdir -p cli-bin
          bun build --compile --target=bun-darwin-x64 \
            "$CLI_SRC_DIR/src/index.ts" --outfile cli-bin/vellum-cli
          chmod +x cli-bin/vellum-cli

          # Gateway
          (cd "$GATEWAY_SRC_DIR" && bun install --frozen-lockfile 2>/dev/null || bun install)
          mkdir -p gateway-bin
          bun build --compile --target=bun-darwin-x64 \
            "$GATEWAY_SRC_DIR/src/index.ts" --outfile gateway-bin/vellum-gateway
          chmod +x gateway-bin/vellum-gateway

      - name: Build release .app
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          SU_PUBLIC_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
          SIGN_IDENTITY="Developer ID Application" \
          RELEASE_ARCH_FLAGS="--arch x86_64" \
          ./build.sh release

          APP_PATH="dist/Vellum.app"
          ls -la "$APP_PATH"
          codesign --verify --strict "$APP_PATH"
          echo "Code signature verified"

          echo "Main executable architecture:"
          file "$APP_PATH/Contents/MacOS/Vellum"

      - name: Upload dSYMs to Sentry
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          npm install -g @sentry/cli@2.42.2
          sentry-cli debug-files upload --org vellum --project vellum-assistant-macos dist/*.dSYM
          sentry-cli debug-files upload --org vellum --project vellum-assistant-brain dist/*.dSYM

      - name: Free disk space
        run: |
          rm -rf .build daemon-bin assistant-bin cli-bin gateway-bin
          rm -rf ../../assistant/node_modules ../../cli/node_modules ../../gateway/node_modules
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          df -h .

      - name: Generate DMG background
        run: |
          mkdir -p build
          swift dmg/generate-background.swift build/dmg-background@2x.png

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_PATH="dist/Vellum.app"

          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          echo "Staging directory size:"
          du -sh "$DMG_STAGING"

          create-dmg \
            --volname "Vellum" \
            --background "build/dmg-background@2x.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 10 \
            --icon "Vellum.app" 175 190 \
            --icon "Applications" 530 190 \
            --hide-extension "Vellum.app" \
            --no-internet-enable \
            "$DMG_PATH" \
            "$DMG_STAGING/" \
          || {
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ] && [ -f "$DMG_PATH" ]; then
              echo "create-dmg exited with warning (code 2), but DMG was created successfully"
            else
              echo "create-dmg failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }

          echo "DMG created at $DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "$DMG_PATH"

          codesign --verify --verbose "$DMG_PATH"
          echo "DMG signature verified"

      - name: Notarize DMG
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          echo "Submitting x64 DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::x64 notarization failed (status: Invalid or command error)"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
                --key-id "$ASC_KEY_ID" \
                --issuer "$ASC_ISSUER_ID" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "x64 notarization succeeded (status: Accepted)"

      - name: Staple notarization ticket
        run: |
          MAX_ATTEMPTS=15
          WAIT_SECS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "$DMG_PATH" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              echo "$STAPLE_OUTPUT"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed (exit code $STAPLE_EXIT):"
            echo "$STAPLE_OUTPUT"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          xcrun stapler validate "$DMG_PATH"
          echo "x64 notarization ticket stapled and validated"

      - name: Upload x64 DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-x64
          path: clients/macos/build/vellum-assistant-x64.dmg
          if-no-files-found: error
          retention-days: 1

      - name: Cleanup keychain and keys
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true

  release:
    needs: [bump-and-tag, publish-npm, publish-meta, build-macos-arm64, build-macos-x64, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, register-release, ci-playwright]
    if: ${{ !cancelled() && needs.bump-and-tag.result == 'success' && needs.publish-npm.result == 'success' && needs.publish-meta.result == 'success' && needs.build-macos-arm64.result == 'success' && needs.ci-playwright.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant,velly

      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Download macOS build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: macos-artifacts

      - name: Download x64 DMG artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: macos-build-x64
          path: macos-artifacts-x64

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          VERSION_TAG="v${VERSION}"

          NOTES_FILE=$(mktemp)
          {
            echo "**Build:** \`$VERSION\`"
            echo "**Commit:** [\`$SHORT_SHA\`](https://github.com/${{ github.repository }}/commit/$FULL_SHA)"
            echo "**Built at:** $TIMESTAMP"
          } > "$NOTES_FILE"

          ASSETS=()
          if [ -d "macos-artifacts" ]; then
            DMG=$(find macos-artifacts -name "vellum-assistant.dmg" -type f | head -1)
            ZIP=$(find macos-artifacts -name "vellum-assistant.zip" -type f | head -1)
            APPCAST=$(find macos-artifacts -name "appcast.xml" -type f | head -1)
            [ -n "$DMG" ] && ASSETS+=("$DMG#vellum-assistant.dmg")
            [ -n "$ZIP" ] && ASSETS+=("$ZIP#vellum-assistant.zip")
            [ -n "$APPCAST" ] && ASSETS+=("$APPCAST#appcast.xml")
          fi

          # Add x64 DMG if available (non-blocking — may not exist if x64 build failed)
          if [ -d "macos-artifacts-x64" ]; then
            X64_DMG=$(find macos-artifacts-x64 -name "vellum-assistant-x64.dmg" -type f | head -1)
            [ -n "$X64_DMG" ] && ASSETS+=("$X64_DMG#vellum-assistant-x64.dmg")
          fi

          INSTALL_SH="cli/src/adapters/install.sh"
          [ -f "$INSTALL_SH" ] && ASSETS+=("$INSTALL_SH#install.sh")

          echo "Release assets: ${ASSETS[*]}"

          # Create release on vellum-assistant (this repo)
          if ! gh release view "$VERSION_TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release create "$VERSION_TAG" \
              "${ASSETS[@]}" \
              --repo "${{ github.repository }}" \
              --title "Vellum $VERSION" \
              --notes-file "$NOTES_FILE" \
              --latest
            echo "Release created at https://github.com/${{ github.repository }}/releases/tag/$VERSION_TAG"
          else
            echo "Release $VERSION_TAG already exists on ${{ github.repository }}, skipping"
          fi

          # Create release on velly
          VELLY_REPO="vellum-ai/velly"
          if ! gh release view "$VERSION_TAG" --repo "$VELLY_REPO" &>/dev/null; then
            gh release create "$VERSION_TAG" \
              "${ASSETS[@]}" \
              --repo "$VELLY_REPO" \
              --title "Vellum $VERSION" \
              --notes-file "$NOTES_FILE" \
              --latest
            echo "Release created at https://github.com/$VELLY_REPO/releases/tag/$VERSION_TAG"
          else
            echo "Release $VERSION_TAG already exists on $VELLY_REPO, skipping"
          fi

          rm -f "$NOTES_FILE"

  update-platform:
    needs: [bump-and-tag, publish-npm]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: vellum-ai/vellum-assistant-platform
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Update vel dependency
        env:
          NEW_VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          cd vel
          jq --arg v "$NEW_VERSION" '.dependencies["@vellumai/cli"] = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          bun install

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ needs.bump-and-tag.outputs.version }}
        run: |
          BRANCH="auto/bump-cli-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add vel/package.json vel/bun.lock
          git commit -m "Bump @vellumai/cli to ${NEW_VERSION} in vel"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo vellum-ai/vellum-assistant-platform \
            --title "Bump @vellumai/cli to ${NEW_VERSION} in vel" \
            --body "Auto-generated PR to update @vellumai/cli to ${NEW_VERSION}." \
            --base main \
            --head "$BRANCH")
          sleep 10
          gh pr merge "$PR_URL" --auto --squash

  # NOTE: ci-assistant is not ready for prime time yet, so we don't block the
  # release on its result. It still runs so we get visibility in the Slack
  # notification, but downstream jobs no longer depend on it.
  ci-assistant:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: assistant

      - name: Install nested package dependencies
        run: |
          for dir in packages/*/; do
            [ -f "${dir}/package.json" ] || continue
            echo "Installing dependencies in ${dir}"
            (cd "${dir}" && bun install --frozen-lockfile 2>/dev/null || bun install)
          done

      - name: Lint
        run: bun run lint
        working-directory: assistant

      - name: Typecheck
        run: bunx tsc --noEmit
        working-directory: assistant

      - name: Test
        run: bun run test
        working-directory: assistant
        env:
          EXCLUDE_EXPERIMENTAL: 'true'
          TEST_WORKERS: '4'

  ci-cli:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Lint
        run: bun run lint
        working-directory: cli

      - name: Typecheck
        run: bun run typecheck
        working-directory: cli

  ci-gateway:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: gateway

      - name: Lint
        run: bun run lint
        working-directory: gateway

      - name: Typecheck
        run: bun run typecheck
        working-directory: gateway

      - name: Test
        run: bun run test
        working-directory: gateway

  ci-credential-executor:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: credential-executor

      - name: Install linked package dependencies
        run: |
          for pkg in $(jq -r '.bundledDependencies[]' credential-executor/package.json | sed 's|@vellumai/||'); do
            cd packages/$pkg && bun install --frozen-lockfile && cd ../..;
          done

      - name: Typecheck
        run: bun run typecheck
        working-directory: credential-executor

      - name: Test
        run: bun run test
        working-directory: credential-executor

  build-ios:
    needs: bump-and-tag
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Clear stale SPM artifact cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

      - name: Build for simulator
        working-directory: clients/ios
        run: ./build.sh

      - name: Run iOS tests
        working-directory: clients/ios
        run: ./build.sh test

  release-ios:
    needs: [bump-and-tag, build-ios]
    runs-on: macos-15
    timeout-minutes: 30
    env:
      KEYCHAIN_NAME: ios-build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Import code-signing certificate
        env:
          CERT_P12: ${{ secrets.DIST_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DIST_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERT_P12" | base64 -D > /tmp/ios-certificate.p12
          security import /tmp/ios-certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/ios-certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify signing identity
        run: |
          security find-identity -v -p codesigning | grep -q "Apple Distribution" \
            || { echo "::error::Apple Distribution identity not found in keychain. Check the DIST_CERTIFICATE_P12 secret."; exit 1; }

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROVISIONING_PROFILE" | base64 -D > "$PROFILE_DIR/ios_distribution.mobileprovision"
          echo "Provisioning profile installed"

      - name: Set version
        id: version
        run: |
          DISPLAY_VERSION="${{ needs.bump-and-tag.outputs.version }}"
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Display version: $DISPLAY_VERSION / Build version: $BUILD_VERSION"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Clear stale SPM artifact cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

      - name: Build release .ipa
        working-directory: clients/ios
        run: |
          DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          ./build.sh release

      - name: Upload to TestFlight
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          IPA_FILE=$(find clients/ios/dist/export -name "*.ipa" -maxdepth 1 | head -1)
          echo "Uploading $IPA_FILE to TestFlight..."
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            --type ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: clients/ios/dist/export/*.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keychain and keys
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true

  ci-playwright:
    name: Playwright Tests
    needs: [bump-and-tag, build-macos-arm64]
    if: ${{ !cancelled() && needs.build-macos-arm64.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Trigger Playwright workflow in platform repo
        id: trigger
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          SOURCE="run:${{ github.run_id }}"
          BEFORE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"

          curl -fsSL \
            -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/vellum-ai/vellum-assistant-platform/actions/workflows/playwright.yaml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"source\":\"$SOURCE\",\"shards\":\"4\",\"test_filter\":\"stable\"}}"

          echo "Triggered playwright workflow with source $SOURCE"
          sleep 15

      - name: Wait for Playwright workflow result
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          RUN_ID=""
          for i in $(seq 1 30); do
            RUN_ID=$(curl -fsSL \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/vellum-ai/vellum-assistant-platform/actions/workflows/playwright.yaml/runs?created=>=${{ steps.trigger.outputs.before }}&event=workflow_dispatch&per_page=1" \
              | python3 -c "import sys,json; runs=json.load(sys.stdin).get('workflow_runs',[]); print(runs[0]['id'] if runs else '')")

            if [ -n "$RUN_ID" ]; then
              echo "Found workflow run: $RUN_ID"
              RUN_URL="https://github.com/vellum-ai/vellum-assistant-platform/actions/runs/$RUN_ID"
              echo "Run URL: $RUN_URL"
              break
            fi
            echo "Waiting for run to appear... (attempt $i/30)"
            sleep 10
          done

          if [ -z "$RUN_ID" ]; then
            echo "::error::Could not find triggered workflow run after 5 minutes"
            exit 1
          fi

          while true; do
            RESPONSE=$(curl -fsSL \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/vellum-ai/vellum-assistant-platform/actions/runs/$RUN_ID")

            RUN_STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            CONCLUSION=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('conclusion') or '')")

            echo "$(date -u +%H:%M:%S) Run $RUN_ID: status=$RUN_STATUS conclusion=$CONCLUSION"

            if [ "$RUN_STATUS" = "completed" ]; then
              RUN_URL="https://github.com/vellum-ai/vellum-assistant-platform/actions/runs/$RUN_ID"
              if [ "$CONCLUSION" = "success" ]; then
                echo "Playwright tests passed! $RUN_URL"
                exit 0
              else
                echo "::error::Playwright tests failed (conclusion: $CONCLUSION). See: $RUN_URL"
                exit 1
              fi
            fi

            sleep 30
          done

  notify-release:
    name: Slack Notification (Release)
    if: always() && !cancelled()
    needs: [bump-and-tag, publish-npm, publish-meta, build-macos-arm64, build-macos-x64, build-ios, release-ios, push-assistant-manifest, push-gateway-manifest, push-credential-executor-manifest, register-release, release, update-platform, ci-assistant, ci-cli, ci-credential-executor, ci-gateway, ci-playwright]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Build Slack payload
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          VERSION_TAG="v${VERSION}"

          # Determine release status from the release job
          RELEASE_FAILED="false"
          if [ "${{ needs.release.result }}" != "success" ]; then
            RELEASE_FAILED="true"
          fi

          if [ "$RELEASE_FAILED" = "true" ]; then
            HEADER="❌ Release ${VERSION_TAG} Failed"
            STYLE="danger"
          else
            HEADER="✅ Release ${VERSION_TAG} Succeeded"
            STYLE=""
          fi

          # Build CI status icons
          ci_icon() { if [ "$1" = "success" ]; then printf '✅'; elif [ "$1" = "skipped" ]; then printf '⏭️'; else printf '❌'; fi; }

          A=$(ci_icon "${{ needs.ci-assistant.result }}")
          C=$(ci_icon "${{ needs.ci-cli.result }}")
          CE=$(ci_icon "${{ needs.ci-credential-executor.result }}")
          G=$(ci_icon "${{ needs.ci-gateway.result }}")
          P=$(ci_icon "${{ needs.ci-playwright.result }}")
          D=$(ci_icon "${{ needs.build-macos-arm64.result }}")
          DX=$(ci_icon "${{ needs.build-macos-x64.result }}")
          I=$(ci_icon "${{ needs.build-ios.result }}")
          RI=$(ci_icon "${{ needs.release-ios.result }}")
          AI=$(ci_icon "${{ needs.push-assistant-manifest.result }}")
          GI=$(ci_icon "${{ needs.push-gateway-manifest.result }}")
          CEI=$(ci_icon "${{ needs.push-credential-executor-manifest.result }}")
          RR=$(ci_icon "${{ needs.register-release.result }}")

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PLAYWRIGHT_LINE=""
          if [ "${{ needs.ci-playwright.result }}" != "success" ]; then
            PLAYWRIGHT_LINE=" (<${RUN_URL}#artifacts|view report>)"
          fi

          CI_LINE=$(printf '*CI Checks:*\n• %s assistant\n• %s cli\n• %s credential-executor\n• %s gateway\n• %s playwright%s\n• %s desktop (arm64)\n• %s desktop (x64)\n• %s ios\n• %s ios-release\n• %s assistant-docker\n• %s gateway-docker\n• %s credential-executor-docker\n• %s register-release' "$A" "$C" "$CE" "$G" "$P" "$PLAYWRIGHT_LINE" "$D" "$DX" "$I" "$RI" "$AI" "$GI" "$CEI" "$RR")
          META_LINE=$(printf '*Version:* `%s`\n*Triggered by:* %s' "$VERSION" "${{ github.actor }}")

          # Fetch release notes from GitHub release
          RELEASE_BODY=$(gh release view "$VERSION_TAG" --repo "${{ github.repository }}" --json body -q .body 2>/dev/null || echo "")

          RELEASE_NOTES_SECTION=""
          RELEASE_SUMMARY=""
          if [ -n "$RELEASE_BODY" ]; then
            # Count items per section
            features=$(echo "$RELEASE_BODY" | awk '/^## Features/{f=1; next} /^## /{f=0} f' | grep -c '^- ' || true)
            fixes=$(echo "$RELEASE_BODY" | awk '/^## Fixes/{f=1; next} /^## /{f=0} f' | grep -c '^- ' || true)
            infra=$(echo "$RELEASE_BODY" | awk '/^## Infrastructure/{f=1; next} /^## /{f=0} f' | grep -c '^- ' || true)

            summary=""
            [ "$features" -gt 0 ] 2>/dev/null && summary="${features} features"
            [ "$fixes" -gt 0 ] 2>/dev/null && summary="${summary:+$summary, }${fixes} fixes"
            [ "$infra" -gt 0 ] 2>/dev/null && summary="${summary:+$summary, }${infra} infra changes"

            if [ -n "$summary" ]; then
              RELEASE_SUMMARY="$summary"
            fi

            # Convert GitHub markdown to Slack mrkdwn:
            RELEASE_NOTES_SECTION=$(echo "$RELEASE_BODY" | \
              sed 's/^## \(.*\)/*\1*/g' | \
              sed 's/\*\*\([^*]*\)\*\*/*\1*/g' | \
              sed 's/\[\([^]]*\)\](\([^)]*\))/<\2|\1>/g' | \
              sed '/^---$/d' | \
              sed '/^Download the DMG.*Applications folder\.$/d' | \
              sed '/^Existing installations will auto-update via Sparkle\.$/d')
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${VERSION_TAG}"

          # Build JSON payload with jq
          BLOCKS="[]"

          # Header
          BLOCKS=$(echo "$BLOCKS" | jq --arg header "$HEADER" '. + [{ type: "header", text: { type: "plain_text", text: $header } }]')

          # Release summary (if available)
          if [ -n "$RELEASE_SUMMARY" ]; then
            BLOCKS=$(echo "$BLOCKS" | jq --arg summary "$RELEASE_SUMMARY" '. + [{ type: "section", text: { type: "mrkdwn", text: $summary } }]')
          fi

          # CI checks + metadata
          BODY=$(printf '%s\n\n%s' "$CI_LINE" "$META_LINE")
          BLOCKS=$(echo "$BLOCKS" | jq --arg body "$BODY" '. + [{ type: "section", text: { type: "mrkdwn", text: $body } }]')

          # Release notes body (if available)
          if [ -n "$RELEASE_NOTES_SECTION" ]; then
            BLOCKS=$(echo "$BLOCKS" | jq --arg notes "$RELEASE_NOTES_SECTION" '. + [{ type: "divider" }, { type: "section", text: { type: "mrkdwn", text: $notes } }]')
          fi

          # Buttons
          VIEW_RUN=$(jq -n --arg url "$RUN_URL" --arg style "$STYLE" '{
            type: "button",
            text: { type: "plain_text", text: "View Run" },
            url: $url
          } + (if $style != "" then { style: $style } else {} end)')

          VIEW_RELEASE=$(jq -n --arg url "$RELEASE_URL" '{
            type: "button",
            text: { type: "plain_text", text: "View Release" },
            url: $url,
            style: "primary"
          }')

          if [ "$RELEASE_FAILED" = "true" ]; then
            BUTTONS=$(jq -n --argjson run "$VIEW_RUN" '[$run]')
          else
            BUTTONS=$(jq -n --argjson run "$VIEW_RUN" --argjson release "$VIEW_RELEASE" '[$run, $release]')
          fi

          BLOCKS=$(echo "$BLOCKS" | jq --argjson buttons "$BUTTONS" '. + [{ type: "actions", elements: $buttons }]')

          jq -n --argjson blocks "$BLOCKS" '{
            unfurl_links: false,
            unfurl_media: false,
            blocks: $blocks
          }' > /tmp/slack-payload.json

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: /tmp/slack-payload.json
