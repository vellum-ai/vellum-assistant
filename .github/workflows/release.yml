name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  compute-version:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version from bump type
        id: compute
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  notify-start:
    name: Slack Notification (Release Start)
    needs: compute-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Notify Slack of release start
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\U0001F680 Release v${{ needs.compute-version.outputs.version }} Started"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Unified Release\n*Version:* `${{ needs.compute-version.outputs.version }}`\n*Bump:* `${{ inputs.bump }}`\n*Triggered by:* ${{ github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  bump-and-tag:
    needs: compute-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set version output
        id: version
        run: echo "version=${{ needs.compute-version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Bump versions via PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          BRANCH="release/v$VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Bump all package.json files
          for pkg in assistant cli credential-executor gateway meta; do
            jq --arg v "$VERSION" '.version = $v' $pkg/package.json > tmp && mv tmp $pkg/package.json
          done

          # Bump meta-package dependency versions
          jq --arg v "$VERSION" '
            .dependencies["@vellumai/assistant"] = $v |
            .dependencies["@vellumai/cli"] = $v |
            .dependencies["@vellumai/credential-executor"] = $v |
            .dependencies["@vellumai/vellum-gateway"] = $v
          ' meta/package.json > tmp && mv tmp meta/package.json

          # Bump macOS app version
          sed -i "s/^let appVersion = .*/let appVersion = \"$VERSION\"/" clients/Package.swift

          git add -A
          if git diff --cached --quiet; then
            echo "Version files already at $VERSION — skipping bump PR"
          else
            git commit -m "Release v$VERSION"
            git push origin "$BRANCH"

            PR_URL=$(gh pr create \
              --title "Release v$VERSION" \
              --body "Automated version bump to $VERSION." \
              --base main \
              --head "$BRANCH")
            gh pr merge "$PR_URL" --squash --admin
          fi

      - name: Tag release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          git fetch origin main
          git tag "v$VERSION" origin/main
          git push origin "v$VERSION"

    outputs:
      version: ${{ steps.version.outputs.version }}

  push-assistant-image:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, production]
        platform:
          - linux/amd64
          - linux/arm64
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image names
        id: image
        run: |
          echo "gcp=${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "dockerhub=vellumai/${{ secrets.ASSISTANT_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Sync feature flag registry for Docker context
        run: cp meta/feature-flags/feature-flag-registry.json assistant/src/config/feature-flag-registry.json

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: assistant/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ steps.image.outputs.gcp }},${{ steps.image.outputs.dockerhub }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=assistant-${{ matrix.environment }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=assistant-${{ matrix.environment }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Prepare platform suffix
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "suffix=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: assistant-digests-${{ matrix.environment }}-${{ steps.platform.outputs.suffix }}
          path: /tmp/digests/*
          retention-days: 1

  push-assistant-manifest:
    needs: [bump-and-tag, push-assistant-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, production]
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump-and-tag.outputs.version }}"

      - name: Get release SHA
        id: release-sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: assistant-digests-${{ matrix.environment }}-*
          merge-multiple: true

      - name: Compute image tags
        id: tags
        run: |
          GCP_IMAGE="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}"
          DOCKERHUB_IMAGE="vellumai/${{ secrets.ASSISTANT_IMAGE_NAME }}"
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          SHA="${{ steps.release-sha.outputs.sha }}"

          GCP_TAGS="${GCP_IMAGE}:${SHA}"
          GCP_TAGS=$(printf "%s\n%s" "$GCP_TAGS" "${GCP_IMAGE}:v${VERSION}")
          GCP_TAGS=$(printf "%s\n%s" "$GCP_TAGS" "${GCP_IMAGE}:latest")
          echo "gcp_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$GCP_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:v${VERSION}"
          DOCKERHUB_TAGS=$(printf "%s\n%s" "$DOCKERHUB_TAGS" "${DOCKERHUB_IMAGE}:latest")
          echo "dockerhub_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DOCKERHUB_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "gcp_image=${GCP_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "dockerhub_image=${DOCKERHUB_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create GCP manifest list and push
        working-directory: /tmp/digests
        run: |
          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.tags.outputs.gcp_tags }}"
          SOURCES=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create $TAG_ARGS $SOURCES

      - name: Create Docker Hub manifest list and push
        working-directory: /tmp/digests
        run: |
          IMAGE="${{ steps.tags.outputs.dockerhub_image }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.tags.outputs.dockerhub_tags }}"
          SOURCES=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create $TAG_ARGS $SOURCES

      - name: Export manifest digest
        id: manifest-digest
        run: |
          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          VERSION="${{ needs.bump-and-tag.outputs.version }}"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:v${VERSION}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Manifest digest: ${DIGEST}"
          mkdir -p /tmp/manifest-digest
          echo "${DIGEST}" > /tmp/manifest-digest/digest

      - name: Upload manifest digest
        uses: actions/upload-artifact@v4
        with:
          name: assistant-manifest-digest-${{ matrix.environment }}
          path: /tmp/manifest-digest/digest
          retention-days: 1

      - name: Export image metadata
        id: meta
        run: |
          echo "repository=${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "tag=v${{ needs.bump-and-tag.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "sha=${{ steps.release-sha.outputs.sha }}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Assistant Image Published (${{ matrix.environment }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** \`${{ matrix.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ needs.bump-and-tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**SHA tag:** \`${{ steps.release-sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub:** \`${{ steps.tags.outputs.dockerhub_image }}:v${{ needs.bump-and-tag.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  push-gateway-image:
