      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: gateway-digests-${{ matrix.environment }}-${{ steps.platform.outputs.suffix }}
          path: /tmp/digests/*
          retention-days: 1

  push-credential-executor-image:
