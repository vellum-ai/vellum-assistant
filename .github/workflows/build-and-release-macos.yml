name: Build and Release macOS App

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build-sign-release:
    runs-on: macos-14
    defaults:
      run:
        working-directory: clients/macos
    env:
      DMG_PATH: build/vellum-assistant.dmg
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: velly

      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Import code-signing certificate
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the .p12 certificate
          echo "${{ secrets.CERTIFICATE_P12 }}" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          # Allow codesign to access the keychain without prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list and set as default
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # Verify the certificate was imported
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Stamp version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            DISPLAY_VERSION="${TAG#v}"
          else
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            SHORT_SHA=$(git rev-parse --short HEAD)
            DISPLAY_VERSION="${TAG#v}-${SHORT_SHA}"
          fi
          BUILD_VERSION=$(date -u +%Y%m%d%H%M)
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Display version: $DISPLAY_VERSION / Build version: $BUILD_VERSION"

      - name: Zip assistant directory
        run: |
          mkdir -p build
          (cd ../../assistant && zip -r ../clients/macos/build/assistant.zip .)
          ls -lh build/assistant.zip

      - name: Zip gateway directory
        run: |
          mkdir -p build
          (cd ../../gateway && zip -r ../clients/macos/build/gateway.zip .)
          ls -lh build/gateway.zip

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build daemon binary
        working-directory: assistant
        run: |
          bun install
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          bun build --compile --target=bun-darwin-arm64 src/daemon/main.ts \
            --external electron --external "chromium-bidi/*" \
            --define "process.env.APP_VERSION='$DISPLAY_VERSION'" \
            --outfile ../clients/macos/daemon-bin/vellum-daemon
          chmod +x ../clients/macos/daemon-bin/vellum-daemon
          echo "Daemon binary built:"
          ls -lh ../clients/macos/daemon-bin/vellum-daemon

      - name: Build release .app
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          SU_PUBLIC_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
          SIGN_IDENTITY="Developer ID Application" \
          ./build.sh release

          APP_PATH="dist/Vellum.app"

          # Verify the app exists
          ls -la "$APP_PATH"

          # Verify code signature
          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signature verified"

      - name: Free disk space
        run: |
          rm -rf .build daemon-bin
          rm -rf ../../assistant/node_modules
          # Clear Xcode caches
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          rm -rf ~/Library/Caches/org.swift.swiftpm 2>/dev/null || true
          df -h .
          echo "Disk space freed"

      - name: Generate DMG background
        run: |
          mkdir -p build
          swift dmg/generate-background.swift build/dmg-background@2x.png

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_PATH="dist/Vellum.app"

          # Stage the .app and an Applications symlink for the drop target
          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          echo "Staging directory size:"
          du -sh "$DMG_STAGING"

          # Create styled DMG with background, icon layout, and Applications drop link
          create-dmg \
            --volname "Vellum" \
            --background "build/dmg-background@2x.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --text-size 10 \
            --icon "Vellum.app" 175 190 \
            --icon "Applications" 530 190 \
            --hide-extension "Vellum.app" \
            --no-internet-enable \
            "$DMG_PATH" \
            "$DMG_STAGING/" \
          || {
            # create-dmg exits 2 on non-fatal warnings (e.g. Finder scripting delays)
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 2 ] && [ -f "$DMG_PATH" ]; then
              echo "create-dmg exited with warning (code 2), but DMG was created successfully"
            else
              echo "create-dmg failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          }

          echo "DMG created at $DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "$DMG_PATH"

          # Verify DMG signature
          codesign --verify --verbose "$DMG_PATH"
          echo "DMG signature verified"

      - name: Notarize DMG
        run: |
          echo "Submitting DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          # Extract the submission ID for log fetching
          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          # Check for failure: either the command failed or Apple rejected the submission
          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed (status: Invalid or command error)"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_APP_PASSWORD }}" \
                --team-id "${{ secrets.APPLE_TEAM_ID }}" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "Notarization succeeded (status: Accepted)"

      - name: Staple notarization ticket
        run: |
          # Apple's CDN can take several minutes to propagate the ticket after notarization
          MAX_ATTEMPTS=15
          WAIT_SECS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "$DMG_PATH" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              echo "$STAPLE_OUTPUT"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed (exit code $STAPLE_EXIT):"
            echo "$STAPLE_OUTPUT"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            # Increase wait time for subsequent attempts (60, 75, 90, 105, ...)
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          # Verify stapling
          xcrun stapler validate "$DMG_PATH"
          echo "Notarization ticket stapled and validated"

      - name: Upload DMG artifact
        if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: vellum-assistant.dmg
          path: clients/macos/${{ env.DMG_PATH }}

      - name: Build ZIP for Sparkle auto-update
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist
          ditto -c -k --keepParent Vellum.app vellum-assistant.zip
          echo "Sparkle ZIP created:"
          ls -lh vellum-assistant.zip

      - name: Install Sparkle sign_update tool
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          brew install sparkle
          SPARKLE_BIN=$(find /opt/homebrew/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find /usr/local/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          fi
          echo "Found sign_update at: $SPARKLE_BIN"
          echo "$(dirname "$SPARKLE_BIN")" >> "$GITHUB_PATH"

      - name: Generate appcast.xml
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          BUILD_VERSION="${{ steps.version.outputs.build_version }}"

          # Sign the ZIP with Sparkle EdDSA key (write to temp file — CLI arg is deprecated)
          echo "sign_update location: $(which sign_update || echo 'NOT FOUND')"
          ED_KEY_FILE=$(mktemp)
          echo "$SPARKLE_ED_PRIVATE_KEY" > "$ED_KEY_FILE"
          SIGNATURE=$(sign_update dist/vellum-assistant.zip --ed-key-file "$ED_KEY_FILE") || {
            echo "sign_update failed with exit code $?"
            rm -f "$ED_KEY_FILE"
            exit 1
          }
          rm -f "$ED_KEY_FILE"
          echo "Signature obtained: ${SIGNATURE:0:20}..."
          SIZE=$(stat -f%z dist/vellum-assistant.zip)

          REPO="vellum-ai/velly"
          FILENAME="appcast-${REPO//\//-}.xml"
          cat > "dist/$FILENAME" << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Vellum</title>
              <item>
                <title>${DISPLAY_VERSION}</title>
                <sparkle:version>${BUILD_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${DISPLAY_VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="https://github.com/${REPO}/releases/latest/download/vellum-assistant.zip"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          echo "Appcast generated for $REPO"

      - name: Create GitHub Release on public repos
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          UPSTREAM_BODY: ${{ github.event.release.body }}
        run: |
          VERSION="${{ steps.version.outputs.display_version }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          NOTES_FILE=$(mktemp)
          {
            echo "**Build:** \`$VERSION\`"
            echo "**Commit:** [\`$SHORT_SHA\`](https://github.com/${{ github.repository }}/commit/$FULL_SHA)"
            echo "**Built at:** $TIMESTAMP"
            echo ""
            echo "---"
            echo ""
            if [ -n "$UPSTREAM_BODY" ]; then
              echo "$UPSTREAM_BODY"
              echo ""
              echo "---"
              echo ""
            fi
            echo "Download the DMG, open it, and drag Vellum to your Applications folder."
            echo "Existing installations will auto-update via Sparkle."
          } > "$NOTES_FILE"

          REPO="vellum-ai/velly"
          APPCAST="dist/appcast-${REPO//\//-}.xml"

          # Delete existing 'latest' release and tag if they exist
          gh release delete latest --repo "$REPO" --yes 2>/dev/null || true
          gh api "repos/$REPO/git/refs/tags/latest" -X DELETE 2>/dev/null || true

          # Build asset list from available files
          ASSETS=()
          [ -f "$DMG_PATH" ] && ASSETS+=("$DMG_PATH")
          [ -f "dist/vellum-assistant.zip" ] && ASSETS+=("dist/vellum-assistant.zip")
          [ -f "$APPCAST" ] && ASSETS+=("$APPCAST#appcast.xml")
          [ -f "build/assistant.zip" ] && ASSETS+=("build/assistant.zip#assistant.zip")
          [ -f "build/gateway.zip" ] && ASSETS+=("build/gateway.zip#gateway.zip")

          echo "Release assets: ${ASSETS[*]}"

          gh release create latest \
            "${ASSETS[@]}" \
            --repo "$REPO" \
            --title "Vellum $VERSION" \
            --notes-file "$NOTES_FILE" \
            --latest

          rm -f "$NOTES_FILE"
          echo "Release created at https://github.com/$REPO/releases/tag/latest"

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  notify-failure:
    if: failure()
    needs: [build-sign-release]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack of build failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_RELEASES_CHANNEL_ID }}
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\u274c Build and Release macOS App Failed"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Build and Release macOS App\n*Branch:* `${{ github.ref_name }}`\n*Triggered by:* ${{ github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    style: danger
