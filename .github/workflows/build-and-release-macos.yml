name: Build and Release macOS App

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build-sign-release:
    runs-on: macos-14
    defaults:
      run:
        working-directory: clients/macos
    env:
      DMG_PATH: build/vellum-assistant.dmg
      KEYCHAIN_NAME: build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Import code-signing certificate
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the .p12 certificate
          echo "${{ secrets.CERTIFICATE_P12 }}" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          # Allow codesign to access the keychain without prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list and set as default
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          # Verify the certificate was imported
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Stamp version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y%m%d)
          DISPLAY_VERSION="1.0.0-${SHORT_SHA}-${DATE}"
          # CFBundleVersion must be a numeric dotted string (e.g. 20260209.12345)
          # Convert the first 5 hex chars of the SHA to decimal for uniqueness
          SHA_DECIMAL=$((16#${SHORT_SHA:0:5}))
          BUILD_VERSION="${DATE}.${SHA_DECIMAL}"
          echo "version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "Display version: $DISPLAY_VERSION / Build version: $BUILD_VERSION"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build daemon binary
        working-directory: assistant
        run: |
          bun install
          bun build --compile --target=bun-darwin-arm64 src/daemon/main.ts \
            --external electron --external "chromium-bidi/*" \
            --outfile ../clients/macos/daemon-bin/vellum-daemon
          chmod +x ../clients/macos/daemon-bin/vellum-daemon
          echo "Daemon binary built:"
          ls -lh ../clients/macos/daemon-bin/vellum-daemon

      - name: Build release .app
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}" \
          BUILD_VERSION="${{ steps.version.outputs.build_version }}" \
          SU_PUBLIC_ED_KEY="${{ secrets.SPARKLE_ED_PUBLIC_KEY }}" \
          SIGN_IDENTITY="Developer ID Application" \
          ./build.sh release

          APP_PATH="dist/Vellum.app"

          # Verify the app exists
          ls -la "$APP_PATH"

          # Verify code signature
          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signature verified"

      - name: Free disk space
        run: |
          rm -rf .build daemon-bin
          rm -rf ../assistant/node_modules
          # Clear Xcode caches
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          rm -rf ~/Library/Caches/org.swift.swiftpm 2>/dev/null || true
          df -h .
          echo "Disk space freed"

      - name: Create DMG
        run: |
          APP_PATH="dist/Vellum.app"
          APP_NAME="Vellum.app"

          # Create staging directory for DMG contents
          DMG_STAGING="build/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          echo "Staging directory size:"
          du -sh "$DMG_STAGING"

          # Two-step DMG creation to avoid auto-sizing issues:
          # 1. Create read-write image (auto-sizes more generously)
          hdiutil create \
            -volname "Vellum" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDRW \
            "build/temp.dmg"

          # 2. Convert to compressed UDZO
          hdiutil convert "build/temp.dmg" \
            -format UDZO \
            -ov \
            -o "$DMG_PATH"
          rm "build/temp.dmg"

          echo "DMG created at $DMG_PATH"
          ls -lh "$DMG_PATH"

      - name: Sign DMG
        run: |
          codesign --sign "Developer ID Application" \
            --timestamp \
            "$DMG_PATH"

          # Verify DMG signature
          codesign --verify --verbose "$DMG_PATH"
          echo "DMG signature verified"

      - name: Notarize DMG
        run: |
          echo "Submitting DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          # Extract the submission ID for log fetching
          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ "$NOTARIZE_FAILED" = "true" ]; then
            echo "::error::Notarization failed"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "${{ secrets.APPLE_ID }}" \
                --password "${{ secrets.APPLE_APP_PASSWORD }}" \
                --team-id "${{ secrets.APPLE_TEAM_ID }}" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "Notarization succeeded"

      - name: Staple notarization ticket
        run: |
          # Apple's CDN can take several minutes to propagate the ticket after notarization
          MAX_ATTEMPTS=10
          WAIT_SECS=30
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if xcrun stapler staple "$DMG_PATH" 2>&1; then
              echo "Stapling succeeded on attempt $i"
              break
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Stapling attempt $i failed, waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            # Increase wait time for subsequent attempts (30, 45, 60, 75, ...)
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          # Verify stapling
          xcrun stapler validate "$DMG_PATH"
          echo "Notarization ticket stapled and validated"

      - name: Build ZIP for Sparkle auto-update
        run: |
          cd dist
          ditto -c -k --keepParent Vellum.app vellum-assistant.zip
          echo "Sparkle ZIP created:"
          ls -lh vellum-assistant.zip

      - name: Install Sparkle sign_update tool
        run: |
          brew install sparkle
          SPARKLE_BIN=$(find /opt/homebrew/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find /usr/local/Caskroom/sparkle -name sign_update -type f 2>/dev/null | head -1)
          fi
          echo "Found sign_update at: $SPARKLE_BIN"
          echo "$(dirname "$SPARKLE_BIN")" >> "$GITHUB_PATH"

      - name: Generate appcast.xml
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.display_version }}"
          BUILD_VERSION="${{ steps.version.outputs.build_version }}"

          # Sign the ZIP with Sparkle EdDSA key (write to temp file — CLI arg is deprecated)
          echo "sign_update location: $(which sign_update || echo 'NOT FOUND')"
          ED_KEY_FILE=$(mktemp)
          echo "$SPARKLE_ED_PRIVATE_KEY" > "$ED_KEY_FILE"
          SIGNATURE=$(sign_update dist/vellum-assistant.zip --ed-key-file "$ED_KEY_FILE" 2>&1) || {
            echo "sign_update failed with exit code $?"
            echo "Output: $SIGNATURE"
            rm -f "$ED_KEY_FILE"
            exit 1
          }
          rm -f "$ED_KEY_FILE"
          echo "Signature obtained: ${SIGNATURE:0:20}..."
          SIZE=$(stat -f%z dist/vellum-assistant.zip)

          cat > dist/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Vellum</title>
              <item>
                <title>${DISPLAY_VERSION}</title>
                <sparkle:version>${BUILD_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${DISPLAY_VERSION}</sparkle:shortVersionString>
                <enclosure
                  url="https://github.com/alex-nork/vellum-assistant-macos-updates/releases/latest/download/vellum-assistant.zip"
                  sparkle:edSignature="${SIGNATURE}"
                  length="${SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

          echo "Appcast generated with signature"

      - name: Create GitHub Release on public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          REPO="alex-nork/vellum-assistant-macos-updates"
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${{ steps.version.outputs.short_sha }}"
          FULL_SHA=$(git rev-parse HEAD)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          # Delete existing 'latest' release and tag if they exist
          gh release delete latest --repo "$REPO" --yes 2>/dev/null || true
          gh api "repos/$REPO/git/refs/tags/latest" -X DELETE 2>/dev/null || true

          # Create new release with DMG + ZIP + appcast
          RELEASE_NOTES="**Build:** \`$VERSION\`
          **Commit:** [\`$SHORT_SHA\`](https://github.com/${{ github.repository }}/commit/$FULL_SHA)
          **Built at:** $TIMESTAMP

          ---

          Download the DMG, open it, and drag Vellum to your Applications folder.
          Existing installations will auto-update via Sparkle."

          gh release create latest \
            "$DMG_PATH" \
            dist/vellum-assistant.zip \
            dist/appcast.xml \
            --repo "$REPO" \
            --title "Vellum $VERSION" \
            --notes "$RELEASE_NOTES" \
            --latest

          echo "Release created at https://github.com/$REPO/releases/tag/latest"

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
