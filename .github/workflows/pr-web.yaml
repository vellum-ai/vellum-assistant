name: PR Web Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'apps/web/**'
      - 'packages/design-library/**'
      - '.github/workflows/pr-web.yaml'

concurrency:
  group: pr-web-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Independent jobs run in parallel. Each re-runs setup (~15s) but the
# wall-clock win on the long-pole jobs (build, test) outweighs the overhead.
# Reference: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/using-jobs-in-a-workflow
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Lint
        run: |
          set +e
          bun run lint
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::group::lint failed with rc=$rc — dumping env"
            echo "node: $(node --version 2>&1 || echo missing)"
            echo "bun: $(bun --version 2>&1)"
            echo "eslint: $(bunx eslint --version 2>&1)"
            echo "::endgroup::"
            echo "::group::ls src/generated (first 20)"
            ls src/generated 2>&1 | head -20 || true
            echo "::endgroup::"
            echo "::group::file count under src/domains"
            find src/domains -type f \( -name "*.ts" -o -name "*.tsx" \) | wc -l
            echo "::endgroup::"
            echo "::group::eslint --max-warnings test"
            bunx eslint --max-warnings 0 src 2>&1 | tail -40 || true
            echo "::endgroup::"
            exit $rc
          fi

      - name: Audit cross-domain import allow-list freshness
        run: |
          set +e
          bun run audit:cross-domain:check
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::group::audit:cross-domain debug — regenerating to show diff"
            bun run audit:cross-domain
            echo "::endgroup::"
            echo "::group::git diff"
            git -c color.ui=never diff -- .cross-domain-allowlist.json | head -200
            echo "::endgroup::"
            echo "::group::file count"
            find src/domains -type f \( -name "*.ts" -o -name "*.tsx" \) | wc -l
            echo "::endgroup::"
            exit $rc
          fi

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Type check
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install design-library dependencies
        working-directory: packages/design-library
        run: bun install --frozen-lockfile

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Test
        run: bun run test:ci

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Build
        env:
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: ${{ vars.VITE_SENTRY_ENVIRONMENT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: bun run build

  # Aggregator — preserves the "Lint, Type Check & Build" status check name
  # so existing branch protection rules keep working. Drop this job once
  # branch protection is updated to require the individual jobs above.
  checks:
    name: Lint, Type Check & Build
    needs: [lint, typecheck, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
        run: |
          echo "Lint:       $LINT"
          echo "Type Check: $TYPECHECK"
          echo "Test:       $TEST"
          echo "Build:      $BUILD"
          for r in "$LINT" "$TYPECHECK" "$TEST" "$BUILD"; do
            if [ "$r" != "success" ]; then
              echo "::error::At least one web CI job failed."
              exit 1
            fi
          done
