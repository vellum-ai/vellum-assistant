name: PR Web Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'package.json'
      - 'bun.lock'
      - 'patches/**'
      - 'clients/web/**'
      - 'packages/design-library/**'
      - 'packages/local-mode/**'
      - 'packages/environments/**'
      # The web LLM catalog parity test reads this file, so daemon-side catalog
      # regenerations must run the web tests on the PR that introduces drift.
      - 'meta/llm-provider-catalog.json'
      - '.github/workflows/pr-web.yaml'

concurrency:
  group: pr-web-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Independent jobs run in parallel. Each re-runs setup (~15s) but the
# wall-clock win on the long-pole jobs (build, test) outweighs the overhead.
# Reference: https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/using-jobs-in-a-workflow
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/web

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Lint
        run: bun run lint

      # On failure, regenerate the snapshot and print the diff so the
      # contributor sees exactly what changed (e.g. after rebasing
      # onto a main that moved files between domains).
      - name: Audit cross-domain import allow-list freshness
        run: |
          if ! bun run audit:cross-domain:check; then
            echo "::group::regenerated allow-list diff"
            bun run audit:cross-domain
            git -c color.ui=never diff -- .cross-domain-allowlist.json | head -200
            echo "::endgroup::"
            exit 1
          fi

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/web

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Type check
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/web

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Test
        run: bun run test:ci

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/web

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Build
        env:
          VITE_PLATFORM_MODE: "true"
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          # Baked into the deployed SPA so the iOS webview (which loads this
          # bundle via `server.url`) reports to the vellum-assistant-ios project.
          VITE_SENTRY_DSN_IOS: ${{ secrets.SENTRY_DSN_IOS }}
          VITE_SENTRY_ENVIRONMENT: ${{ vars.VITE_SENTRY_ENVIRONMENT }}
          VITE_SESSION_REPLAY_APP_ID: ${{ vars.VITE_SESSION_REPLAY_APP_ID }}
          VITE_APP_VERSION: ${{ github.sha }}
        run: bun run build

  # Aggregator — preserves the "Lint, Type Check & Build" status check name
  # so existing branch protection rules keep working. Drop this job once
  # branch protection is updated to require the individual jobs above.
  checks:
    name: Lint, Type Check & Build
    needs: [lint, typecheck, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
        run: |
          echo "Lint:       $LINT"
          echo "Type Check: $TYPECHECK"
          echo "Test:       $TEST"
          echo "Build:      $BUILD"
          for r in "$LINT" "$TYPECHECK" "$TEST" "$BUILD"; do
            if [ "$r" != "success" ]; then
              echo "::error::At least one web CI job failed."
              exit 1
            fi
          done
