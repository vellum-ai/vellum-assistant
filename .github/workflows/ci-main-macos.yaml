name: CI Main macOS Build & Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'clients/macos/**'
      - 'clients/shared/**'
      - 'clients/Package.swift'
      - 'clients/.periphery.yml'
      - 'clients/.periphery_baseline.json'
      - 'clients/scripts/periphery-scan.sh'
      - 'assistant/**'
      - 'cli/**'
      - 'gateway/**'
      - 'packages/**'
      - '.github/workflows/ci-main-macos.yaml'

jobs:
  check-superseded:
    name: Skip if newer run queued
    runs-on: ubuntu-latest
    steps:
      - name: Cancel if a newer run exists
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const workflowId = 'ci-main-macos.yaml';
            let newerExists = false;

            for (const status of ['queued', 'waiting', 'in_progress']) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowId,
                branch,
                status,
                per_page: 10,
              });
              const newer = data.workflow_runs.filter(r => r.run_number > context.runNumber);
              if (newer.length > 0) {
                core.info(`Found newer ${status} run(s): ${newer.map(r => '#' + r.run_number).join(', ')}`);
                newerExists = true;
                break;
              }
            }

            if (newerExists) {
              core.info('Superseded by a newer run — cancelling.');
              await github.rest.actions.cancelWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              await new Promise(r => setTimeout(r, 5000));
              core.setFailed('Superseded by a newer run');
            } else {
              core.info('This is the newest run — proceeding.');
            }

  changes:
    name: Detect Path Changes
    needs: [check-superseded]
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.filter.outputs.clients }}
      bundled: ${{ steps.filter.outputs.bundled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            clients:
              - 'clients/**'
              - '.github/workflows/ci-main-macos.yaml'
            bundled:
              - 'assistant/**'
              - 'cli/**'
              - 'gateway/**'
              - 'packages/**'
              - 'clients/**'
              - '.github/workflows/ci-main-macos.yaml'

  test:
    name: macOS Tests & Lint
    needs: [changes]
    if: needs.changes.outputs.clients == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: clients/.build
          key: macos-spm-${{ hashFiles('clients/Package.resolved') }}-${{ hashFiles('clients/**/*.swift') }}
          restore-keys: |
            macos-spm-${{ hashFiles('clients/Package.resolved') }}-
            macos-spm-

      - name: Design token guard
        run: bash clients/scripts/check-design-tokens.sh --mode=strict

      - name: Build executable
        working-directory: clients
        run: swift build --product vellum-assistant

      - name: Run tests
        working-directory: clients/macos
        run: ./build.sh test

      - name: Lint unused code (informational)
        if: always()
        continue-on-error: true
        working-directory: clients
        run: bash scripts/periphery-scan.sh

      - name: Upload baseline artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: periphery-baseline
          path: clients/.periphery_baseline.json
          if-no-files-found: ignore
          retention-days: 7
          include-hidden-files: true

  build-app:
    name: Build macOS App
    needs: [changes]
    if: needs.changes.outputs.bundled == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 30
    env:
      APP_DISPLAY_NAME: Vellum
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: clients/.build
          key: macos-spm-${{ hashFiles('clients/Package.resolved') }}-${{ hashFiles('clients/**/*.swift') }}
          restore-keys: |
            macos-spm-${{ hashFiles('clients/Package.resolved') }}-
            macos-spm-

      - name: Configure GitHub auth for SPM binary downloads
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf "machine github.com\nlogin oauth2\npassword %s\n" "${GH_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc

      - name: Install nested package dependencies
        run: |
          for dir in packages/*/; do
            [ -f "${dir}/package.json" ] || continue
            echo "Installing dependencies in ${dir}"
            (cd "${dir}" && bun install)
          done

      - name: Build binaries
        timeout-minutes: 5
        working-directory: clients/macos
        run: ./build.sh binaries

      - name: Build macOS app
        timeout-minutes: 15
        working-directory: clients/macos
        run: |
          set -o pipefail
          SKIP_CLEAN=1 \
          BUNDLE_DISPLAY_NAME="$APP_DISPLAY_NAME" \
          SIGN_IDENTITY="-" \
          ./build.sh release 2>&1 | while IFS= read -r line; do
            echo "[$(date -u '+%H:%M:%S')] $line"
          done

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-dist
          path: clients/macos/dist/${{ env.APP_DISPLAY_NAME }}.app
          retention-days: 30
          if-no-files-found: error

  notify-macos:
    name: Slack Notification (macOS)
    needs: [changes, test, build-app]
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Slack ID
        id: slack-id
        run: |
          GITHUB_USER="${{ github.actor }}"

          # test is conditionally skipped when only non-client paths change
          # build-app is conditionally skipped when only non-bundled paths change
          CLIENTS_CHANGED="${{ needs.changes.outputs.clients }}"

          if [[ "${{ needs.build-app.result }}" == "failure" ]]; then
            STATUS="failure"
          elif [[ ("$CLIENTS_CHANGED" == "true" || "${{ github.event_name }}" == "workflow_dispatch") && "${{ needs.test.result }}" == "failure" ]]; then
            STATUS="failure"
          elif [[ "${{ needs.build-app.result }}" == "cancelled" ]]; then
            STATUS="cancelled"
          elif [[ ("$CLIENTS_CHANGED" == "true" || "${{ github.event_name }}" == "workflow_dispatch") && "${{ needs.test.result }}" == "cancelled" ]]; then
            STATUS="cancelled"
          elif [[ "${{ needs.build-app.result }}" == "skipped" ]]; then
            STATUS="skipped"
          else
            STATUS="success"
          fi

          SLACK_ID=$(yq ".github_to_slack_all_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)

          if [ "$SLACK_ID" = "null" ]; then
            case $STATUS in
              failure)
                SLACK_ID=$(yq ".github_to_slack_failure_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              success)
                SLACK_ID=$(yq ".github_to_slack_success_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              cancelled)
                SLACK_ID=$(yq ".github_to_slack_cancelled_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
            esac
          fi

          if [ "$SLACK_ID" = "null" ]; then
            SLACK_ID="$GITHUB_USER"
          fi

          if [ "$STATUS" = "cancelled" ] || [ "$SLACK_ID" = "$GITHUB_USER" ]; then
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi
          echo "id=$SLACK_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - uses: act10ns/slack@v2
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_ID: ${{ steps.slack-id.outputs.id }}
          SHOULD_TAG: ${{ steps.slack-id.outputs.should_tag }}
        with:
          status: ${{ steps.slack-id.outputs.status }}
          channel: "#build-alerts"
          config: .github/config/slack.yaml
