name: CI Main macOS Build & Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'clients/macos/**'
      - 'clients/shared/**'
      - 'clients/Package.swift'
      - 'assistant/**'
      - 'cli/**'
      - 'gateway/**'
      - 'packages/**'
      - '.github/workflows/ci-main-macos.yaml'

jobs:
  changes:
    name: Detect Path Changes
    runs-on: ubuntu-latest
    outputs:
      clients: ${{ steps.filter.outputs.clients }}
      bundled: ${{ steps.filter.outputs.bundled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            clients:
              - 'clients/**'
              - '.github/workflows/ci-main-macos.yaml'
            bundled:
              - 'assistant/**'
              - 'cli/**'
              - 'gateway/**'
              - 'packages/**'
              - 'clients/**'
              - '.github/workflows/ci-main-macos.yaml'

  test:
    name: macOS Tests
    needs: [changes]
    if: (needs.changes.outputs.clients == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: macos-15
    timeout-minutes: 20
    env:
      APP_DISPLAY_NAME: Vellum
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Cancel if superseded by a newer run
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            for (const status of ['queued', 'waiting', 'in_progress']) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci-main-macos.yaml',
                branch,
                status,
                per_page: 10,
              });
              const newer = data.workflow_runs.filter(r => r.run_number > context.runNumber);
              if (newer.length > 0) {
                core.info(`Superseded by newer ${status} run(s): ${newer.map(r => '#' + r.run_number).join(', ')}`);
                await github.rest.actions.cancelWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: context.runId,
                });
                await new Promise(r => setTimeout(r, 5000));
                core.setFailed('Superseded by a newer run');
                return;
              }
            }
            core.info('This is the newest run — proceeding.');

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Compute cache week
        id: week
        run: echo "num=$(date -u +%V)" >> "$GITHUB_OUTPUT"

      - name: Cache SPM build artifacts
        uses: actions/cache@v5
        with:
          path: clients/.build
          key: macos-spm-debug-week${{ steps.week.outputs.num }}-${{ hashFiles('clients/Package.resolved') }}
          restore-keys: |
            macos-spm-debug-week${{ steps.week.outputs.num }}-
            macos-spm-debug-

      - name: Run tests
        working-directory: clients/macos
        run: ./build.sh test

  build:
    name: macOS Build
    needs: [changes]
    if: needs.changes.outputs.bundled == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 45
    env:
      APP_DISPLAY_NAME: Vellum
      KEYCHAIN_NAME: ci-build.keychain
      KEYCHAIN_PASSWORD: temporary-ci-password
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Cancel if superseded by a newer run
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            for (const status of ['queued', 'waiting', 'in_progress']) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci-main-macos.yaml',
                branch,
                status,
                per_page: 10,
              });
              const newer = data.workflow_runs.filter(r => r.run_number > context.runNumber);
              if (newer.length > 0) {
                core.info(`Superseded by newer ${status} run(s): ${newer.map(r => '#' + r.run_number).join(', ')}`);
                await github.rest.actions.cancelWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: context.runId,
                });
                await new Promise(r => setTimeout(r, 5000));
                core.setFailed('Superseded by a newer run');
                return;
              }
            }
            core.info('This is the newest run — proceeding.');

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Import code-signing certificate
        env:
          CERT_P12: ${{ secrets.DEVID_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVID_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERT_P12" | base64 -D > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm /tmp/certificate.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Verify signing identity
        run: |
          security find-identity -v -p codesigning | grep -q "Developer ID Application" \
            || { echo "::error::Developer ID Application identity not found in keychain. Check the DEVID_CERTIFICATE_P12 secret."; exit 1; }

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Compute cache week
        id: week
        run: echo "num=$(date -u +%V)" >> "$GITHUB_OUTPUT"

      - name: Cache SPM build artifacts
        uses: actions/cache@v5
        with:
          path: clients/.build
          key: macos-spm-debug-week${{ steps.week.outputs.num }}-${{ hashFiles('clients/Package.resolved') }}
          restore-keys: |
            macos-spm-debug-week${{ steps.week.outputs.num }}-
            macos-spm-debug-

      - name: Compute dev version
        id: version
        run: |
          BASE_VERSION=$(sed -n 's/^let appVersion = "\(.*\)"/\1/p' clients/Package.swift | head -1)
          BASE_VERSION="${BASE_VERSION:-0.0.0}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEV_VERSION="${BASE_VERSION}-dev.${{ github.run_number }}.${SHORT_SHA}"
          echo "dev_version=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "Dev version: $DEV_VERSION"

      - name: Design token guard
        if: needs.changes.outputs.clients == 'true' || github.event_name == 'workflow_dispatch'
        run: bash clients/scripts/check-design-tokens.sh --mode=strict

      - name: Build executable
        working-directory: clients
        run: swift build --product vellum-assistant

      - name: Configure GitHub auth for SPM binary downloads
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          printf "machine github.com\nlogin oauth2\npassword %s\n" "${GH_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc

      - name: Install nested package dependencies
        run: |
          pids=()
          for dir in packages/*/; do
            [ -f "${dir}/package.json" ] || continue
            echo "Installing dependencies in ${dir}"
            (cd "${dir}" && bun install) &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do
            wait "$pid"
          done

      - name: Cache Kata kernel
        uses: actions/cache@v5
        with:
          path: clients/macos/.container-cache/kata-3.17.0-arm64/vmlinux.container
          key: kata-kernel-3.17.0-arm64

      - name: Build binaries
        timeout-minutes: 5
        working-directory: clients/macos
        run: |
          DISPLAY_VERSION="${{ steps.version.outputs.dev_version }}" \
          COMMIT_SHA="${{ github.sha }}" \
          ./build.sh binaries

      - name: Build macOS app
        timeout-minutes: 15
        working-directory: clients/macos
        run: |
          set -o pipefail
          SKIP_BUN_REBUILD=1 \
          BUNDLE_DISPLAY_NAME="$APP_DISPLAY_NAME" \
          DISPLAY_VERSION="${{ steps.version.outputs.dev_version }}" \
          COMMIT_SHA="${{ github.sha }}" \
          ./build.sh 2>&1 | while IFS= read -r line; do
            echo "[$(date -u '+%H:%M:%S')] $line"
          done

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-dist
          path: clients/macos/dist/${{ env.APP_DISPLAY_NAME }}.app
          retention-days: 30
          if-no-files-found: error

      - name: Create DMG
        working-directory: clients/macos
        run: |
          DEV_VERSION="${{ steps.version.outputs.dev_version }}"
          hdiutil create \
            -volname "Vellum ${DEV_VERSION}" \
            -srcfolder "dist/${APP_DISPLAY_NAME}.app" \
            -ov -format UDZO \
            "vellum-assistant-${DEV_VERSION}.dmg"
          ls -lh "vellum-assistant-${DEV_VERSION}.dmg"

      - name: Notarize DMG
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        working-directory: clients/macos
        run: |
          DEV_VERSION="${{ steps.version.outputs.dev_version }}"
          DMG_PATH="vellum-assistant-${DEV_VERSION}.dmg"

          mkdir -p ~/.private_keys
          echo "$ASC_KEY_P8" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8

          echo "Submitting DMG for notarization..."
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait \
            --timeout 30m \
            2>&1) || NOTARIZE_FAILED=true

          echo "$NOTARIZE_OUTPUT"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if [ "$NOTARIZE_FAILED" = "true" ] || echo "$NOTARIZE_OUTPUT" | grep -q "status: Invalid"; then
            echo "::error::Notarization failed (status: Invalid or command error)"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --key ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8 \
                --key-id "$ASC_KEY_ID" \
                --issuer "$ASC_ISSUER_ID" \
                || echo "::warning::Could not fetch notarization log"
            fi
            exit 1
          fi

          echo "Notarization succeeded (status: Accepted)"

      - name: Staple notarization ticket
        working-directory: clients/macos
        run: |
          DEV_VERSION="${{ steps.version.outputs.dev_version }}"
          DMG_PATH="vellum-assistant-${DEV_VERSION}.dmg"

          MAX_ATTEMPTS=15
          WAIT_SECS=60
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STAPLE_OUTPUT=$(xcrun stapler staple "$DMG_PATH" 2>&1)
            STAPLE_EXIT=$?
            if [ $STAPLE_EXIT -eq 0 ]; then
              echo "Stapling succeeded on attempt $i"
              echo "$STAPLE_OUTPUT"
              break
            fi
            echo "::warning::Stapling attempt $i/$MAX_ATTEMPTS failed (exit code $STAPLE_EXIT):"
            echo "$STAPLE_OUTPUT"
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::Stapling failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi
            echo "Waiting ${WAIT_SECS}s for CDN propagation..."
            sleep $WAIT_SECS
            WAIT_SECS=$((WAIT_SECS + 15))
          done

          xcrun stapler validate "$DMG_PATH"
          echo "Notarization ticket stapled and validated"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: vellum-assistant-${{ steps.version.outputs.dev_version }}.dmg
          path: clients/macos/vellum-assistant-${{ steps.version.outputs.dev_version }}.dmg
          retention-days: 30
          if-no-files-found: error

      - name: Cleanup keychain and keys
        if: always()
        run: |
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN_NAME-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf ~/.private_keys 2>/dev/null || true


  notify-macos:
    name: Slack Notification (macOS)
    needs: [changes, test, build]
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Slack ID
        id: slack-id
        run: |
          GITHUB_USER="${{ github.actor }}"

          if [[ "${{ needs.test.result }}" == "failure" ]] || [[ "${{ needs.build.result }}" == "failure" ]]; then
            STATUS="failure"
          elif [[ "${{ needs.test.result }}" == "cancelled" ]] || [[ "${{ needs.build.result }}" == "cancelled" ]]; then
            STATUS="cancelled"
          elif [[ "${{ needs.test.result }}" == "skipped" ]] && [[ "${{ needs.build.result }}" == "skipped" ]]; then
            STATUS="skipped"
          else
            STATUS="success"
          fi

          SLACK_ID=$(yq ".github_to_slack_all_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)

          if [ "$SLACK_ID" = "null" ]; then
            case $STATUS in
              failure)
                SLACK_ID=$(yq ".github_to_slack_failure_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              success)
                SLACK_ID=$(yq ".github_to_slack_success_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              cancelled)
                SLACK_ID=$(yq ".github_to_slack_cancelled_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
            esac
          fi

          if [ "$SLACK_ID" = "null" ]; then
            SLACK_ID="$GITHUB_USER"
          fi

          if [ "$STATUS" = "cancelled" ] || [ "$SLACK_ID" = "$GITHUB_USER" ]; then
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi
          echo "id=$SLACK_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/send-build-alert
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ steps.slack-id.outputs.status }}
          slack-user-id: ${{ steps.slack-id.outputs.id }}
          should-tag: ${{ steps.slack-id.outputs.should_tag }}
          channel: "#build-alerts"
