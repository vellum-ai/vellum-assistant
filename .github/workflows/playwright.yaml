name: Playwright Tests

on:
  schedule:
    - cron: '0 14 * * *'  # Every day at 9:00 AM EST (14:00 UTC)
    - cron: '0 0 * * *'   # Every day at 7:00 PM EST (00:00 UTC next day)
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to test (e.g. "1.2.3"). If set, downloads the DMG from vellum-ai/velly releases instead of building from source.'
        required: false
        type: string
      run_experimental:
        description: 'Run experimental tests (tests marked with status: experimental in front matter).'
        required: false
        type: boolean
        default: false
      test_case:
        description: 'Run a single test case by name (e.g. "hello-world"). If empty, runs all tests.'
        required: false
        type: string
      use_xcode:
        description: 'Use the agent-xcode (AXUIElement) runner instead of the Playwright runner.'
        required: false
        type: boolean
        default: false
      shards:
        description: 'Number of parallel shards (macOS runners) to split tests across. Each shard gets its own isolated runner.'
        required: false
        type: number
        default: 1
  pull_request:
    types: [labeled]

concurrency:
  group: playwright-${{ github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  # Compute the shard matrix dynamically so the `shards` input controls parallelism.
  prepare:
    name: Prepare matrix
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'e2e')
    runs-on: ubuntu-latest
    outputs:
      shard-matrix: ${{ steps.set-matrix.outputs.matrix }}
      total-shards: ${{ steps.set-matrix.outputs.total }}
    steps:
      - name: Compute shard indices
        id: set-matrix
        run: |
          TOTAL=${{ github.event_name == 'schedule' && 4 || inputs.shards || 1 }}
          INDICES=$(python3 -c "import json; print(json.dumps(list(range(1, int($TOTAL) + 1))))")
          echo "matrix=$INDICES" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

  # Build (or download) the macOS app once, then upload it as an artifact
  # so that each shard can download it instead of rebuilding.
  build:
    name: Build app
    needs: prepare
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'e2e')
    runs-on: macos-15
    timeout-minutes: 30
    env:
      APP_DISPLAY_NAME: Vellum
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build from source (when no release version is provided) ──

      - name: Select Xcode 26.2
        if: ${{ !inputs.release_version }}
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Cache SPM build artifacts
        if: ${{ !inputs.release_version }}
        uses: actions/cache@v4
        with:
          path: clients/.build
          key: macos-spm-${{ hashFiles('clients/Package.resolved') }}-${{ hashFiles('clients/**/*.swift') }}
          restore-keys: |
            macos-spm-${{ hashFiles('clients/Package.resolved') }}-
            macos-spm-

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binaries
        if: ${{ !inputs.release_version }}
        working-directory: clients/macos
        run: ./build.sh binaries

      - name: Build macOS app
        if: ${{ !inputs.release_version }}
        working-directory: clients/macos
        run: |
          SKIP_CLEAN=1 \
          BUNDLE_DISPLAY_NAME="$APP_DISPLAY_NAME" \
          SIGN_IDENTITY="-" \
          ./build.sh build

      # ── Download released DMG (when release version is provided) ──

      - name: Download released DMG
        if: ${{ inputs.release_version }}
        env:
          VERSION: ${{ inputs.release_version }}
        run: |
          TAG="v${VERSION}"
          DMG_URL="https://github.com/vellum-ai/velly/releases/download/${TAG}/vellum-assistant.dmg"
          echo "Downloading DMG from ${DMG_URL}..."
          curl -fSL --retry 3 -o /tmp/vellum-assistant.dmg "$DMG_URL"
          echo "DMG downloaded to /tmp/vellum-assistant.dmg"

      - name: Install app from DMG
        if: ${{ inputs.release_version }}
        run: |
          MOUNT_DIR=$(hdiutil attach /tmp/vellum-assistant.dmg -nobrowse | tail -1 | awk '{print $NF}')
          echo "Mounted at: $MOUNT_DIR"

          mkdir -p clients/macos/dist
          cp -R "$MOUNT_DIR/${APP_DISPLAY_NAME}.app" "clients/macos/dist/${APP_DISPLAY_NAME}.app"
          echo "App installed at: clients/macos/dist/${APP_DISPLAY_NAME}.app"

          hdiutil detach "$MOUNT_DIR"
          rm -f /tmp/vellum-assistant.dmg

      # ── Package build outputs for shard jobs ──

      - name: Collect build outputs
        run: |
          mkdir -p /tmp/build-outputs

          # App bundle
          if [ -d clients/macos/dist ]; then
            cp -R clients/macos/dist /tmp/build-outputs/app-dist
          fi

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: /tmp/build-outputs/
          retention-days: 1
          if-no-files-found: error

  # Run Playwright tests, optionally sharded across multiple runners.
  # Each shard downloads the pre-built app artifact from the build job.
  playwright:
    name: Playwright Tests (${{ matrix.shard }}/${{ needs.prepare.outputs.total-shards }})
    needs: [prepare, build]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'e2e')
    runs-on: macos-15
    environment: dev
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.prepare.outputs.shard-matrix) }}
    env:
      APP_DISPLAY_NAME: Vellum
      TOTAL_SHARDS: ${{ needs.prepare.outputs.total-shards }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: /tmp/build-outputs

      - name: Restore build outputs
        run: |
          # Restore app bundle
          if [ -d /tmp/build-outputs/app-dist ]; then
            mkdir -p clients/macos
            cp -R /tmp/build-outputs/app-dist clients/macos/dist
            echo "App restored at: clients/macos/dist/"
          fi

      # ── Common steps ──

      - name: Remove all source files except playwright and app
        run: |
          # Move playwright and built app to safe locations
          mv playwright /tmp/playwright-tests
          if [ -d clients/macos/dist ]; then
            mv clients/macos/dist /tmp/app-dist
          fi

          # Remove everything in the repo except .git
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Restore playwright and app
          mv /tmp/playwright-tests playwright
          if [ -d /tmp/app-dist ]; then
            mkdir -p clients/macos
            mv /tmp/app-dist clients/macos/dist
          fi

      - name: Verify no source files present
        run: |
          echo "=== Repository contents ==="
          ls -la
          echo ""
          echo "Only playwright/ and clients/macos/dist/ should exist:"
          find . -mindepth 1 -maxdepth 2 ! -path './.git*' ! -path './playwright*' ! -path './clients*' | head -20 || true

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Fetch secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            ANTHROPIC_API_KEY:vellum-nonprod/ANTHROPIC_API_KEY
            TWILIO_AUTH_TOKEN:vellum-nonprod/TWILIO_AUTH_TOKEN
            NGROK_AUTH_TOKEN:vellum-nonprod/NGROK_AUTH_TOKEN

      - name: Set API keys in env
        run: |
          echo "ANTHROPIC_API_KEY=${{ steps.secrets.outputs.ANTHROPIC_API_KEY }}" >> "$GITHUB_ENV"
          echo "TWILIO_AUTH_TOKEN=${{ steps.secrets.outputs.TWILIO_AUTH_TOKEN }}" >> "$GITHUB_ENV"
          echo "TWILIO_ACCOUNT_SID=${{ vars.TWILIO_ACCOUNT_SID }}" >> "$GITHUB_ENV"
          echo "NGROK_AUTH_TOKEN=${{ steps.secrets.outputs.NGROK_AUTH_TOKEN }}" >> "$GITHUB_ENV"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Playwright dependencies
        if: ${{ !inputs.use_xcode }}
        working-directory: playwright
        run: bun install

      - name: Install Chromium
        if: ${{ !inputs.use_xcode }}
        working-directory: playwright
        run: bunx playwright install --with-deps chromium

      - name: Symlink vellum CLI into PATH
        run: |
          CLI_BINARY="clients/macos/dist/${APP_DISPLAY_NAME}.app/Contents/MacOS/vellum-cli"
          if [ -f "$CLI_BINARY" ]; then
            chmod +x "$CLI_BINARY"
            sudo ln -sf "$(pwd)/$CLI_BINARY" /usr/local/bin/vellum
            echo "Symlinked vellum CLI: $(vellum --version 2>&1 || echo 'version check failed')"
          else
            echo "::warning::Bundled CLI not found at $CLI_BINARY — skipping symlink"
          fi

      - name: Build agent-xcode runner
        if: ${{ inputs.use_xcode }}
        working-directory: playwright/agent-xcode
        run: swift build -c release

      - name: Run Playwright tests
        id: tests
        working-directory: playwright
        continue-on-error: true
        env:
          RUN_EXPERIMENTAL: ${{ inputs.run_experimental && '1' || '' }}
        run: |
          SHARD_ARGS=""
          if [ "$TOTAL_SHARDS" -gt 1 ]; then
            SHARD_ARGS="--shard=${{ matrix.shard }}/$TOTAL_SHARDS"
          fi

          if [ "${{ inputs.use_xcode }}" = "true" ]; then
            unset RUN_EXPERIMENTAL
            XCODE_ARGS=""
            if [ -n "${{ inputs.test_case }}" ]; then
              XCODE_ARGS="${{ inputs.test_case }}"
            fi
            if [ "${{ inputs.run_experimental }}" = "true" ]; then
              XCODE_ARGS="$XCODE_ARGS --experimental"
            fi
            cd agent-xcode && ./.build/release/agent-xcode $XCODE_ARGS
          elif [ -n "${{ inputs.test_case }}" ]; then
            bun run test -g "${{ inputs.test_case }}" $SHARD_ARGS
          else
            bun run test $SHARD_ARGS
          fi

      - name: Upload test artifacts
        id: upload-artifacts
        if: always() && steps.tests.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.shard }}
          path: |
            playwright/test-results/
            playwright/playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Output artifact URL
        if: always() && steps.upload-artifacts.outputs.artifact-id
        run: |
          ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ steps.upload-artifacts.outputs.artifact-id }}"
          echo "::notice title=Playwright Artifacts::$ARTIFACT_URL"
          echo "artifact-url=$ARTIFACT_URL" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        if: steps.tests.outcome == 'failure'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Comment failure on branch PR
        if: steps.tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"

          # Find the open PR for this specific branch
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "## Playwright Test Failure

          The Playwright test run [failed]($RUN_URL).

          Download the \`playwright-report\` [artifact]($RUN_URL#artifacts) and run \`npx playwright show-report\` to view the full HTML report with videos, traces, and screenshots.

          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`$BRANCH\`"
          else
            echo "No open PR found for branch $BRANCH — skipping comment."
          fi

      - name: Fail workflow if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  notify-playwright:
    name: Slack Notification (Playwright)
    needs: [prepare, build, playwright]
    if: always() && github.event_name == 'schedule'
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.playwright.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.playwright.result }}" == "cancelled" ]]; then
            echo "status=cancelled" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.playwright.result }}" == "skipped" ]]; then
            echo "status=skipped" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - uses: act10ns/slack@v2
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_ID: "Scheduled Run"
          SHOULD_TAG: 'false'
        with:
          status: ${{ steps.status.outputs.status }}
          channel: "#build-alerts"
          config: .github/config/slack.yaml
