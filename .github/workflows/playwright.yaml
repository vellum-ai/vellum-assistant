name: Playwright Tests

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  playwright:
    name: Playwright Tests
    runs-on: macos-14
    timeout-minutes: 60
    env:
      APP_DISPLAY_NAME: Vellum
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Fetch Anthropic API key from Secret Manager
        id: secrets
        run: |
          ANTHROPIC_API_KEY=$(gcloud secrets versions access latest --secret=ANTHROPIC_API_KEY --project=vellum-nonprod)
          echo "::add-mask::$ANTHROPIC_API_KEY"
          echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" >> "$GITHUB_ENV"

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: clients/.build
          key: macos-spm-${{ hashFiles('clients/Package.resolved') }}-${{ hashFiles('clients/**/*.swift') }}
          restore-keys: |
            macos-spm-${{ hashFiles('clients/Package.resolved') }}-
            macos-spm-

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build daemon binary
        working-directory: assistant
        run: |
          bun install
          bun build --compile --target=bun-darwin-arm64 src/daemon/main.ts \
            --external electron --external "chromium-bidi/*" \
            --outfile ../clients/macos/daemon-bin/vellum-daemon
          chmod +x ../clients/macos/daemon-bin/vellum-daemon
          cp node_modules/web-tree-sitter/web-tree-sitter.wasm ../clients/macos/daemon-bin/
          cp node_modules/tree-sitter-bash/tree-sitter-bash.wasm ../clients/macos/daemon-bin/
          cp -R src/config/bundled-skills ../clients/macos/daemon-bin/bundled-skills

      - name: Build CLI binary
        working-directory: cli
        run: |
          bun install
          bun build --compile --target=bun-darwin-arm64 src/index.ts \
            --external react-devtools-core \
            --outfile ../clients/macos/cli-bin/vellum-cli
          chmod +x ../clients/macos/cli-bin/vellum-cli

      - name: Build macOS app
        working-directory: clients/macos
        run: |
          SKIP_CLEAN=1 \
          BUNDLE_DISPLAY_NAME="$APP_DISPLAY_NAME" \
          SIGN_IDENTITY="-" \
          ./build.sh build

      - name: Install Playwright dependencies
        working-directory: playwright
        run: bun install

      - name: Run Playwright tests
        working-directory: playwright
        run: bun run test
