name: PR Block Volume Bootstrap Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'packages/block-volume-bootstrap/**'
      - '.github/workflows/pr-block-volume-bootstrap.yaml'

concurrency:
  group: pr-block-volume-bootstrap-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/block-volume-bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Test
        run: bun test __tests__/block-volume-bootstrap.test.ts
