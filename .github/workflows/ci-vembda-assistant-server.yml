name: PR Vembda Assistant Server Checks

on:
  pull_request:
    paths:
      - 'vembda-assistant-server/**'
      - '.github/workflows/ci-vembda-assistant-server.yml'

jobs:
  checks:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vembda-assistant-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: vembda-assistant-server/.python-version

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest -svv .

  build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vembda-assistant-server:test -f vembda-assistant-server/Dockerfile vembda-assistant-server
