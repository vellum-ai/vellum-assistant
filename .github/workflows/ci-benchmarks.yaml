name: CI Benchmark Regression Detection

on:
  push:
    branches: [main]
    paths:
      - 'assistant/**'
      - '.github/workflows/ci-benchmarks.yaml'

concurrency:
  group: ci-benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmarks:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: assistant

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install linked package dependencies
        run: cd ../packages/ces-contracts && bun install --frozen-lockfile

      - name: Download previous baseline
        id: baseline
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          name: benchmark-baseline
          workflow: ci-benchmarks.yaml
          branch: main
          path: assistant/baseline
          if_no_artifact_found: warn
          workflow_conclusion: ''
        continue-on-error: true

      - name: Run benchmarks
        id: run-benchmarks
        run: bash scripts/run-benchmarks.sh

      - name: Compare against baseline
        if: steps.baseline.outcome == 'success'
        run: bash scripts/compare-benchmarks.sh baseline/benchmark-results.json benchmark-results.json

      - name: Upload results as new baseline
        if: always() && steps.run-benchmarks.outcome == 'success'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: benchmark-baseline
          path: assistant/benchmark-results.json
          retention-days: 90
          overwrite: true
