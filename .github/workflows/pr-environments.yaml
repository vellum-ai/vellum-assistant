name: PR Environments Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'package.json'
      - 'bun.lock'
      - 'patches/**'
      - 'packages/environments/**'
      - '.github/workflows/pr-environments.yaml'

concurrency:
  group: pr-environments-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/environments

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/environments

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test
