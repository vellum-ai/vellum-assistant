name: CI Gateway Image Build

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'gateway/**'
      - '.github/workflows/ci-gateway-image.yml'
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/ci-gateway-image.yml'

concurrency:
  group: ci-gateway-image-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sync feature flag registry for Docker context
        run: cp meta/feature-flags/feature-flag-registry.json gateway/src/feature-flag-registry.json

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: gateway
          push: false
          load: true
          tags: vellum-gateway:ci-${{ github.event.pull_request.number || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy vulnerability scan
        run: trivy image --format table --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed vellum-gateway:ci-${{ github.event.pull_request.number || github.sha }}

      - name: Smoke check - container boots
        run: |
          docker run --rm -d --name gateway-smoke \
            -e TELEGRAM_BOT_TOKEN=test \
            -e TELEGRAM_WEBHOOK_SECRET=test \
            -e ASSISTANT_RUNTIME_BASE_URL=http://localhost:7821 \
            -p 19830:7830 \
            vellum-gateway:ci-${{ github.event.pull_request.number || github.sha }}
          sleep 3
          STATUS=$(curl -sf http://localhost:19830/healthz | jq -r '.status' || echo "failed")
          docker stop gateway-smoke || true
          if [ "$STATUS" != "ok" ]; then
            echo "Smoke check failed: healthz returned '$STATUS'"
            exit 1
          fi
          echo "Smoke check passed"
