name: CI Gateway Image Build

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'gateway/**'
      - '.github/workflows/ci-gateway-image.yml'
  push:
    branches: [main]
    paths:
      - 'gateway/**'
      - '.github/workflows/ci-gateway-image.yml'

concurrency:
  group: ci-gateway-image-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Bun
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Login to Docker Hub
        if: ${{ !github.event.pull_request.head.repo.fork }}
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKERHUB_ACCESS_TOKEN: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
        run: bun scripts/docker-login-with-retry.ts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Sync feature flag registry for Docker context
        run: cp meta/feature-flags/feature-flag-registry.json gateway/src/feature-flag-registry.json

      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: gateway
          push: false
          load: true
          tags: vellum-gateway:ci-${{ github.event.pull_request.number || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke check - container boots
        run: |
          docker run --rm -d --name gateway-smoke \
            -e TELEGRAM_BOT_TOKEN=test \
            -e TELEGRAM_WEBHOOK_SECRET=test \
            -e ASSISTANT_RUNTIME_BASE_URL=http://localhost:7821 \
            -p 19830:7830 \
            vellum-gateway:ci-${{ github.event.pull_request.number || github.sha }}
          sleep 3
          STATUS=$(curl -sf http://localhost:19830/healthz | jq -r '.status' || echo "failed")
          docker stop gateway-smoke || true
          if [ "$STATUS" != "ok" ]; then
            echo "Smoke check failed: healthz returned '$STATUS'"
            exit 1
          fi
          echo "Smoke check passed"
