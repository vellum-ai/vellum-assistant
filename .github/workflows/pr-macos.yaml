name: PR macOS Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'package.json'
      - 'bun.lock'
      - 'patches/**'
      - 'clients/macos/**'
      - 'packages/local-mode/**'
      - 'packages/environments/**'
      - '.github/workflows/pr-macos.yaml'

concurrency:
  group: pr-macos-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/macos
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/macos

      - name: Type check
        run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/macos
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/macos

      - name: Build (main + preload)
        run: bun run build

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/macos
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/macos

      - name: Run tests
        run: bun run test:ci

  checks:
    name: Type Check, Build & Test
    needs: [typecheck, build, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        env:
          TYPECHECK: ${{ needs.typecheck.result }}
          BUILD: ${{ needs.build.result }}
          TEST: ${{ needs.test.result }}
        run: |
          echo "Type Check: $TYPECHECK"
          echo "Build:      $BUILD"
          echo "Test:       $TEST"
          for r in "$TYPECHECK" "$BUILD" "$TEST"; do
            if [ "$r" != "success" ]; then
              echo "::error::At least one macOS CI job failed."
              exit 1
            fi
          done
