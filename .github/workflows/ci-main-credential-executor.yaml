name: CI Main Credential Executor Checks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'credential-executor/**'
      - 'packages/ces-contracts/**'
      - 'packages/credential-storage/**'
      - 'packages/egress-proxy/**'
      - '.github/workflows/ci-main-credential-executor.yaml'

jobs:
  checks:
    name: Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: credential-executor

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install linked package dependencies
        run: cd ../packages/ces-contracts && bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: |
          if [ -n "$(find src/ \( -name '*.test.*' -o -name '*.spec.*' \) -print -quit)" ]; then
            bun run test
          else
            echo "No test files found, skipping"
          fi

  push-dev-image:
    name: Push Dev Image (Credential Executor)
    needs: [checks]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    environment: dev
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKERHUB_ACCESS_TOKEN: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
        run: bun scripts/docker-login-with-retry.ts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: image
        run: |
          echo "gcp=${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CREDENTIAL_EXECUTOR_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: credential-executor/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,"name=${{ steps.image.outputs.gcp }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=credential-executor-dev-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=credential-executor-dev-${{ matrix.platform }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Prepare platform suffix
        id: platform
        run: |
          platform="${{ matrix.platform }}"
          echo "suffix=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: credential-executor-digests-dev-${{ steps.platform.outputs.suffix }}
          path: /tmp/digests/*
          retention-days: 1

  push-dev-manifest:
    name: Push Dev Manifest (Credential Executor)
    needs: [push-dev-image]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    environment: dev
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Fail if image build failed
        if: needs.push-dev-image.result != 'success'
        run: |
          echo "::error::push-dev-image failed with result: ${{ needs.push-dev-image.result }}"
          exit 1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKERHUB_ACCESS_TOKEN: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
        run: bun scripts/docker-login-with-retry.ts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: credential-executor-digests-dev-*
          merge-multiple: true

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          GCP_IMAGE="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.CREDENTIAL_EXECUTOR_IMAGE_NAME }}"
          IMMUTABLE_TAG="dev.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"
          GCP_TAGS="${GCP_IMAGE}:${GITHUB_SHA}"
          GCP_TAGS=$(printf "%s\n%s" "$GCP_TAGS" "${GCP_IMAGE}:${IMMUTABLE_TAG}")
          GCP_TAGS=$(printf "%s\n%s" "$GCP_TAGS" "${GCP_IMAGE}:dev")
          echo "gcp_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$GCP_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "gcp_image=${GCP_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS="$TAG_ARGS -t $tag"
          done <<< "${{ steps.tags.outputs.gcp_tags }}"
          SOURCES=$(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools create $TAG_ARGS $SOURCES

      - name: Write image ref artifact
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ steps.tags.outputs.gcp_image }}"
          IMMUTABLE_TAG="dev.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"
          mkdir -p /tmp/dev-image-ref
          echo "${IMAGE}:${IMMUTABLE_TAG}" > /tmp/dev-image-ref/image-ref.txt
          echo "Image ref: $(cat /tmp/dev-image-ref/image-ref.txt)"

      - name: Upload image ref
        uses: actions/upload-artifact@v4
        with:
          name: dev-image-ref-credential-executor
          path: /tmp/dev-image-ref/image-ref.txt
          retention-days: 7

  notify-credential-executor:
    name: Slack Notification (Credential Executor)
    needs: [checks]
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Slack ID
        id: slack-id
        run: |
          GITHUB_USER="${{ github.actor }}"

          if [[ "${{ needs.checks.result }}" == "failure" ]]; then
            STATUS="failure"
          elif [[ "${{ needs.checks.result }}" == "cancelled" ]]; then
            STATUS="cancelled"
          elif [[ "${{ needs.checks.result }}" == "skipped" ]]; then
            STATUS="skipped"
          else
            STATUS="success"
          fi

          SLACK_ID=$(yq ".github_to_slack_all_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)

          if [ "$SLACK_ID" = "null" ]; then
            case $STATUS in
              failure)
                SLACK_ID=$(yq ".github_to_slack_failure_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              success)
                SLACK_ID=$(yq ".github_to_slack_success_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              cancelled)
                SLACK_ID=$(yq ".github_to_slack_cancelled_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
            esac
          fi

          if [ "$SLACK_ID" = "null" ]; then
            SLACK_ID="$GITHUB_USER"
          fi

          if [ "$STATUS" = "cancelled" ] || [ "$SLACK_ID" = "$GITHUB_USER" ]; then
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi
          echo "id=$SLACK_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/send-build-alert
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ steps.slack-id.outputs.status }}
          slack-user-id: ${{ steps.slack-id.outputs.id }}
          should-tag: ${{ steps.slack-id.outputs.should_tag }}
          channel: "#build-alerts"
