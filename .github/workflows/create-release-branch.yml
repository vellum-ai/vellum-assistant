name: Create Release Branch

on:
  schedule:
    # Release at 9am ET every Tuesday and Friday. Two entries cover EDT (UTC-4)
    # and EST (UTC-5); schedule-guard picks the one matching today's offset and
    # drops the other. Scheduled at 7:50am ET (~70 min early) so GitHub's
    # variable cron delay can't push us past 9am; schedule-guard then sleeps off
    # the remaining buffer so the release lands at exactly 9am ET.
    - cron: "50 11 * * 2,5"  # EDT: 7:50am ET
    - cron: "50 12 * * 2,5"  # EST: 7:50am ET
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          # hotfix: patch bump cut from the latest *release tag's* commit
          # (not main HEAD), committed with [skip ci] so no staging release runs
          # until hotfixes are manually cherry-picked onto the branch.
          - hotfix

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  schedule-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Wait until 9am ET, then decide
        id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Two cron entries fire (11:50 and 12:50 UTC) to cover EDT/EST. Run
          # only the entry matching today's Eastern offset so the release fires
          # once. Keying off the triggering cron (not the wall-clock hour at job
          # start) stays correct even when GitHub delays the scheduled run.
          OFFSET=$(TZ=America/New_York date +%z)
          if [ "$OFFSET" = "-0400" ]; then
            EXPECTED="50 11 * * 2,5"  # EDT: 7:50am ET = 11:50 UTC
          else
            EXPECTED="50 12 * * 2,5"  # EST: 7:50am ET = 12:50 UTC
          fi
          if [ "${{ github.event.schedule }}" != "$EXPECTED" ]; then
            echo "should-run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should-run=true" >> "$GITHUB_OUTPUT"
          # Crons are scheduled ~70 min early to absorb GitHub's variable delay;
          # sleep off whatever buffer remains so downstream jobs start at 9am ET.
          # If GitHub already delayed us past 9am, proceed immediately.
          TARGET=$(TZ=America/New_York date -d 'today 09:00' +%s)
          NOW=$(date +%s)
          if [ "$NOW" -lt "$TARGET" ]; then
            echo "Waiting $((TARGET - NOW))s until 9:00am ET"
            sleep $((TARGET - NOW))
          fi

  compute-version:
    needs: schedule-guard
    if: needs.schedule-guard.outputs.should-run == 'true' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.compute.outputs.version }}
      base-ref: ${{ steps.compute.outputs.base-ref }}
      skip-ci: ${{ steps.compute.outputs.skip-ci }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Compute version from bump type
        id: compute
        run: |
          BUMP="${{ inputs.bump || 'patch' }}"

          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          LATEST_VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch|hotfix) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # A hotfix is a patch release cut from the latest release tag's commit
          # rather than from main HEAD, and committed with [skip ci] so the push
          # doesn't kick off a staging release — the branch is meant to receive
          # manually cherry-picked fixes first. patch/minor/major all cut from
          # main HEAD and run CI as usual (base-ref empty, skip-ci false).
          if [ "$BUMP" = "hotfix" ]; then
            BASE_REF=$(git rev-list -n 1 "$LATEST_TAG")
            echo "Hotfix: branching from $LATEST_TAG ($BASE_REF)"
            echo "base-ref=$BASE_REF" >> "$GITHUB_OUTPUT"
            echo "skip-ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "base-ref=" >> "$GITHUB_OUTPUT"
            echo "skip-ci=false" >> "$GITHUB_OUTPUT"
          fi

  notify-failure:
    name: Slack Notification (Release Branch Failed)
    needs: [compute-version, create-release-branch]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Notify Slack of failure
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\U0001F6A8 Release Branch Creation Failed"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Create Release Branch\n*Version:* `${{ needs.compute-version.outputs.version }}`\n*Bump:* `${{ inputs.bump || 'patch' }}`\n*Triggered by:* ${{ github.event_name == 'schedule' && 'Scheduled' || github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  notify-start:
    name: Slack Notification (Release Start)
    needs: [compute-version, create-release-branch]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Find release workflow run
        id: find-run
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          BRANCH="release/v$VERSION"

          # Hotfix branches are pushed with [skip ci], so no release.yml run is
          # triggered — don't waste ~3 minutes polling for one. Point at the
          # branch instead.
          if [ "${{ needs.compute-version.outputs.skip-ci }}" = "true" ]; then
            echo "run_url=${{ github.server_url }}/${{ github.repository }}/tree/$BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Poll for the release workflow run triggered by the branch push
          RUN_URL=""
          for i in $(seq 1 18); do
            RESPONSE=$(curl -sSL \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/runs?branch=$BRANCH&per_page=1" \
              2>/dev/null || echo "")

            if [ -n "$RESPONSE" ]; then
              RUN_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; runs=json.load(sys.stdin).get('workflow_runs',[]); print(runs[0]['id'] if runs else '')" 2>/dev/null || echo "")
            else
              RUN_ID=""
            fi

            if [ -n "$RUN_ID" ]; then
              RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"
              echo "Found release workflow run: $RUN_URL"
              break
            fi
            echo "Waiting for release workflow run to appear... (attempt $i/18)"
            sleep 10
          done

          if [ -z "$RUN_URL" ]; then
            echo "::warning::Could not find release workflow run, falling back to current run URL"
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

      - name: Notify Slack of release start
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\U0001F680 Release v${{ needs.compute-version.outputs.version }} Started"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Create Release Branch\n*Version:* `${{ needs.compute-version.outputs.version }}`\n*Bump:* `${{ inputs.bump || 'patch' }}`\n*Triggered by:* ${{ github.event_name == 'schedule' && 'Scheduled' || github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ steps.find-run.outputs.run_url }}"

  create-release-branch:
    needs: compute-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      # Hotfix releases install + generate from the latest release tag's tree,
      # not main HEAD. Check out that commit before installing so lockfiles and
      # node_modules match. For patch/minor/major, base-ref is empty and this is
      # a no-op (we stay on main HEAD).
      - name: Check out hotfix base ref
        if: ${{ needs.compute-version.outputs.base-ref != '' }}
        run: git checkout "${{ needs.compute-version.outputs.base-ref }}"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install package dependencies
        run: |
          for pkg in packages/*/; do
            [ -f "$pkg/package.json" ] || continue
            (cd "$pkg" && bun install --frozen-lockfile)
          done

      - name: Install assistant dependencies
        working-directory: assistant
        run: bun install --frozen-lockfile

      - name: Disable local git hooks
        run: git config --unset core.hooksPath || true

      - name: Create release branch and bump versions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          BASE_REF="${{ needs.compute-version.outputs.base-ref }}"
          SKIP_CI="${{ needs.compute-version.outputs.skip-ci }}"
          BRANCH="release/v$VERSION"
          CHERRY_PICK_BRANCH="cherry-pick/$BRANCH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete existing cherry-pick branch if it exists (must happen before release branch)
          if git ls-remote --exit-code origin "$CHERRY_PICK_BRANCH" >/dev/null 2>&1; then
            echo "Deleting existing cherry-pick branch: $CHERRY_PICK_BRANCH"
            git push origin --delete "$CHERRY_PICK_BRANCH"
          fi

          # Delete existing release branch if it exists
          if git ls-remote --exit-code origin "$BRANCH" >/dev/null 2>&1; then
            echo "Deleting existing release branch: $BRANCH"
            git push origin --delete "$BRANCH"
          fi

          # Hotfix releases branch from the latest release tag's commit so the
          # patch contains only the released code (plus fixes cherry-picked
          # later). Other bump types branch from the checked-out main HEAD.
          if [ -n "$BASE_REF" ]; then
            echo "Creating $BRANCH from $BASE_REF"
            git checkout -b "$BRANCH" "$BASE_REF"
          else
            git checkout -b "$BRANCH"
          fi

          # Bump all package.json files
          # NOTE: Service + client versions stay in sync. The Electron macOS app
          # stamps this same version into clients/macos/package.json at build time
          # (see the build-electron job in release.yml).
          for pkg in assistant cli credential-executor gateway meta; do
            jq --arg v "$VERSION" '.version = $v' $pkg/package.json > tmp && mv tmp $pkg/package.json
          done
          jq --arg v "$VERSION" '.version = $v' clients/web/package.json > tmp && mv tmp clients/web/package.json

          # Bump meta-package dependency versions
          jq --arg v "$VERSION" '
            .dependencies["@vellumai/assistant"] = $v |
            .dependencies["@vellumai/cli"] = $v |
            .dependencies["@vellumai/credential-executor"] = $v |
            .dependencies["@vellumai/vellum-gateway"] = $v |
            .dependencies["@vellumai/web"] = $v
          ' meta/package.json > tmp && mv tmp meta/package.json

          # Bump Chrome extension version (manifest.json + package.json)
          jq --arg v "$VERSION" '.version = $v' clients/chrome-extension/manifest.json > tmp && mv tmp clients/chrome-extension/manifest.json
          jq --arg v "$VERSION" '.version = $v' clients/chrome-extension/package.json > tmp && mv tmp clients/chrome-extension/package.json

          # Regenerate OpenAPI spec with the new version
          cd assistant && bun run generate:openapi && cd ..

          # Hotfix commits carry [skip ci] so pushing the branch doesn't trigger
          # a staging release run — the branch is cut quietly and only releases
          # once fixes have been cherry-picked and CI is run intentionally.
          COMMIT_MSG="Release v$VERSION"
          if [ "$SKIP_CI" = "true" ]; then
            COMMIT_MSG="Release v$VERSION [skip ci]"
          fi

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "$COMMIT_MSG"
          fi
          git push --no-verify origin "$BRANCH"
