name: PR Web Checks

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/pr-web.yml'

jobs:
  checks:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit

      - name: Schema push preview
        run: bunx drizzle-kit push --dry-run
