name: Evals Manual Run

# Manually dispatchable evals run.
#
# Spins up a Vellum hatch (built from source) inside a GitHub Actions runner
# and runs the given profile × test combinations end-to-end. Designed for
# mobile-friendly dispatch from the GitHub mobile app or web UI: short,
# free-form text inputs with sensible defaults.
#
# Required repo secret: ANTHROPIC_API_KEY (configure under Settings →
# Secrets and variables → Actions). Used by the simulator and forwarded
# into the hatched assistant container.
#
# Outputs the NDJSON result rows to the job log and uploads the captured
# output as the `evals-results` artifact.

on:
  workflow_dispatch:
    inputs:
      profiles:
        description: 'Comma-separated profile ids (e.g. vellum-default or vellum-default,vellum-simple-memory)'
        required: true
        default: 'vellum-default'
      tests:
        description: 'Comma-separated test ids (e.g. timeline-recall)'
        required: true
        default: 'timeline-recall'

jobs:
  run:
    name: 'evals run'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Simulator key. The Vellum adapter forwards this into the hatched
      # assistant container when non-empty (see
      # evals/src/lib/adapters/vellum.ts).
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Bootstrap repo (setup.sh — installs deps and links the `vellum` CLI)
        run: ./setup.sh

      - name: Add bun global bin to PATH
        # `bun pm bin -g` reports the directory where `bun link` installs
        # global CLI shims (versioned, not hardcoded).
        run: echo "$(bun pm bin -g)" >> "$GITHUB_PATH"

      - name: Verify vellum CLI is on PATH
        run: |
          which vellum
          vellum --help | head -20 || true

      - name: Run evals
        id: run
        working-directory: evals
        env:
          IN_PROFILES: ${{ inputs.profiles }}
          IN_TESTS: ${{ inputs.tests }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/evals-out"
          OUT="${RUNNER_TEMP}/evals-out/results.ndjson"

          echo "Running: bun src/cli.ts run --profiles ${IN_PROFILES} --tests ${IN_TESTS}"
          bun src/cli.ts run --profiles "${IN_PROFILES}" --tests "${IN_TESTS}" | tee "${OUT}"

      - name: Job summary
        if: always()
        env:
          IN_PROFILES: ${{ inputs.profiles }}
          IN_TESTS: ${{ inputs.tests }}
        run: |
          OUT="${RUNNER_TEMP}/evals-out/results.ndjson"
          {
            echo "## Evals Run"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Profiles | \`${IN_PROFILES}\` |"
            echo "| Tests | \`${IN_TESTS}\` |"
            echo ""
            echo "### Result rows (NDJSON)"
            echo ""
            echo '```json'
            if [ -s "${OUT}" ]; then
              cat "${OUT}"
            else
              echo "(no result rows captured — see logs above)"
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: evals-results
          path: ${{ runner.temp }}/evals-out/
          if-no-files-found: warn
          retention-days: 14
