name: PR Assistant Checks

on:
  pull_request:
    paths:
      - 'assistant/**'
      - 'clients/shared/IPC/**'
      - '.githooks/**'
      - '.github/workflows/ci-assistant.yml'

jobs:
  checks:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assistant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify IPC generated code is up to date
        run: bun run check:ipc-generated

      - name: Verify IPC contract inventory is up to date
        run: bun run ipc:inventory

      - name: Verify Swift decoder is in sync with contract
        run: bun run ipc:check-swift-drift

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
        env:
          EXCLUDE_EXPERIMENTAL: 'true'
