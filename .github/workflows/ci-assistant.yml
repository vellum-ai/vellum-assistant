name: CI Assistant Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'assistant/**'
      - 'clients/shared/IPC/**'
      - '.githooks/**'
      - '.github/workflows/ci-assistant.yml'
  push:
    branches: [main]
    paths:
      - 'assistant/**'
      - 'clients/shared/IPC/**'
      - '.githooks/**'
      - '.github/workflows/ci-assistant.yml'

concurrency:
  group: ci-assistant-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  checks:
    if: github.event.action != 'closed'
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: assistant

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify IPC generated code is up to date
        run: bun run check:ipc-generated

      - name: Verify IPC contract inventory is up to date
        run: bun run ipc:inventory

      - name: Verify Swift decoder is in sync with contract
        run: bun run ipc:check-swift-drift

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
        env:
          EXCLUDE_EXPERIMENTAL: 'true'

      - name: Zip assistant artifact
        if: github.event_name == 'pull_request'
        run: zip -r ../assistant-pr-${{ github.event.pull_request.number }}.zip . -x "node_modules/*"

      - name: Upload assistant artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: assistant-pr-${{ github.event.pull_request.number }}
          path: assistant-pr-${{ github.event.pull_request.number }}.zip
          if-no-files-found: error
          retention-days: 7

      - name: Generate GitHub App token
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Comment artifact link on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ARTIFACT_NAME="assistant-pr-${{ github.event.pull_request.number }}"
          ARTIFACT_ID=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id")
          ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/$ARTIFACT_ID"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          gh pr comment "$PR_NUMBER" --body "📦 **Assistant artifact** for this PR is ready for download: [Download $ARTIFACT_NAME]($ARTIFACT_URL)

          To run this build locally:
          \`\`\`
          vel up assistant --pr $PR_NUMBER
          \`\`\`"
