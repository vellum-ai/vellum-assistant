name: CI/CD Main Linux

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'bun.lock'
      - 'patches/**'
      - 'clients/linux/**'
      - 'packages/desktop-shell/**'
      - 'packages/local-mode/**'
      - 'packages/environments/**'
      - '.github/workflows/ci-main-linux.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/linux
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/linux

      - name: Type check
        run: bun run typecheck

  build:
    # Build the real distributable (AppImage), not just the electron-vite
    # bundle — the pack pipeline (bun fetch, web build, icon render,
    # electron-builder) is what actually ships, so that is what CI verifies.
    name: Build AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: clients/linux
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # generate-icon.sh renders the app icon with librsvg + ImageMagick, which
      # are not preinstalled on ubuntu-latest.
      - name: Install icon tooling
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends librsvg2-bin imagemagick

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/linux --filter=@vellumai/web

      - name: Build AppImage
        run: bun run pack --environment local

      - name: Validate AppImage artifact
        run: bash scripts/validate-appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linux-appimage
          path: clients/linux/dist/*.AppImage
          if-no-files-found: error
          retention-days: 7

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/linux
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/linux

      - name: Run tests
        run: bun run test:ci

  checks:
    name: Type Check, Build & Test
    needs: [typecheck, build, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        env:
          TYPECHECK: ${{ needs.typecheck.result }}
          BUILD: ${{ needs.build.result }}
          TEST: ${{ needs.test.result }}
        run: |
          echo "Type Check: $TYPECHECK"
          echo "Build:      $BUILD"
          echo "Test:       $TEST"
          for r in "$TYPECHECK" "$BUILD" "$TEST"; do
            if [ "$r" != "success" ]; then
              echo "::error::At least one Linux CI job failed."
              exit 1
            fi
          done
