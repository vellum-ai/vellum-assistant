name: PR Gateway Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'gateway/**'
      - 'packages/**'
      - 'meta/feature-flags/**'
      - '.github/workflows/pr-gateway.yaml'
      - '.github/actions/install-shared-packages/**'

concurrency:
  group: pr-gateway-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install shared packages
        uses: ./.github/actions/install-shared-packages
        with:
          packages: packages/service-contracts packages/ces-client packages/assistant-client packages/gateway-client

      - name: Sync feature flag registry
        run: cd .. && bun run meta/feature-flags/sync-bundled-copies.ts

      - name: Lint
        run: bun run lint

      - name: Lint unused code
        run: bun run lint:unused

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test
