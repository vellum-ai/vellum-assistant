name: PR Platform Checks

on:
  pull_request:
    paths:
      - 'platform/**'
      - '.github/workflows/pr-platform.yml'

env:
  TF_WORKING_DIR: platform/terraform

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/620844561845/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: github-actions@vellum-ai-prod.iam.gserviceaccount.com

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug - Authenticated identity
        run: gcloud auth list

      - name: Debug - Check WIF token claims
        run: |
          echo "=== Current access token info ==="
          gcloud auth print-access-token | cut -c1-20
          echo "..."
          echo ""
          echo "=== Token introspection ==="
          TOKEN=$(gcloud auth print-access-token)
          curl -s "https://oauth2.googleapis.com/tokeninfo?access_token=$TOKEN" | python3 -m json.tool || true

      - name: Debug - Service account IAM policy
        run: |
          echo "=== IAM policy on github-actions SA ==="
          gcloud iam service-accounts get-iam-policy \
            github-actions@vellum-ai-prod.iam.gserviceaccount.com \
            --project=vellum-ai-prod \
            --format=yaml || echo "FAILED: Cannot read IAM policy on the service account"

      - name: Debug - Project-level IAM roles for authenticated identity
        run: |
          echo "=== Project IAM bindings mentioning github-actions SA ==="
          gcloud projects get-iam-policy vellum-ai-prod \
            --flatten="bindings[].members" \
            --filter="bindings.members:github-actions@vellum-ai-prod.iam.gserviceaccount.com" \
            --format="table(bindings.role, bindings.members)" || echo "FAILED: Cannot read project IAM policy"

      - name: Debug - Test impersonation directly
        run: |
          echo "=== Attempting to generate access token via impersonation ==="
          gcloud auth print-access-token \
            --impersonate-service-account=github-actions@vellum-ai-prod.iam.gserviceaccount.com 2>&1 || true

      - name: Debug - Check container.clusters.get permission
        run: |
          echo "=== Testing direct GKE API access ==="
          gcloud container clusters describe vellum-ai-prod \
            --region=us-central1 \
            --project=vellum-ai-prod 2>&1 | head -20 || true

      - name: Debug - Check if SA has container admin role
        run: |
          echo "=== All IAM roles for the SA on the project ==="
          gcloud projects get-iam-policy vellum-ai-prod \
            --flatten="bindings[].members" \
            --filter="bindings.members:serviceAccount:github-actions@vellum-ai-prod.iam.gserviceaccount.com" \
            --format="table(bindings.role)" || echo "FAILED"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color
        env:
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
