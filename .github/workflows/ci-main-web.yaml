name: CI/CD Main Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/design-library/**'
      - '.github/workflows/ci-main-web.yaml'

# Independent jobs run in parallel — same structure as PR workflow.
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Lint
        run: bun run lint

      - name: Audit cross-domain import allow-list freshness
        run: bun run audit:cross-domain:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Type check
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install design-library dependencies
        working-directory: packages/design-library
        run: bun install --frozen-lockfile

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Test
        run: bun run test:ci

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Build
        env:
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: ${{ vars.VITE_SENTRY_ENVIRONMENT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: bun run build

      # Hand the built SPA off to the deploy jobs so we publish exactly what CI
      # built (and verified) rather than rebuilding. Source maps are stripped by
      # the Sentry plugin during the build, so dist contains no .map files.
      - name: Upload SPA build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: web-spa-dist
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 7

  checks:
    name: Lint, Type Check & Build
    needs: [lint, typecheck, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
        run: |
          echo "Lint:       $LINT"
          echo "Type Check: $TYPECHECK"
          echo "Test:       $TEST"
          echo "Build:      $BUILD"
          for r in "$LINT" "$TYPECHECK" "$TEST" "$BUILD"; do
            if [ "$r" != "success" ]; then
              echo "::error::At least one web CI job failed."
              exit 1
            fi
          done

  # ── CD: build + publish the SPA to each environment's GCS bucket ──────────
  # Runs only after every CI check passes (a `needs` dependency on a failed job
  # skips this job automatically). One matrix leg per GitHub environment so the
  # GCP_* secrets — including the project id that names the bucket — resolve to
  # that environment. `production` will gate here if it has required reviewers.
  deploy:
    name: Deploy SPA (${{ matrix.environment }})
    needs: [checks]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, production]
    environment: ${{ matrix.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download SPA build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: web-spa-dist
          path: dist

      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Publish SPA to GCS
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          TARGET_ENV: ${{ matrix.environment }}
        run: |
          set -euo pipefail
          BUCKET="${PROJECT_ID}-assistant-spa"

          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html not found — the build artifact is missing or empty."
            exit 1
          fi

          # 1. Upload the whole build, additive (no deletion). Leaving old hashed
          #    chunks in place means clients that loaded the previous index.html can
          #    still fetch their lazy-loaded chunks during the rollout. Fingerprinted
          #    assets are immutable, so they get a long-lived cache.
          gcloud storage cp -r \
            --cache-control="public, max-age=31536000, immutable" \
            dist/* "gs://${BUCKET}/"

          # 2. Re-upload the HTML entrypoint last with no-cache so the new release is
          #    served immediately instead of from a stale edge/browser cache.
          gcloud storage cp \
            --cache-control="no-cache, max-age=0, must-revalidate" \
            dist/index.html "gs://${BUCKET}/index.html"

          echo "Published SPA to gs://${BUCKET}/ (environment=${TARGET_ENV})"

  notify-web:
    name: Slack Notification (Web)
    needs: [checks, deploy]
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Slack ID
        id: slack-id
        run: |
          GITHUB_USER="${{ github.actor }}"

          if [[ "${{ needs.checks.result }}" == "failure" || "${{ needs.deploy.result }}" == "failure" ]]; then
            STATUS="failure"
          elif [[ "${{ needs.checks.result }}" == "cancelled" || "${{ needs.deploy.result }}" == "cancelled" ]]; then
            STATUS="cancelled"
          elif [[ "${{ needs.checks.result }}" == "skipped" ]]; then
            STATUS="skipped"
          else
            STATUS="success"
          fi

          SLACK_ID=$(yq ".github_to_slack_all_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)

          if [ "$SLACK_ID" = "null" ]; then
            case $STATUS in
              failure)
                SLACK_ID=$(yq ".github_to_slack_failure_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              success)
                SLACK_ID=$(yq ".github_to_slack_success_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              cancelled)
                SLACK_ID=$(yq ".github_to_slack_cancelled_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
            esac
          fi

          if [ "$SLACK_ID" = "null" ]; then
            SLACK_ID="$GITHUB_USER"
          fi

          if [ "$STATUS" = "cancelled" ] || [ "$SLACK_ID" = "$GITHUB_USER" ]; then
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi
          echo "id=$SLACK_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/send-build-alert
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ steps.slack-id.outputs.status }}
          slack-user-id: ${{ steps.slack-id.outputs.id }}
          should-tag: ${{ steps.slack-id.outputs.should_tag }}
          channel: "#build-alerts"
