name: CI Main Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'bun.lock'
      - 'patches/**'
      - 'clients/web/**'
      - 'assistant/src/api/**'
      - 'packages/design-library/**'
      - 'packages/local-mode/**'
      - 'packages/environments/**'
      # The web LLM catalog parity test reads this file, so daemon-side catalog
      # regenerations must run the web tests too.
      - 'meta/llm-provider-catalog.json'
      - '.github/workflows/ci-main-web.yaml'

# Serialize runs per branch and cancel superseded in-flight runs — only the
# newest main run's CI matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Independent jobs run in parallel — same structure as PR workflow.
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/web

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Lint
        run: bun run lint

      - name: Audit cross-domain import allow-list freshness
        run: bun run audit:cross-domain:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/web

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Type check
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/web

      - name: Generate API clients
        run: bun run openapi-ts

      - name: Test
        run: bun run test:ci

  checks:
    name: Lint, Type Check & Test
    needs: [lint, typecheck, test]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        env:
          LINT: ${{ needs.lint.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          TEST: ${{ needs.test.result }}
        run: |
          echo "Lint:       $LINT"
          echo "Type Check: $TYPECHECK"
          echo "Test:       $TEST"
          for r in "$LINT" "$TYPECHECK" "$TEST"; do
            if [ "$r" != "success" ]; then
              echo "::error::At least one web CI job failed."
              exit 1
            fi
          done

  notify-web:
    name: Slack Notification (Web)
    needs: [checks]
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Slack ID
        id: slack-id
        run: |
          GITHUB_USER="${{ github.actor }}"

          STATUS="${{ needs.checks.result }}"

          SLACK_ID=$(yq ".github_to_slack_all_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)

          if [ "$SLACK_ID" = "null" ]; then
            case $STATUS in
              failure)
                SLACK_ID=$(yq ".github_to_slack_failure_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              success)
                SLACK_ID=$(yq ".github_to_slack_success_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              cancelled)
                SLACK_ID=$(yq ".github_to_slack_cancelled_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
            esac
          fi

          if [ "$SLACK_ID" = "null" ]; then
            SLACK_ID="$GITHUB_USER"
          fi

          if [ "$STATUS" = "cancelled" ] || [ "$SLACK_ID" = "$GITHUB_USER" ]; then
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi
          echo "id=$SLACK_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/send-build-alert
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ steps.slack-id.outputs.status }}
          slack-user-id: ${{ steps.slack-id.outputs.id }}
          should-tag: ${{ steps.slack-id.outputs.should_tag }}
          channel: "#build-alerts"
