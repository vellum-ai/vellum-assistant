name: PR Outbound Proxy Checks

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - 'outbound-proxy/**'
      - '.github/workflows/pr-outbound-proxy.yaml'

concurrency:
  group: pr-outbound-proxy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    if: contains(github.event.pull_request.labels.*.name, 'preview')
    name: Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: outbound-proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

  docker:
    if: contains(github.event.pull_request.labels.*.name, 'preview')
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: outbound-proxy
          push: false
          load: true
          tags: outbound-proxy:ci-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
