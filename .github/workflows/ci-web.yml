name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/ci-web.yml'

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/620844561845/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: github-actions@vellum-ai-prod.iam.gserviceaccount.com

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Fetch secrets from Secret Manager
        id: secrets
        run: |
          echo "DATABASE_URL=$(gcloud secrets versions access latest --secret=database-url --project=vellum-ai-prod)" >> "$GITHUB_OUTPUT"
          echo "STRIPE_SECRET_KEY=$(gcloud secrets versions access latest --secret=STRIPE_SECRET_KEY --project=vellum-ai-prod)" >> "$GITHUB_OUTPUT"
          echo "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY --project=vellum-ai-prod)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: ${{ steps.secrets.outputs.DATABASE_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ steps.secrets.outputs.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build Docker images
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ steps.secrets.outputs.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }} \
            -t gcr.io/vellum-ai-prod/vellum-assistant:${{ github.sha }} .
          docker tag gcr.io/vellum-ai-prod/vellum-assistant:${{ github.sha }} gcr.io/vellum-ai-prod/vellum-assistant:latest
          docker build --target migrator -t gcr.io/vellum-ai-prod/vellum-assistant-migrate:${{ github.sha }} .

      - name: Push Docker images
        run: |
          docker push gcr.io/vellum-ai-prod/vellum-assistant:${{ github.sha }}
          docker push gcr.io/vellum-ai-prod/vellum-assistant:latest
          docker push gcr.io/vellum-ai-prod/vellum-assistant-migrate:${{ github.sha }}

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials vellum-ai-prod \
            --region us-central1 \
            --project vellum-ai-prod

      - name: Run database migrations
        run: |
          JOB_NAME="db-migrate-${{ github.sha }}"

          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${JOB_NAME}
            namespace: vellum-assistant
          spec:
            ttlSecondsAfterFinished: 300
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: migrate
                    image: gcr.io/vellum-ai-prod/vellum-assistant-migrate:${{ github.sha }}
                    command: ["bun", "run", "db:push"]
                    envFrom:
                      - configMapRef:
                          name: vellum-assistant-config
                      - secretRef:
                          name: vellum-assistant-secrets
          EOF

          echo "Waiting for migration job to complete..."
          if ! kubectl wait --for=condition=complete --timeout=120s job/${JOB_NAME} -n vellum-assistant; then
            echo "Migration job failed. Logs:"
            kubectl logs job/${JOB_NAME} -n vellum-assistant
            kubectl delete job ${JOB_NAME} -n vellum-assistant
            exit 1
          fi

          echo "Migration completed successfully."
          kubectl delete job ${JOB_NAME} -n vellum-assistant

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/vellum-assistant \
            web=gcr.io/vellum-ai-prod/vellum-assistant:${{ github.sha }} \
            -n vellum-assistant
          kubectl rollout status deployment/vellum-assistant -n vellum-assistant
