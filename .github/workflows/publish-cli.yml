name: Publish CLI to npm

on:
  push:
    branches: [main]
    paths: [cli/package.json]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version change
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          PREVIOUS=$(git show HEAD~1:cli/package.json | jq -r '.version')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: steps.version.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: |
          if ! bun install --frozen-lockfile; then
            echo "bun install failed (likely stale lockfile integrity hash), retrying without lockfile..."
            rm -f bun.lock
            rm -rf node_modules
            bun install
          fi

      - name: Setup Node
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        # --no-provenance: sigstore provenance signing fails for private repos (see PR #1660)
        run: npm publish --access public --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.current }}

  update-assistant:
    needs: [publish]
    if: needs.publish.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Update assistant dependency and bump version
        env:
          NEW_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          cd assistant

          CURRENT_ASSISTANT_VERSION=$(jq -r '.version' package.json)
          IFS='.' read -r major minor patch <<< "$CURRENT_ASSISTANT_VERSION"
          BUMPED_ASSISTANT_VERSION="${major}.${minor}.$((patch + 1))"

          jq --arg v "$NEW_VERSION" '.dependencies["@vellumai/cli"] = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "$BUMPED_ASSISTANT_VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

          bun install

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          BRANCH="auto/bump-cli-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add assistant/package.json assistant/bun.lock
          git commit -m "Bump @vellumai/cli to ${NEW_VERSION} in assistant"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "Bump @vellumai/cli to ${NEW_VERSION} in assistant" \
            --body "Auto-generated PR to update @vellumai/cli to ${NEW_VERSION} and bump assistant version." \
            --base main \
            --head "$BRANCH")
          sleep 10
          gh pr merge "$PR_URL" --auto --squash

  update-platform:
    needs: [publish]
    if: needs.publish.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}
          owner: vellum-ai
          repositories: vellum-assistant-platform

      - name: Checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: vellum-ai/vellum-assistant-platform
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Update vel dependency
        env:
          NEW_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          cd vel
          jq --arg v "$NEW_VERSION" '.dependencies["@vellumai/cli"] = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          bun install

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ needs.publish.outputs.version }}
        run: |
          BRANCH="auto/bump-cli-${NEW_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add vel/package.json vel/bun.lock
          git commit -m "Bump @vellumai/cli to ${NEW_VERSION} in vel"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo vellum-ai/vellum-assistant-platform \
            --title "Bump @vellumai/cli to ${NEW_VERSION} in vel" \
            --body "Auto-generated PR to update @vellumai/cli to ${NEW_VERSION}." \
            --base main \
            --head "$BRANCH")
          sleep 10
          gh pr merge "$PR_URL" --auto --squash

  notify-failure:
    if: failure()
    needs: [publish, update-assistant, update-platform]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack of publish failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_RELEASES_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            unfurl_links: false
            unfurl_media: false
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: "\u274c Publish CLI to npm Failed"
              - type: section
                text:
                  type: mrkdwn
                  text: "*Workflow:* Publish CLI to npm\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Triggered by:* ${{ github.actor }}"
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: "View Run"
                    url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    style: danger
