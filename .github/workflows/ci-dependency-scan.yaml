name: Dependency Vulnerability Scan

on:
  push:
    branches: [main]
    paths:
      - '**/bun.lock'
      - '**/package.json'
      - '**/Package.resolved'
      - '.github/workflows/ci-dependency-scan.yaml'
  pull_request:
    paths:
      - '**/bun.lock'
      - '**/package.json'
      - '**/Package.resolved'
      - '.github/workflows/ci-dependency-scan.yaml'
  schedule:
    # Run weekly on Monday at 08:00 UTC to catch newly disclosed vulnerabilities
    - cron: '0 8 * * 1'

concurrency:
  group: dep-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy vulnerability scanner
        run: trivy fs --scanners vuln --severity HIGH,CRITICAL --exit-code 1 --format table .
