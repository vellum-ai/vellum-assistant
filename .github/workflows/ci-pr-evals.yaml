name: CI PR Evals Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'evals/**'
      - '.github/workflows/ci-pr-evals.yaml'

jobs:
  evals-checks:
    name: Evals lint, type check & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evals

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun test --coverage

      - name: Format check
        run: bun run format:check

      - name: Unused code check
        run: bun run lint:unused

  go-runtime-checks:
    name: Go vellum-evals-runtime (gofmt, vet, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: evals/docker/eval-pod/vellum-evals-runtime

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: evals/docker/eval-pod/vellum-evals-runtime/go.mod

      - name: Format check (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt produced changes — run 'gofmt -w .' on these files:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race + count=1)
        run: go test -race -count=1 ./...

      - name: Build (static, stripped)
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /tmp/vellum-evals-runtime ./

  python-egress-checks:
    name: Python egress sidecars (unittest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Test recording usage parser
        working-directory: evals/src/lib/egress/recording
        run: python3 -m unittest discover -p 'test_*.py' -v

      - name: Test connection telemetry tailer
        working-directory: evals/src/lib/egress/connection-telemetry
        run: python3 -m unittest discover -p 'test_*.py' -v
