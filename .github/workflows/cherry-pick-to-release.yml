name: Cherry Pick to Release Branch

on:
  pull_request:
    branches:
      - main
    types:
      - closed

concurrency:
  group: cherry-pick-to-release
  cancel-in-progress: false

jobs:
  cherry-pick:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'cherry-pick-to-release')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Determine latest release branch
        id: release
        run: |
          # Find the latest release/v* branch by semantic version sort.
          # Use -V (version sort) on the first key so that the 'release/v'
          # prefix is handled correctly across major versions.
          LATEST_BRANCH=$(git branch -r --list 'origin/release/v*' \
            | sed 's|origin/||; s/^[[:space:]]*//' \
            | sort -t. -k1,1V -k2,2n -k3,3n \
            | tail -1)

          if [ -z "$LATEST_BRANCH" ]; then
            echo "::error::No release branches found matching 'release/v*'"
            exit 1
          fi

          echo "branch=$LATEST_BRANCH" >> "$GITHUB_OUTPUT"
          echo "Latest release branch: $LATEST_BRANCH"

      - name: Cherry-pick and create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_BRANCH: ${{ steps.release.outputs.branch }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git config user.name "vellum-automation[bot]"
          git config user.email "192048195+vellum-automation[bot]@users.noreply.github.com"

          # Use a deterministic branch name based only on the release branch
          # so that multiple cherry-picks accumulate on a single branch.
          CHERRY_PICK_BRANCH="cherry-pick/${RELEASE_BRANCH}"

          # Reuse the cherry-pick branch if it already exists, otherwise create it
          if git ls-remote --exit-code origin "$CHERRY_PICK_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$CHERRY_PICK_BRANCH"
            git checkout "$CHERRY_PICK_BRANCH"
          else
            git checkout "$RELEASE_BRANCH"
            git checkout -b "$CHERRY_PICK_BRANCH"
          fi

          # Detect the merge strategy:
          # - True merge (2 parents): cherry-pick with -m 1
          # - Squash merge (1 parent): cherry-pick the single commit
          # - Rebase merge (1 parent, multiple PR commits): cherry-pick each
          #   commit individually so no work is silently dropped
          PARENT_COUNT=$(git cat-file -p "$MERGE_SHA" | grep -c '^parent')

          COMMITS_TO_PICK=()
          if [ "$PARENT_COUNT" -gt 1 ]; then
            # True merge — cherry-pick the merge commit itself
            CHERRY_PICK_ARGS="-m 1 --no-edit"
            COMMITS_TO_PICK=("$MERGE_SHA")
          else
            # Squash or rebase merge — list all commits from the PR.
            # For squash merges this returns just the one squashed commit.
            # For rebase merges this returns each rebased commit in order.
            MERGE_BASE=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.base.sha')
            mapfile -t COMMITS_TO_PICK < <(git rev-list --reverse "${MERGE_BASE}..${MERGE_SHA}")
            CHERRY_PICK_ARGS="--no-edit"
          fi

          CHERRY_PICK_OK=true
          for COMMIT in "${COMMITS_TO_PICK[@]}"; do
            if ! git cherry-pick $CHERRY_PICK_ARGS "$COMMIT"; then
              CHERRY_PICK_OK=false
              break
            fi
          done

          if [ "$CHERRY_PICK_OK" = true ]; then
            git push origin "$CHERRY_PICK_BRANCH"

            # Create a PR only if one doesn't already exist for this branch
            EXISTING_PR=$(gh pr list --head "$CHERRY_PICK_BRANCH" --base "$RELEASE_BRANCH" --json number --jq '.[0].number // empty')
            if [ -n "$EXISTING_PR" ]; then
              echo "Cherry-pick pushed to existing PR #${EXISTING_PR}"
            else
              PR_URL=$(gh pr create \
                --title "Cherry-picks for ${RELEASE_BRANCH}" \
                --body "Automated cherry-picks onto \`${RELEASE_BRANCH}\`." \
                --base "$RELEASE_BRANCH" \
                --head "$CHERRY_PICK_BRANCH")

              echo "Created cherry-pick PR: $PR_URL"
            fi
          else
            # Cherry-pick failed — abort and notify on the original PR
            git cherry-pick --abort

            BODY=":warning: **Cherry-pick to \`${RELEASE_BRANCH}\` failed due to conflicts.**"
            BODY="${BODY}"$'\n\n'"To resolve manually:"
            BODY="${BODY}"$'\n'"\`\`\`bash"
            BODY="${BODY}"$'\n'"git fetch origin"
            BODY="${BODY}"$'\n'"git checkout ${CHERRY_PICK_BRANCH} 2>/dev/null || git checkout -b ${CHERRY_PICK_BRANCH} origin/${RELEASE_BRANCH}"
            BODY="${BODY}"$'\n'"git cherry-pick ${CHERRY_PICK_ARGS} ${COMMITS_TO_PICK[*]}"
            BODY="${BODY}"$'\n'"# resolve conflicts, then:"
            BODY="${BODY}"$'\n'"git push origin ${CHERRY_PICK_BRANCH}"
            BODY="${BODY}"$'\n'"\`\`\`"
            BODY="${BODY}"$'\n'"Then open a PR from \`${CHERRY_PICK_BRANCH}\` into \`${RELEASE_BRANCH}\`."

            gh pr comment "$PR_NUMBER" --body "$BODY"

            echo "::warning::Cherry-pick of #${PR_NUMBER} to ${RELEASE_BRANCH} failed due to conflicts. Commented on the original PR."
          fi
