name: PR CLI Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'package.json'
      - 'bun.lock'
      - 'patches/**'
      - 'cli/**'
      - 'packages/local-mode/**'
      - 'packages/environments/**'
      - '.github/workflows/pr-cli.yaml'

concurrency:
  group: pr-cli-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    # The suite normally finishes in ~1 minute; without a cap, a hung
    # `bun test` occupies a runner for GitHub's 6-hour default.
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile --filter=@vellumai/cli

      - name: Lint
        run: bun run lint

      - name: Lint unused code
        run: bun run lint:unused

      - name: Type check
        run: bun run typecheck

      - name: Compile check
        run: bun run compile:check

      - name: Test
        run: bun run test
