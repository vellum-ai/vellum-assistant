name: PR CLI Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'cli/**'
      - '.github/workflows/pr-cli.yaml'

concurrency:
  group: pr-cli-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: '1.3.9'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Lint unused code
        run: bun run lint:unused

      - name: Type check
        run: bun run typecheck

      - name: Compile check
        run: bun build --compile src/index.ts --outfile /dev/null

      - name: Test
        run: bun run test
