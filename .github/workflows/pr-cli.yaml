name: PR CLI Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'cli/**'
      - 'packages/local-mode/**'
      - 'packages/environments/**'
      - 'clients/shared/App/VellumEnvironment.swift'
      - '.github/workflows/pr-cli.yaml'

concurrency:
  group: pr-cli-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install environments package
        working-directory: packages/environments
        run: bun install --frozen-lockfile

      - name: Install local-mode package
        working-directory: packages/local-mode
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Lint unused code
        run: bun run lint:unused

      - name: Type check
        run: bun run typecheck

      - name: Compile check
        run: bun build --compile src/index.ts --outfile /dev/null

      - name: Test
        run: bun run test
