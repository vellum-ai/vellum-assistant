name: CI Main iOS Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'clients/ios/**'
      - 'clients/shared/**'
      - 'clients/Package.swift'
      - '.github/workflows/ci-main-ios.yaml'

jobs:
  build:
    name: iOS Build
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache SPM artifacts
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ios-spm-${{ hashFiles('clients/Package.resolved') }}
          restore-keys: ios-spm-

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: clients/ios/dist/DerivedData
          key: ios-deriveddata-${{ hashFiles('clients/Package.resolved') }}-${{ hashFiles('clients/ios/project.yml', 'clients/shared/**/*.swift', 'clients/ios/**/*.swift') }}
          restore-keys: |
            ios-deriveddata-${{ hashFiles('clients/Package.resolved') }}-
            ios-deriveddata-

      - name: Build for simulator
        working-directory: clients/ios
        run: ./build.sh

      - name: Run iOS tests
        working-directory: clients/ios
        run: ./build.sh test

  notify-ios:
    name: Slack Notification (iOS)
    needs: [build]
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Slack ID
        id: slack-id
        run: |
          GITHUB_USER="${{ github.actor }}"

          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            STATUS="failure"
          elif [[ "${{ needs.build.result }}" == "cancelled" ]]; then
            STATUS="cancelled"
          elif [[ "${{ needs.build.result }}" == "skipped" ]]; then
            STATUS="skipped"
          else
            STATUS="success"
          fi

          SLACK_ID=$(yq ".github_to_slack_all_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)

          if [ "$SLACK_ID" = "null" ]; then
            case $STATUS in
              failure)
                SLACK_ID=$(yq ".github_to_slack_failure_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              success)
                SLACK_ID=$(yq ".github_to_slack_success_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              cancelled)
                SLACK_ID=$(yq ".github_to_slack_cancelled_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
            esac
          fi

          if [ "$SLACK_ID" = "null" ]; then
            SLACK_ID="$GITHUB_USER"
          fi

          if [ "$SLACK_ID" = "$GITHUB_USER" ]; then
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi
          echo "id=$SLACK_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - uses: act10ns/slack@v2
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_ID: ${{ steps.slack-id.outputs.id }}
          SHOULD_TAG: ${{ steps.slack-id.outputs.should_tag }}
        with:
          status: ${{ steps.slack-id.outputs.status }}
          channel: "#build-alerts"
          config: .github/config/slack.yaml
