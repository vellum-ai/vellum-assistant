name: PR iOS Build Check

on:
  pull_request:
    paths:
      - 'clients/ios/**'
      - 'clients/shared/**'
      - 'clients/Package.swift'
      - '.github/workflows/ci-ios.yml'

jobs:
  build-check:
    name: iOS Build
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Verify xcodeproj is up to date
        working-directory: clients/ios
        run: |
          xcodegen
          if ! git diff --exit-code vellum-assistant-ios.xcodeproj/project.pbxproj; then
            echo "::error::xcodeproj is out of date. Run 'cd clients/ios && xcodegen' and commit the result."
            exit 1
          fi

      - name: Build for simulator
        working-directory: clients/ios
        run: ./build.sh

      - name: Run iOS tests
        working-directory: clients/ios
        run: ./build.sh test
