name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'platform/**'

env:
  TF_WORKING_DIR: platform/terraform

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/620844561845/locations/global/workloadIdentityPools/github-actions/providers/github-provider
          service_account: github-actions@vellum-ai-prod.iam.gserviceaccount.com

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Fetch Stripe keys from Secret Manager
        id: stripe_secrets
        run: |
          echo "STRIPE_SECRET_KEY=$(gcloud secrets versions access latest --secret=STRIPE_SECRET_KEY --project=vellum-ai-prod)" >> "$GITHUB_OUTPUT"
          echo "STRIPE_PUBLISHABLE_KEY=$(gcloud secrets versions access latest --secret=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY --project=vellum-ai-prod)" >> "$GITHUB_OUTPUT"

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_stripe_secret_key: ${{ steps.stripe_secrets.outputs.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key: ${{ steps.stripe_secrets.outputs.STRIPE_PUBLISHABLE_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          TF_VAR_stripe_secret_key: ${{ steps.stripe_secrets.outputs.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_publishable_key: ${{ steps.stripe_secrets.outputs.STRIPE_PUBLISHABLE_KEY }}
