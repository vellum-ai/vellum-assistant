name: PR iOS Build Check

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - 'clients/ios/**'
      - 'clients/shared/**'
      - 'clients/Package.swift'
      - '.github/workflows/pr-ios.yaml'

concurrency:
  group: pr-ios-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-check:
    if: contains(github.event.pull_request.labels.*.name, 'preview')
    name: iOS Build
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Cache Homebrew XcodeGen
        id: cache-xcodegen
        uses: actions/cache@v5.0.5
        with:
          path: |
            /usr/local/Cellar/xcodegen
            /opt/homebrew/Cellar/xcodegen
          key: xcodegen-v1-${{ runner.os }}-${{ runner.arch }}

      - name: Install XcodeGen
        if: steps.cache-xcodegen.outputs.cache-hit != 'true'
        run: brew install xcodegen

      - name: Link XcodeGen
        if: steps.cache-xcodegen.outputs.cache-hit == 'true'
        run: brew link xcodegen 2>/dev/null || true

      - name: Clear stale SPM artifact cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

      - name: Design token guard
        run: bash clients/scripts/check-design-tokens.sh --mode=strict

      - name: Build for simulator
        working-directory: clients/ios
        run: ./build.sh

      - name: Run iOS tests
        working-directory: clients/ios
        run: ./build.sh test
