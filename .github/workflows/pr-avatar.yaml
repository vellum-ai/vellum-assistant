name: PR Avatar Checks

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'assets/character-components.json'
      - 'assistant/src/avatar/character-components.ts'
      - 'scripts/avatar/**'
      - '.github/workflows/pr-avatar.yaml'

concurrency:
  group: pr-avatar-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-catalog:
    name: Check character-components.json is up to date
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Validate character-components.json
        run: bun scripts/avatar/check-catalog.mjs
