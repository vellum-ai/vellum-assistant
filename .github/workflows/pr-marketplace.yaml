name: PR Marketplace Checks

on:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - 'plugins/marketplace.json'
      - 'scripts/check-marketplace-prefix.mjs'
      - 'meta/feature-flags/feature-flag-registry.json'
      - 'meta/sync-bundled-copies.ts'
      - 'assistant/src/cli/lib/bundled-marketplace.json'
      - 'clients/web/src/lib/feature-flags/feature-flag-registry.json'
      - '.github/workflows/pr-marketplace.yaml'

concurrency:
  group: pr-marketplace-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-marketplace-prefix:
    name: Check Marketplace Reserved Prefix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22.22.2'

      - name: Check marketplace entries for reserved default- prefix
        run: node scripts/check-marketplace-prefix.mjs

  check-bundled-copies:
    name: Check Bundled Copies In Sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.11'

      - name: Verify bundled copies match canonical sources
        run: bun run meta/sync-bundled-copies.ts --check
