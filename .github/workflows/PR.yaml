name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  web-checks:
    name: Web App Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Minimal env vars for build to succeed
          DATABASE_URL: "postgresql://localhost:5432/placeholder"
