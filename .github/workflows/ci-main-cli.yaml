name: CI Main CLI Checks

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/ci-main-cli.yaml'

jobs:
  checks:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Compile check
        run: |
          bun build --compile src/index.ts --external react-devtools-core --outfile /tmp/vellum-cli-compile-check
          rm -f /tmp/vellum-cli-compile-check

      - name: Track consecutive failures
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WORKFLOW_NAME="${{ github.workflow }}"

          # Get the last 10 completed runs of this workflow on main (excluding current)
          RUNS=$(gh api "/repos/${{ github.repository }}/actions/workflows/${WORKFLOW_NAME}/runs?branch=main&status=completed&per_page=10" \
            --jq '[.workflow_runs[] | select(.id != '${{ github.run_id }}') | .conclusion]')

          # Count consecutive failures from most recent
          CONSECUTIVE=0
          for conclusion in $(echo "$RUNS" | jq -r '.[]'); do
            if [ "$conclusion" = "failure" ]; then
              CONSECUTIVE=$((CONSECUTIVE + 1))
            else
              break
            fi
          done

          # Add current run result
          if [ "${{ job.status }}" = "failure" ]; then
            CONSECUTIVE=$((CONSECUTIVE + 1))
          else
            CONSECUTIVE=0
          fi

          echo "Consecutive failures on main: $CONSECUTIVE"
