name: CI Main Assistant Checks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'assistant/**'
      - 'credential-executor/**'
      - 'packages/**'
      - 'skills/meet-join/**'
      - 'meta/feature-flags/**'
      - '.github/workflows/ci-main-assistant.yaml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 10
    defaults:
      run:
        working-directory: assistant
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('assistant/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install linked package dependencies
        run: |
          cd ../packages/ces-contracts && bun install --frozen-lockfile
          cd ../../skills/meet-join/contracts && bun install --frozen-lockfile
          cd .. && bun install --frozen-lockfile

      - name: Sync feature flag registry
        run: cd .. && bun run meta/feature-flags/sync-bundled-copies.ts

      - name: Lint
        run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 10
    defaults:
      run:
        working-directory: assistant
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('assistant/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install linked package dependencies
        run: |
          cd ../packages/ces-contracts && bun install --frozen-lockfile
          cd ../../skills/meet-join/contracts && bun install --frozen-lockfile
          cd .. && bun install --frozen-lockfile

      - name: Sync feature flag registry
        run: cd .. && bun run meta/feature-flags/sync-bundled-copies.ts

      - name: Type check
        run: bunx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 15
    defaults:
      run:
        working-directory: assistant
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('assistant/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install linked package dependencies
        run: |
          cd ../packages/ces-contracts && bun install --frozen-lockfile
          cd ../../skills/meet-join/contracts && bun install --frozen-lockfile
          cd .. && bun install --frozen-lockfile

      - name: Sync feature flag registry
        run: cd .. && bun run meta/feature-flags/sync-bundled-copies.ts

      - name: Restore test durations cache
        uses: actions/cache/restore@v5
        with:
          path: assistant/.test-durations
          key: test-durations-unused
          restore-keys: test-durations-

      - name: Test
        run: bun run test:stable
        env:
          TEST_WORKERS: '8'
          TEST_DURATIONS_FILE: .test-durations
          TEST_DURATIONS_OUTPUT: .test-durations

      - name: Save test durations cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: assistant/.test-durations
          key: test-durations-${{ github.run_id }}

  openapi-check:
    name: OpenAPI Spec Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: assistant
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Cache bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('assistant/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check OpenAPI spec is up to date
        run: bun run generate:openapi -- --check

  push-dev-image:
    name: Push Dev Image (Assistant)
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 30
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    environment: dev
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.VELLUM_AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.VELLUM_AUTOMATION_GITHUB_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ secrets.GCP_REGISTRY_HOST }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Login to Docker Hub
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
          DOCKERHUB_ACCESS_TOKEN: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
        run: bun scripts/docker-login-with-retry.ts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute dev version and image name
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          GCP_IMAGE="${{ secrets.GCP_REGISTRY_HOST }}/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ASSISTANT_IMAGE_NAME }}"
          echo "image=${GCP_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=dev.${GITHUB_RUN_NUMBER}.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Sync feature flag registry for Docker context
        run: cp meta/feature-flags/feature-flag-registry.json assistant/src/config/feature-flag-registry.json

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: assistant/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:dev
          cache-from: type=gha,scope=assistant-dev-linux/amd64
          cache-to: type=gha,mode=max,scope=assistant-dev-linux/amd64

      - name: Write image ref artifact
        run: |
          mkdir -p /tmp/dev-image-ref
          echo "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" > /tmp/dev-image-ref/image-ref.txt
          echo "Image ref: $(cat /tmp/dev-image-ref/image-ref.txt)"

      - name: Upload image ref
        uses: actions/upload-artifact@v4
        with:
          name: dev-image-ref-assistant
          path: /tmp/dev-image-ref/image-ref.txt
          retention-days: 7

  notify-assistant:
    name: Slack Notification (Assistant)
    needs: [lint, typecheck, test]
    if: always()
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Slack ID
        id: slack-id
        run: |
          GITHUB_USER="${{ github.actor }}"

          if [[ "${{ needs.lint.result }}" == "failure" || "${{ needs.typecheck.result }}" == "failure" || "${{ needs.test.result }}" == "failure" ]]; then
            STATUS="failure"
          elif [[ "${{ needs.lint.result }}" == "cancelled" || "${{ needs.typecheck.result }}" == "cancelled" || "${{ needs.test.result }}" == "cancelled" ]]; then
            STATUS="cancelled"
          elif [[ "${{ needs.lint.result }}" == "skipped" || "${{ needs.typecheck.result }}" == "skipped" || "${{ needs.test.result }}" == "skipped" ]]; then
            STATUS="skipped"
          else
            STATUS="success"
          fi

          SLACK_ID=$(yq ".github_to_slack_all_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)

          if [ "$SLACK_ID" = "null" ]; then
            case $STATUS in
              failure)
                SLACK_ID=$(yq ".github_to_slack_failure_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              success)
                SLACK_ID=$(yq ".github_to_slack_success_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
              cancelled)
                SLACK_ID=$(yq ".github_to_slack_cancelled_notifications.[\"$GITHUB_USER\"]" .github/config/github_slack_mapping.yaml)
                ;;
            esac
          fi

          if [ "$SLACK_ID" = "null" ]; then
            SLACK_ID="$GITHUB_USER"
          fi

          if [ "$STATUS" = "cancelled" ] || [ "$SLACK_ID" = "$GITHUB_USER" ]; then
            echo "should_tag=false" >> $GITHUB_OUTPUT
          else
            echo "should_tag=true" >> $GITHUB_OUTPUT
          fi
          echo "id=$SLACK_ID" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/send-build-alert
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          status: ${{ steps.slack-id.outputs.status }}
          slack-user-id: ${{ steps.slack-id.outputs.id }}
          should-tag: ${{ steps.slack-id.outputs.should_tag }}
          channel: "#build-alerts"
