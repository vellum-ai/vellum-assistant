name: Publish velly

on:
  push:
    branches: [main]
    paths: [assistant/package.json]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Create release
        id: run-script
        run: bun run scripts/publish-velly.ts
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
