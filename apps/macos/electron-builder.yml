appId: com.vellum.vellum-assistant-electron
productName: Vellum
directories:
  output: dist
extraResources:
  - from: resources/bun
    to: bun
  # The generated per-environment app icon, kept at a stable resources path so
  # the Dock can restore it when a custom avatar is cleared (Electron has no
  # "reset to bundle icon" API). Source is produced by scripts/generate-icon.sh.
  - from: build/icon.icns
    to: icon.icns
afterPack: ./scripts/afterPack.js
protocols:
  - name: Vellum Deep Links
    schemes:
      - vellum
      - vellum-assistant
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: ./scripts/entitlements/app.plist
  entitlementsInherit: ./scripts/entitlements/inherit.plist
  target:
    - target: dmg
      arch:
        - arm64
