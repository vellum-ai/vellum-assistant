appId: com.vellum.vellum-assistant-electron
productName: Vellum
directories:
  output: dist
extraResources:
  - from: resources/bun
    to: bun
  # Branded per-environment app icon as a raster, emitted by
  # scripts/generate-icon.sh. The main process loads it from Resources/ to
  # reset the Dock icon when the active assistant has no avatar.
  - from: build/icon.png
    to: icon.png
afterPack: ./scripts/afterPack.js
protocols:
  - name: Vellum Deep Links
    schemes:
      - vellum
      - vellum-assistant
mac:
  icon: build/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: ./scripts/entitlements/app.plist
  entitlementsInherit: ./scripts/entitlements/inherit.plist
  target:
    - target: dmg
      arch:
        - arm64
