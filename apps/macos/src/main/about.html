<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';" />
    <title>About Vellum</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #6b7280;
        --accent: #6366f1;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a1a;
          --fg: #f5f5f5;
          --muted: #9ca3af;
          --accent: #818cf8;
        }
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 56px 32px 32px;
        box-sizing: border-box;
      }
      h1 {
        margin: 16px 0 4px;
        font-size: 28px;
        font-weight: 600;
      }
      .tagline {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 28px;
      }
      dl {
        display: grid;
        grid-template-columns: auto auto;
        gap: 6px 16px;
        font-size: 13px;
        margin: 0 0 28px;
      }
      dt {
        color: var(--muted);
        text-align: right;
      }
      dd {
        margin: 0;
        text-align: left;
        font-variant-numeric: tabular-nums;
        user-select: text;
        -webkit-user-select: text;
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-size: 13px;
      }
      a:hover {
        text-decoration: underline;
      }
      .copyright {
        color: var(--muted);
        font-size: 11px;
        margin-top: auto;
        padding-top: 24px;
      }
    </style>
  </head>
  <body>
    <h1 id="app-name">Vellum</h1>
    <div class="tagline">AI assistant for your Mac</div>
    <dl>
      <dt>Version</dt><dd id="version">—</dd>
      <dt>Build</dt><dd id="commit-sha">—</dd>
    </dl>
    <a href="https://vellum.ai" id="website-link">vellum.ai</a>
    <div class="copyright" id="copyright">© Vellum</div>

    <script>
      (async () => {
        const info = await window.vellum.app.versionInfo();
        document.getElementById("app-name").textContent = info.appName;
        document.getElementById("version").textContent = info.version;
        document.getElementById("commit-sha").textContent = info.commitSha;
        document.getElementById("copyright").textContent = info.copyright;
        const link = document.getElementById("website-link");
        link.textContent = new URL(info.website).host;
        link.setAttribute("href", info.website);
        link.addEventListener("click", (event) => {
          event.preventDefault();
          window.vellum.app.openWebsite();
        });
      })();
    </script>
  </body>
</html>
