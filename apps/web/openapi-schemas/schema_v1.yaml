    SignedUrlRequestRequest:
      type: object
      description: |-
        Request body for the unified signed-URL endpoint.

        Supports two operations:

        - ``operation="upload"`` — mint a signed PUT URL for uploading a new
          ``.vbundle`` to object storage. Must not include ``bundle_key`` (the
          key is server-generated so clients can't choose arbitrary paths).
        - ``operation="download"`` — mint a signed GET URL for an existing
          bundle identified by ``bundle_key``. Requires ``bundle_key``.

        ``content_type`` and ``content_length`` apply to uploads only and are
        ignored on downloads.
      properties:
        operation:
          allOf:
          - $ref: '#/components/schemas/OperationEnum'
          description: |-
            Which signed URL to mint: 'upload' produces a PUT URL for a new bundle; 'download' produces a GET URL for an existing bundle referenced by bundle_key.

            * `upload` - upload
            * `download` - download
        bundle_key:
          type: string
          minLength: 1
          description: Required when operation == 'download'; forbidden otherwise.
        content_type:
          type: string
          minLength: 1
          default: application/octet-stream
          description: MIME type the client will use when uploading. Applies only
            when operation == 'upload'.
        content_length:
          type: integer
          description: Size of the bundle in bytes. When provided, the signed upload
            URL will require this exact Content-Length header. Applies only when operation
            == 'upload'.
        target_runtime_version:
          type: string
          nullable: true
          minLength: 1
          description: Target runtime semver, applied only when operation == 'download'.
            When provided alongside an ExportJob with persisted compatibility bounds,
            the platform refuses to issue the signed URL if the target version is
            outside the bundle's [min, max] range. Omitted by legacy clients — backwards-compatible.
          maxLength: 64
      required:
      - operation
    SignedUrlResponse:
      type: object
      description: |-
        Response body for the unified signed-URL endpoint.

        ``url`` is a V4 signed GCS URL: PUT for ``operation='upload'`` and GET
        for ``operation='download'``. ``max_content_length`` is only populated
        on uploads; download responses omit it.
      properties:
        url:
          type: string
          description: V4 signed GCS URL. PUT target for uploads; GET target for downloads.
        bundle_key:
          type: string
          description: GCS object key of the bundle.
        expires_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the signed URL expires.
        max_content_length:
          type: integer
          description: Maximum allowed bundle size in bytes. Only set for uploads.
      required:
      - bundle_key
      - expires_at
      - url
    SleepPolicy:
      type: object
      description: Serializer for the assistant sleep/wake policy.
      properties:
        idle_timeout_seconds:
          type: integer
          minimum: 0
          description: Seconds of inactivity before the assistant is put to sleep.
            0 = never sleep.
    SnoozeRequest:
      type: object
      description: Serializer for snooze-until action.
      properties:
        snoozed_until:
          type: string
          format: date-time
