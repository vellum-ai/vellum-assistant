        Fetch a skill's contents as a tar.gz archive.

        Rate limited to 5 requests per minute per user/IP, plus a global
        anonymous cap of 60 requests per minute.
      parameters:
      - in: path
        name: skill_id
        schema:
          type: string
        required: true
