    post:
      operationId: organizations_billing_auto_top_up_setup_intent_create
      description: |-
        Create a Stripe SetupIntent for saving an off-session auto-top-up payment method.

        The SetupIntent is tagged with ``metadata.auto_top_up=true`` so the
        ``setup_intent.succeeded`` webhook handler can distinguish auto-top-up
        payment-method saves from manual-top-up saves and persist the resulting
        payment method onto ``AutoTopUpConfig.stripe_payment_method_id``.
      parameters:
