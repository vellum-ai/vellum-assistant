  /v1/admin/billing-usage/series/:
    get:
      operationId: admin_billing_usage_series_retrieve
      description: |-
        Return time-bucketed billing usage series for an organization.

        Admin-scoped variant of ``UsageSeriesViewSet`` that accepts
        ``organization_id`` as a query parameter.
      parameters:
      - in: query
        name: from
        schema:
          type: string
        description: Inclusive start date (ISO 8601).
        required: true
      - in: query
        name: granularity
        schema:
          type: string
          enum:
          - daily
          - monthly
          - weekly
        description: 'Time bucket granularity: daily (default), weekly, or monthly.'
      - in: query
        name: group_by
        schema:
          type: string
          enum:
          - assistant
          - inference_profile
          - inference_provider
          - llm_call_site
          - model
          - oauth_provider
          - usage_source
        description: 'Dimension to group by within each bucket (default: usage_source).
          Supported values include llm_call_site and inference_profile.'
      - in: query
        name: inference_profile
        schema:
          type: string
        description: Filter by runtime-proxy inference profile ID.
      - in: query
        name: inference_provider
        schema:
          type: string
        description: Filter by LLM inference provider (e.g. anthropic, openai, gemini).
      - in: query
        name: llm_call_site
        schema:
          type: string
        description: Filter by runtime-proxy LLM call-site ID (task).
      - in: query
        name: model
        schema:
          type: string
        description: Filter by model ID (e.g. claude-opus-4-6).
      - in: query
        name: oauth_provider
        schema:
          type: string
        description: Filter by OAuth provider (e.g. twitter, hubspot).
      - in: query
        name: organization_id
        schema:
          type: string
        description: Organization UUID to query billing usage for.
        required: true
      - in: query
        name: to
        schema:
          type: string
        description: Inclusive end date (ISO 8601).
        required: true
      - in: query
        name: tz
        schema:
          type: string
        description: 'IANA timezone for date-range and bucket boundaries (default:
          UTC).'
      - in: query
        name: usage_source
        schema:
          type: string
          enum:
          - oauth_proxy
          - runtime_proxy
        description: 'Filter by usage source: runtime_proxy or oauth_proxy.'
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSeriesResponse'
          description: ''
