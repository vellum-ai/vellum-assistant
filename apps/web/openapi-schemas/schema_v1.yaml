          minLength: 1
          maxLength: 512
        tag:
          type: string
          minLength: 1
          maxLength: 128
        sha:
          type: string
          default: ''
          maxLength: 128
        digest:
          type: string
          default: ''
          maxLength: 128
      required:
      - repository
      - tag
  securitySchemes:
    AssistantAPIKey:
      type: apiKey
      in: header
      name: Authorization
      description: API key passed as 'Api-Key <key>' in the Authorization header.
    SDKCompatibleAssistantKey:
      type: apiKey
      in: header
      name: Authorization
      description: Assistant API key via 'Api-Key <key>', 'Bearer <key>', X-Api-Key
        header, or ?key= query parameter.
    VellumAPIKey:
      type: http
      scheme: bearer
      description: Platform API key passed as 'Bearer vak_...' in the Authorization
        header.
    XSessionTokenAuth:
      type: apiKey
      in: header
      name: X-Session-Token
      description: X-Session-Token authentication
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
