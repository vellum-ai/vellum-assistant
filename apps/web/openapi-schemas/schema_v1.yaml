      - type
    UnifiedExportStatusFailed:
      type: object
      description: Failed export status variant of the unified job status response.
      properties:
        status:
          allOf:
          - $ref: '#/components/schemas/MigrationStatusFailedEnum'
          description: |-
            Always failed when the export job reached a terminal error.

            * `failed` - failed
        job_id:
          type: string
          format: uuid
          description: Unique identifier of the export job.
        error:
          type: string
          description: Error details explaining why the export failed.
        type:
          allOf:
          - $ref: '#/components/schemas/MigrationJobTypeExportEnum'
          description: |-
            Discriminator: always 'export' for export-job status responses.

            * `export` - export
      required:
