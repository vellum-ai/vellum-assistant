      type: object
      properties:
        can_import:
          allOf:
          - $ref: '#/components/schemas/LiteralFalseEnum'
          description: |-
            Always false when preflight found import conflicts.

            * `False` - False
        summary:
          allOf:
          - $ref: '#/components/schemas/PreflightSummary'
          description: Structured summary of what the import would do.
        files:
          type: array
          items:
            $ref: '#/components/schemas/PreflightFileReport'
          description: Per-file preflight reports.
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/PreflightConflictEntry'
          description: Conflicts detected between bundle and current state.
        manifest:
          allOf:
          - $ref: '#/components/schemas/PreflightManifest'
          description: Parsed manifest from the bundle.
      required:
      - can_import
      - conflicts
      - files
      - manifest
      - summary
    PreflightConflictEntry:
      type: object
      description: A single conflict entry in the preflight response.
      properties:
        code:
          type: string
          description: Conflict code (e.g. 'overwrite', 'type_mismatch').
        message:
          type: string
          description: Human-readable conflict description.
        path:
          type: string
          description: Relative file path with a conflict.
      required:
      - code
      - message
    PreflightFileReport:
      type: object
      description: A single file report entry in the preflight response.
      properties:
        path:
          type: string
          description: Relative path of the file within the bundle.
        action:
          allOf:
          - $ref: '#/components/schemas/ActionEnum'
          description: |-
            Action that would be taken: create, overwrite, unchanged, or skip.

            * `create` - create
            * `overwrite` - overwrite
            * `unchanged` - unchanged
            * `skip` - skip
        bundle_size:
          type: integer
          description: Size of the file in the bundle in bytes.
        current_size:
          type: integer
          nullable: true
          description: Size of the existing file on disk in bytes. Null if file does
            not exist.
        bundle_sha256:
          type: string
          description: SHA-256 digest of the file in the bundle.
        current_sha256:
          type: string
          nullable: true
          description: SHA-256 digest of the existing file on disk. Null if file does
            not exist.
      required:
      - action
      - bundle_sha256
      - bundle_size
      - current_sha256
      - current_size
      - path
    PreflightManifest:
      type: object
      description: Manifest info within a preflight response.
      properties:
        schema_version:
          type: string
          description: Bundle schema version.
        created_at:
          type: string
          description: ISO 8601 timestamp of when the bundle was created.
        source:
          type: string
          description: Source that created the bundle (e.g. 'runtime-export').
        description:
          type: string
          description: Optional human-readable description of the bundle.
        files:
          type: array
          items:
            $ref: '#/components/schemas/ManifestFileEntry'
          description: Files declared in the manifest.
        manifest_sha256:
          type: string
          description: SHA-256 digest of the manifest itself.
      required:
      - created_at
      - files
      - manifest_sha256
      - schema_version
    PreflightSuccess:
      type: object
      properties:
        can_import:
          allOf:
          - $ref: '#/components/schemas/LiteralTrueEnum'
          description: |-
            Always true when the bundle can be safely imported.

            * `True` - True
        summary:
          allOf:
          - $ref: '#/components/schemas/PreflightSummary'
          description: Structured summary of what the import would do.
        files:
          type: array
          items:
            $ref: '#/components/schemas/PreflightFileReport'
          description: Per-file preflight reports.
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/PreflightConflictEntry'
          description: Conflicts detected between bundle and current state.
        manifest:
          allOf:
          - $ref: '#/components/schemas/PreflightManifest'
          description: Parsed manifest from the bundle.
      required:
      - can_import
      - conflicts
      - files
      - manifest
      - summary
