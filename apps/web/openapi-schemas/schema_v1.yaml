      description: Processing export status variant of the unified job status response.
      properties:
        status:
          allOf:
          - $ref: '#/components/schemas/MigrationStatusProcessingEnum'
          description: |-
            Always processing while the export job is running.

            * `processing` - processing
        job_id:
          type: string
          format: uuid
          description: Unique identifier of the export job.
        type:
          allOf:
          - $ref: '#/components/schemas/MigrationJobTypeExportEnum'
          description: |-
            Discriminator: always 'export' for export-job status responses.

            * `export` - export
      required:
      - job_id
      - status
      - type
    UnifiedImportStatusComplete:
