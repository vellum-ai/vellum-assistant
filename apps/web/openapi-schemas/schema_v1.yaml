    UserMe:
      type: object
      description: |-
        Public-facing representation of the authenticated user's profile.

        Fields:
        * ``username``: the public handle (editable)
        * ``email``: read-only; managed by the auth provider
        * ``first_name`` / ``last_name``: read-only here; populated from the
          social-provider name claim on signup. Edit surface is intentionally
          narrow: this endpoint exists for handle management.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
      required:
      - email
      - first_name
      - id
      - last_name
      - username
    UsernameAvailability:
      type: object
      description: |-
        Response shape for the live availability check.

        * ``available``: ``true`` only when the handle passes format validation
          AND no other user holds it (case-insensitively).
        * ``code``: ``null`` when ``available`` is ``true``; otherwise a stable
          machine-readable reason — either a validation code from
          :mod:`username_validation` or ``"taken"``.
      properties:
        available:
          type: boolean
        code:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
      required:
      - available
    ValidateFailure:
      type: object
      properties:
        is_valid:
          allOf:
          - $ref: '#/components/schemas/LiteralFalseEnum'
          description: |-
            Always false when validation failed.

            * `False` - False
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorEntry'
          description: Structured validation errors describing why validation failed.
      required:
      - errors
      - is_valid
    ValidateManifest:
      type: object
      description: |-
        Manifest portion of a successful validate response.

        Shape: ``{schema_version, created_at, source?, description?, files, manifest_sha256}``.
      properties:
        schema_version:
          type: string
          description: Bundle schema version.
        created_at:
          type: string
          description: ISO 8601 timestamp of when the bundle was created.
        source:
          type: string
          description: Source that created the bundle (e.g. 'runtime-export').
        description:
          type: string
          description: Optional human-readable description of the bundle.
        files:
          type: array
          items:
            $ref: '#/components/schemas/ManifestFileEntry'
          description: Files declared in the manifest.
        manifest_sha256:
          type: string
          description: SHA-256 digest of the manifest itself.
      required:
      - created_at
      - files
      - manifest_sha256
      - schema_version
    ValidateSuccess:
      type: object
      properties:
        is_valid:
          allOf:
          - $ref: '#/components/schemas/LiteralTrueEnum'
          description: |-
            Always true when the bundle passed all validation checks.

            * `True` - True
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorEntry'
          description: Structured validation errors. Empty on success.
        manifest:
          allOf:
          - $ref: '#/components/schemas/ValidateManifest'
          description: Parsed manifest for the validated bundle.
      required:
      - errors
      - is_valid
      - manifest
    ValidateTransportResponse:
      oneOf:
      - $ref: '#/components/schemas/ValidateSuccess'
      - $ref: '#/components/schemas/ValidateFailure'
    ValidationErrorEntry:
      type: object
      description: |-
        A single structured validation error from the runtime.

        Matches the ``{code, message, path?}`` shape defined in the companion
        migration transport contract.
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. 'INVALID_MANIFEST').
        message:
          type: string
          description: Human-readable error description.
        path:
          type: string
          description: Optional JSONPath or file path indicating where the error occurred.
      required:
      - code
      - message
    VelayRegistrationValidationResponse:
      type: object
      properties:
        assistant_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        user_id:
