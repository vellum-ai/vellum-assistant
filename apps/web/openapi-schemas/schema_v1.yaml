  /v1/assistants/{assistant_id}/doctor/history/:
    get:
      operationId: assistants_doctor_history_list
      description: |-
        List persisted Doctor sessions for an assistant, newest first.

        Sessions are scoped to the assistant identified by ``assistant_id``
        (ownership/auth is enforced by ``_DoctorAPIView`` via
        ``self.get_object()``). Results are ordered by
        ``last_message_at DESC NULLS LAST, -created`` so that the most
        recently active session appears first and sessions that have
        never received a message sink to the bottom (PostgreSQL defaults
        ``DESC`` to ``NULLS FIRST``, which would otherwise float empty
        sessions above active ones). An annotated ``message_count`` is
        included on each row so list views do not need a per-row query
        to display the message tally.
      parameters:
      - in: header
        name: Vellum-Organization-Id
        schema:
          type: string
          format: uuid
        description: Required if using Cookie-based or X-Session-Token authentication
          methods.
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDoctorSessionListList'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
