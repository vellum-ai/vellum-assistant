  /v1/skills/{skill_id}/files/:
    get:
      operationId: v1_skills_files_list
      description: |-
        List the files contained in a skill as JSON metadata.

        Rate limited to 60 requests per minute per user/IP, plus a global
        anonymous cap of 600 requests per minute. These buckets are
        independent of the install flow so preview browsing does not
        starve the install rate limit.

        The per-user / per-IP check runs *before* the global anonymous
        check so that a noisy client hitting its own wall does not keep
        burning the shared anonymous quota for every other caller.
      parameters:
      - in: path
        name: skill_id
        schema:
          type: string
        required: true
      tags:
      - skills
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /v1/skills/{skill_id}/files/content/:
    get:
      operationId: v1_skills_file_content_retrieve
      description: |-
        Fetch the contents of a single file within a skill.

        Text files under ``MAX_INLINE_TEXT_SIZE`` are returned inline as
        UTF-8; binary, non-decodable, and oversized files return
        ``content=null`` with ``is_binary`` flipped accordingly.

        Rate limited to ``FILE_CONTENT_RATE_LIMIT_PER_MINUTE`` requests per
        minute per user/IP, plus a global anonymous cap of
        ``ANON_GLOBAL_FILE_CONTENT_LIMIT`` requests per minute — independent
        from the ``skills-list``, ``skills-install``, and ``skills-files-list``
        buckets.

        The per-user / per-IP check runs *before* the global anonymous
        check so that a noisy client hitting its own wall does not keep
        burning the shared anonymous quota for every other caller.
      parameters:
      - in: query
        name: path
        schema:
          type: string
        description: Relative path within the skill directory
        required: true
      - in: path
        name: skill_id
        schema:
          type: string
        required: true
      tags:
      - skills
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
