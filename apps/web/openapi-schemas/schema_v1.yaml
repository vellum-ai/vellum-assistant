            * `approval` - Approval
            * `status` - Status
            * `error` - Error
        content:
          type: string
          readOnly: true
          description: Human-readable content (may be empty for status/tool events).
        metadata:
          readOnly: true
          description: Structured payload describing the event (e.g. tool args).
        sequence:
          type: integer
          readOnly: true
          description: Monotonic per-session ordering, allocated atomically on write.
        occurred_at:
          type: string
          format: date-time
          readOnly: true
          description: When the event actually occurred (caller-supplied).
      required:
      - content
