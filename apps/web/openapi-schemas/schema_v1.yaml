        type:
          allOf:
          - $ref: '#/components/schemas/MigrationJobTypeImportEnum'
          description: |-
            Discriminator: always 'import' for import-job status responses.

            * `import` - import
      required:
      - job_id
      - status
      - type
    UnifiedImportStatusFailed:
      type: object
      description: Failed import status variant of the unified job status response.
      properties:
        status:
          allOf:
          - $ref: '#/components/schemas/MigrationStatusFailedEnum'
          description: |-
            Always failed when the import job reached a terminal error.

            * `failed` - failed
        job_id:
          type: string
          format: uuid
          description: Unique identifier of the import job.
        error:
          type: string
          description: Error details explaining why the import failed.
        type:
          allOf:
          - $ref: '#/components/schemas/MigrationJobTypeImportEnum'
          description: |-
            Discriminator: always 'import' for import-job status responses.

