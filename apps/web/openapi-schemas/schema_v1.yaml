  /v1/assistants/{assistant_id}/push-tokens/:
    post:
      operationId: assistants_push_tokens_upsert
      description: |-
        Register or update a device push token for the assistant owner.

        Authenticates via either:

        - **Session** (web / iOS WebView): the requesting user must own the
          ``assistant_id`` referenced in the URL.  This is the path used by
          the `web/src/lib/push/register.ts` Capacitor flow on iOS.
        - **AssistantAPIKey** (external SDK): the key must match the URL
          ``assistant_id``; the registered user is ``assistant.created_by``.

        Both paths converge on the same ``(user, token, bundle_id)`` upsert.
        The ``last_seen_at`` timestamp is updated on every successful call.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - assistants
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevicePushTokenUpsertRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DevicePushTokenUpsertRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DevicePushTokenUpsertRequest'
        required: true
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      - AssistantAPIKey: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePushTokenUpsert'
          description: ''
  /v1/assistants/{assistant_id}/push-tokens/{token}/:
    delete:
      operationId: assistants_push_tokens_delete
      description: |-
        Remove a device push token for the assistant owner.

        Idempotent — returns 204 even if the token does not exist for the
        given ``(user, token, bundle_id)`` triple.

        Authenticates via either session or AssistantAPIKey (see
        :class:`DevicePushTokenUpsertView` docstring).  The web/iOS WebView
        logout path in ``web/src/lib/auth.tsx`` calls this BEFORE
        ``allauthLogout()`` so the session cookie is still valid.

        The ``bundle_id`` query parameter is REQUIRED so the delete is scoped
        to a single (user, token, bundle_id) row.  Without it, a user who
        legitimately had the same token registered under two app bundles
        (e.g. main app and a TestFlight build) would lose both registrations
        on a single logout, which would silently disable push for the other
        app.  The model's unique constraint is ``(user, token, bundle_id)``,
        so the delete filter must match all three to be safe.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: bundle_id
        schema:
          type: string
        description: iOS app bundle identifier the token was registered under.  Required
          so the delete is scoped to a single (user, token, bundle_id) row.
        required: true
      - in: path
        name: token
        schema:
          type: string
        required: true
      tags:
      - assistants
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      - AssistantAPIKey: []
      responses:
        '204':
          description: No response body
        '400':
          description: No response body
