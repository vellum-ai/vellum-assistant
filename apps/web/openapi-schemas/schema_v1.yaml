    AssistantSystemEvent:
      type: object
      description: |-
        List-item serializer for AssistantSystemEvent.

        Exposes only the fields that the web and admin UIs need.  ``display_text``
        is derived from ``details`` at read time so that the stored schema can
        evolve without migrations.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/SystemEventTypeEnum'
          readOnly: true
          description: |-
            High-level categorisation of what occurred.

            * `lifecycle` - Lifecycle
            * `upgrade` - Upgrade
            * `rollback` - Rollback
            * `crash` - Crash
            * `idle_sleep` - Idle Sleep
            * `wake` - Wake
            * `profiler` - Profiler
            * `other` - Other
        event_status:
          allOf:
          - $ref: '#/components/schemas/EventStatusEnum'
          readOnly: true
          description: |-
            Outcome or phase of the event.

            * `started` - Started
            * `succeeded` - Succeeded
            * `failed` - Failed
            * `in_progress` - In Progress
        source:
          allOf:
          - $ref: '#/components/schemas/SourceEnum'
          readOnly: true
          description: |-
            Component that produced the event.

            * `django` - Django
            * `vembda` - Vembda
        reason:
          type: string
          readOnly: true
          description: Short machine-readable reason code or message.
        display_text:
          type: string
          readOnly: true
        details:
          readOnly: true
          description: Structured event payload. Derive display text from this field.
        occurred_at:
          type: string
          format: date-time
          readOnly: true
          description: When the event actually occurred (caller-supplied).
      required:
