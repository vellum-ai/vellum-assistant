  /v1/user/me/:
    get:
      operationId: user_me_retrieve
      description: |-
        ``GET`` / ``PATCH`` the authenticated user's profile.

        * ``GET`` returns the current handle plus immutable identity fields.
        * ``PATCH`` updates ``username`` only (other fields are read-only).

        Returns ``409 Conflict`` (not ``400``) when the requested handle is
        syntactically valid but already taken by another user — the client
        distinguishes "fix your input" from "pick a different one" via the
        status code.
      tags:
      - user
      security:
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMe'
          description: ''
    patch:
      operationId: user_me_partial_update
      description: |-
        ``GET`` / ``PATCH`` the authenticated user's profile.

        * ``GET`` returns the current handle plus immutable identity fields.
        * ``PATCH`` updates ``username`` only (other fields are read-only).

        Returns ``409 Conflict`` (not ``400``) when the requested handle is
        syntactically valid but already taken by another user — the client
        distinguishes "fix your input" from "pick a different one" via the
        status code.
      tags:
      - user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserMeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserMeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserMeRequest'
      security:
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMe'
          description: ''
  /v1/user/username-available/:
    get:
      operationId: user_username_available_retrieve
      description: |-
        Live availability check used by the settings UI.

        ``GET /v1/user/username-available/?username=foo``

        Response shape (always 200, even when unavailable — the client renders
        inline state, not a global error):

        .. code-block:: json

            {"available": true,  "code": null,        "message": null}
            {"available": false, "code": "too_short", "message": "Must be at least 3 characters."}
            {"available": false, "code": "taken",     "message": "This handle is already taken."}

        A 429 is returned only when the per-user rate cap is exceeded — the
        request was not evaluated.
      parameters:
      - in: query
        name: username
        schema:
          type: string
        description: Candidate handle (will be lowercased before check).
        required: true
      tags:
      - user
      security:
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsernameAvailability'
          description: ''
        '400':
          description: No response body
        '429':
          description: No response body
components:
  schemas:
    AccessConsent:
      type: object
      description: Serializer for the user-controlled admin log access consent toggle.
      properties:
        access_consented:
          type: boolean
          description: When True, Vellum admins may view the daemon log file (/workspace/data/logs/vellum.log)
            from this assistant pod for debugging. Defaults to False; the owner can
            revoke at any time.
      required:
      - access_consented
    AcknowledgeRequest:
      type: object
      description: Serializer for acknowledge/unacknowledge actions.
      properties:
        acknowledged:
          type: boolean
      required:
      - acknowledged
    AcknowledgeResponse:
      type: object
      description: Response serializer for acknowledge/unacknowledge actions.
      properties:
        id:
          type: string
          format: uuid
        is_read:
          type: boolean
        read_at:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - is_read
      - read_at
    ActionEnum:
      enum:
      - create
      - overwrite
      - unchanged
      - skip
      type: string
      description: |-
        * `create` - create
        * `overwrite` - overwrite
        * `unchanged` - unchanged
        * `skip` - skip
    AdminAnalyticsQueryBadRequest:
      type: object
      properties:
        detail:
          type: string
