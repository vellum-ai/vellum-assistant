openapi: 3.0.3
info:
  title: vellum-assistant-platform API
  version: 1.0.0 (v1)
  description: Documentation of API endpoints of vellum-assistant-platform
paths:
  /v1/admin/analytics/query/:
    post:
      operationId: admin_analytics_query_create
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAnalyticsQueryRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminAnalyticsQueryRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminAnalyticsQueryRequestRequest'
        required: true
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAnalyticsQueryResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAnalyticsQueryBadRequest'
          description: ''
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAnalyticsQueryUnavailable'
          description: ''
  /v1/admin/assistants/:
    get:
      operationId: admin_assistants_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: search
        schema:
          type: string
        description: Search by exact UUID or trigram search across name and creator
          email.
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminAssistantList'
          description: ''
  /v1/admin/assistants/{assistant_id}/terminal/sessions/:
    post:
      operationId: admin_assistants_terminal_sessions_create
      description: |-
        Create a new terminal session for an assistant (admin).

        Proxies POST /v1/admin/assistants/{id}/terminal/sessions/ to vembda.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{assistant_id}/terminal/sessions/{session_id}/:
    delete:
      operationId: admin_assistants_terminal_sessions_destroy
      description: |-
        Close and clean up a terminal session (admin).

        Proxies DELETE /v1/admin/assistants/{id}/terminal/sessions/{session_id}/
        to vembda.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: session_id
        schema:
          type: string
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{assistant_id}/terminal/sessions/{session_id}/events/:
    get:
      operationId: admin_assistants_terminal_sessions_events_retrieve
      description: |-
        Proxy terminal SSE output stream for a session (admin).

        Ownership is verified via ``get_object()`` before opening the stream.
        The DB connection is released afterwards so the long-lived stream does
        not hold a pooled connection for its entire lifetime.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: format
        schema:
          type: string
          enum:
          - event-stream
          - json
      - in: path
        name: session_id
        schema:
          type: string
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            text/event-stream:
              schema:
                type: string
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{assistant_id}/terminal/sessions/{session_id}/input/:
    post:
      operationId: admin_assistants_terminal_sessions_input_create
      description: |-
        Send keyboard input to an active terminal session (admin).

        Proxies POST /v1/admin/assistants/{id}/terminal/sessions/{session_id}/input/
        to vembda.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: session_id
        schema:
          type: string
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{assistant_id}/terminal/sessions/{session_id}/resize/:
    post:
      operationId: admin_assistants_terminal_sessions_resize_create
      description: |-
        Notify vembda of a terminal window resize event (admin).

        Proxies POST /v1/admin/assistants/{id}/terminal/sessions/{session_id}/resize/
        to vembda.
      parameters:
      - in: path
        name: assistant_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: session_id
        schema:
          type: string
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/:
    get:
      operationId: admin_assistants_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAssistantDetail'
          description: ''
  /v1/admin/assistants/{id}/api-keys/:
    get:
      operationId: admin_assistants_api_keys_list
      description: List all API keys (active and revoked) for a specific assistant.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminAssistantAPIKey'
          description: ''
  /v1/admin/assistants/{id}/api-keys/{key_id}/revoke/:
    post:
      operationId: admin_assistants_api_keys_revoke_create
      description: Revoke a specific API key for an assistant.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      - in: path
        name: key_id
        schema:
          type: string
        description: Primary key of the API key to revoke.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAssistantAPIKey'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/data-logs/:
    get:
      operationId: admin_assistants_data_logs_retrieve
      description: |-
        Return a tail of /workspace/data/logs/vellum.log from the assistant pod.

        Gated on the assistant owner's ``access_consented`` flag. Returns
        403 when consent has not been granted so admins cannot bypass the
        owner's privacy preference.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      - in: query
        name: lines
        schema:
          type: integer
        description: Maximum number of trailing log lines to return (1-5000, default
          500).
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminAssistantDataLogsResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/healthz/:
    get:
      operationId: admin_assistants_healthz_retrieve
      description: Proxy the assistant daemon's healthz endpoint via vembda.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/maintenance-mode/enter/:
    post:
      operationId: admin_assistants_maintenance_mode_enter_create
      description: Enter maintenance mode for a specific assistant.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/maintenance-mode/exit/:
    post:
      operationId: admin_assistants_maintenance_mode_exit_create
      description: Exit maintenance mode for a specific assistant.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/profiler/enter/:
    post:
      operationId: admin_assistants_profiler_enter_create
      description: Enter profiler mode for a specific assistant.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProfilerEnterRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminProfilerEnterRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminProfilerEnterRequestRequest'
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/profiler/exit/:
    post:
      operationId: admin_assistants_profiler_exit_create
      description: Exit profiler mode for a specific assistant.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/profiler/runs/:
    get:
      operationId: admin_assistants_profiler_runs_list
      description: List runtime-visible profiler runs for a specific assistant.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminProfilerRun'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/profiler/runs/{run_id}/:
    delete:
      operationId: admin_assistants_profiler_runs_destroy
      description: Delete a completed profiler run from the assistant runtime.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      - in: path
        name: run_id
        schema:
          type: string
        description: Profiler run identifier.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/profiler/runs/{run_id}/download/:
    get:
      operationId: admin_assistants_profiler_runs_download_retrieve
      description: Stream a profiler run export directly from the assistant runtime.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      - in: path
        name: run_id
        schema:
          type: string
        description: Profiler run identifier.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/gzip:
              schema:
                type: string
                format: binary
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/refresh-statefulset/:
    post:
      operationId: admin_assistants_refresh_statefulset_create
      description: |-
        Re-apply the latest StatefulSet template to the assistant.

        Useful for reconciling the StatefulSet template (env vars, probes,
        sidecar config) without changing the assistant version.  Uses the
        current release images when available and falls back to live images for
        legacy assistants without a release record.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/restart/:
    post:
      operationId: admin_assistants_restart_create
      description: Restart the pod for a specific assistant.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAssistantRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminAssistantRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminAssistantRequest'
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/retire/:
    post:
      operationId: admin_assistants_retire_create
      description: 'Retire an assistant: tear down K8s resources via vembda, then
        delete the DB row.'
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      security:
      - VellumAPIKey: []
      - cookieAuth: []
      - XSessionTokenAuth: []
      responses:
        '204':
          description: No response body
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
          description: ''
  /v1/admin/assistants/{id}/rollback/:
    post:
      operationId: admin_assistants_rollback_create
      description: Rollback a specific assistant to a previous release.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this assistant.
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RollbackRequestRequest'
